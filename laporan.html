<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F1F5F9" id="metaThemeColor">
    <title>Laporan Pembukuan - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('kgr_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        localStorage.setItem('kgr_last_page', 'laporan.html');
    </script>

    <style>
        :root {
            --bg-body: #F1F5F9; --text-main: #0F172A; --text-muted: #64748B;
            --card-bg: #FFFFFF; --card-border: #E2E8F0; --header-bg: #0F172A;
            --emerald-main: #0E9B6E; --gold-accent: #F59E0B; --danger-red: #EF4444;
            --input-bg: #F8FAFC; --modal-bg: #FFFFFF;
        }
        [data-theme="dark"] {
            --bg-body: #0F172A; --text-main: #F8FAFC; --text-muted: #94A3B8;
            --card-bg: #1E293B; --card-border: #334155; --header-bg: #020617;
            --emerald-main: #10B981; --gold-accent: #FBBF24; 
            --input-bg: #020617; --modal-bg: #1E293B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; margin: 0; transition: 0.3s;}

        .app-container { width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden; scrollbar-width: none;}
        .app-container::-webkit-scrollbar { display: none; }
        
        .exec-header { background: var(--header-bg); padding: 40px 24px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; z-index: 10; position: relative;}
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: var(--card-bg); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-main); border: 2px solid var(--card-border); transition: 0.2s;}
        .btn-back:active { transform: scale(0.9); }
        .exec-header h1 { font-size: 16px; font-weight: 900; color: #FFF; flex-grow: 1; text-align: center; text-transform: uppercase;}

        .content-area { flex-grow: 1; overflow-y: auto; padding: 25px 24px 150px; }

        .btn-manual { width: 100%; padding: 16px; border-radius: 16px; font-size: 13px; font-weight: 800; background: var(--card-bg); color: var(--emerald-main); border: 2px dashed var(--emerald-main); cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 20px; transition: 0.2s;}
        .btn-manual:active { transform: scale(0.96); }

        .total-card { background: var(--emerald-main); padding: 20px; border-radius: 24px; color: #FFF; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(14, 155, 110, 0.25); position: relative; overflow: hidden;}
        .tc-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.9;}
        .tc-value { font-size: 28px; font-weight: 900; letter-spacing: -1px;}
        
        .btn-download { width: 100%; padding: 15px; border-radius: 16px; font-size: 13px; font-weight: 900; background: var(--text-main); color: var(--bg-body); border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 25px; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.1);}
        .btn-download:active { transform: scale(0.96); }

        .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--card-bg); padding: 6px; border-radius: 16px; border: 1px solid var(--card-border);}
        .ft-btn { flex: 1; padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; color: var(--text-muted); border: none; background: transparent;}
        .ft-btn.active { background: var(--emerald-main); color: #FFF; }

        .trx-card { background: var(--card-bg); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--card-border); box-shadow: 0 4px 6px rgba(0,0,0,0.02);}
        .trx-body { display: flex; align-items: center; gap: 15px; }
        .trx-icon { width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0; background: var(--input-bg);}
        .trx-icon.in { color: var(--emerald-main); }
        .trx-icon.out { color: var(--danger-red); }
        .trx-info { flex-grow: 1; overflow: hidden; }
        .trx-title { font-size: 13px; font-weight: 900; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .trx-date { font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;}
        .trx-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; background: var(--input-bg); color: var(--text-muted); border: 1px solid var(--card-border);}
        .trx-amount { font-size: 14px; font-weight: 900; white-space: nowrap; flex-shrink: 0;}
        .trx-amount.in { color: var(--emerald-main); }
        .trx-amount.out { color: var(--danger-red); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); border: 2px dashed var(--card-border); border-radius: 20px;}
        .empty-state i { font-size: 30px; margin-bottom: 10px; opacity: 0.5;}

        /* NAVIGASI KAPSUL MELAYANG DI TENGAH */
        .bottom-nav-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--card-bg); border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 50; border: 1px solid var(--card-border);}
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); opacity: 0.8; cursor: pointer; transition: 0.3s; width: 60px; }
        .nav-item i { font-size: 20px; transition: 0.2s; } 
        .nav-item span { font-size: 10px; font-weight: 800; } 
        .nav-item.active { color: var(--emerald-main); opacity: 1; }
        .center-btn { position: relative; top: -25px; flex-shrink: 0;}
        .center-fab { width: 65px; height: 65px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2px; color: #FFFFFF; font-size: 22px; background: linear-gradient(135deg, #10B981, #059669); border: 5px solid var(--bg-body); box-shadow: 0 10px 20px rgba(5, 150, 105, 0.3); transition: 0.2s; cursor: pointer; }
        .center-fab:active { transform: scale(0.9); }
        .center-fab span { font-size: 9px; font-weight: 800; }

        /* MODALS DI LUAR AREA SCROLL */
        .modal-overlay, .cp-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: 999999; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .modal-overlay { align-items: flex-end; padding: 0; }
        .cp-overlay { background: rgba(15, 23, 42, 0.7); padding: 20px; }
        .modal-overlay.show, .cp-overlay.show { opacity: 1; visibility: visible; }
        
        .modal-content { background: var(--modal-bg); border-top: 1px solid var(--card-border); border-radius: 32px 32px 0 0; padding: 30px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.3); color: var(--text-main); max-height: 85vh; overflow-y: auto;}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h3 { font-size: 18px; font-weight: 900; }
        .btn-close-modal { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--card-border); background: var(--input-bg); display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; color: var(--text-main); transition: 0.2s;}
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); }
        .form-input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--card-border); font-size: 14px; font-weight: 700; outline: none; background: var(--input-bg); color: var(--text-main); transition: 0.2s;}
        .form-input:focus { border-color: var(--emerald-main); }
        .form-select { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--card-border); font-size: 14px; font-weight: 700; outline: none; background: var(--input-bg); color: var(--text-main); transition: 0.2s; appearance: none;}
        .form-select:focus { border-color: var(--emerald-main); }

        .btn-action { width: 100%; padding: 16px; border-radius: 16px; font-size: 14px; font-weight: 900; background: var(--emerald-main); color: #FFF; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s;}
        .btn-action:active { transform: scale(0.96); }
        
        .cp-box { background: var(--modal-bg); border: 1px solid var(--card-border); border-radius: 30px; width: 100%; max-width: 320px; text-align: center; padding: 30px 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 15px 30px rgba(0,0,0,0.2); color: var(--text-main); }
        .cp-overlay.show .cp-box { transform: scale(1); }
        .cp-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 0 auto 15px; }
        .cp-icon.success { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); }
        .cp-icon.error { background: rgba(239, 68, 68, 0.15); color: var(--danger-red); }
        .cp-icon.warning { background: rgba(245, 158, 11, 0.15); color: var(--gold-accent); }
        .cp-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
        .cp-desc { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }
        .cp-btn-wrap { display: flex; gap: 10px; }
        .cp-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .cp-btn-primary { background: var(--emerald-main); color: #FFF;}
        .cp-btn-cancel { background: var(--input-bg); color: var(--text-main); border: 2px solid var(--card-border);}
        .cp-btn-danger { background: var(--danger-red); color: #FFF;}
        
        .spinner-custom { border: 4px solid var(--card-border); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--emerald-main); animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="cp-overlay" id="customAlert"><div class="cp-box"><div class="cp-icon success" id="caIcon"><i class="fa-solid fa-check"></i></div><h3 class="cp-title" id="caTitle">Pemberitahuan</h3><p class="cp-desc" id="caDesc">Pesan di sini.</p><button class="cp-btn cp-btn-primary" style="width: 100%;" onclick="closeCustomAlert()">Tutup</button></div></div>
    <div class="cp-overlay" id="customConfirm"><div class="cp-box"><div class="cp-icon warning"><i class="fa-solid fa-triangle-exclamation"></i></div><h3 class="cp-title" id="ccTitle">Konfirmasi</h3><p class="cp-desc" id="ccDesc">Apakah Anda yakin?</p><div class="cp-btn-wrap"><button class="cp-btn cp-btn-cancel" onclick="closeCustomConfirm()">Batal</button><button class="cp-btn cp-btn-danger" id="ccBtnYes">Ya, Hapus</button></div></div></div>
    <div class="cp-overlay" id="customLoading"><div class="cp-box" style="padding: 40px 20px;"><div class="spinner-custom"></div><h3 class="cp-title" id="clTitle" style="margin-bottom: 0;">Memproses...</h3></div></div>

    <div id="modalInputManual" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Input Laporan Kas</h3>
                <button type="button" onclick="closeModalManual()" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="formManual" onsubmit="submitManualTrx(event)">
                <div class="form-group">
                    <label class="form-label">Tanggal Transaksi</label>
                    <input type="date" id="trxTanggal" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Jenis Pembukuan</label>
                    <select id="trxJenis" class="form-select" onchange="togglePengirim()" required>
                        <option value="Pemasukan">Pemasukan (Uang Masuk)</option>
                        <option value="Pengeluaran">Pengeluaran (Uang Keluar)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Nominal (Rp)</label>
                    <input type="number" id="trxNominal" class="form-input" placeholder="Contoh: 50000" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Tujuan / Keterangan</label>
                    <input type="text" id="trxKet" class="form-input" placeholder="Contoh: Titipan Kas Anggota" required>
                </div>
                <div class="form-group" id="boxPengirim">
                    <label class="form-label">Pilih Member (Sangat Penting!)</label>
                    <select id="trxPengirim" class="form-select">
                        <option value="Hamba Allah">-- Hamba Allah (Non-Member) --</option>
                        </select>
                </div>
                <button type="submit" class="btn-action" style="margin-top: 25px;"><i class="fa-solid fa-floppy-disk"></i> Simpan ke Laporan</button>
            </form>
        </div>
    </div>

    <main class="app-container">
        <div class="exec-header">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h1>Laporan Kas</h1>
            <div class="btn-back" onclick="toggleTheme()"><i id="themeIcon" class="fa-solid fa-moon"></i></div>
        </div>

        <div class="content-area">
            
            <button id="btnInputManual" class="btn-manual" style="display: none;" onclick="openModalManual()">
                <i class="fa-solid fa-pen-to-square"></i> Input Transaksi Manual
            </button>

            <div class="total-card">
                <div class="tc-label">Total Saldo Aktif</div>
                <div class="tc-value" id="uiTotalKas">Rp 0</div>
            </div>

            <button class="btn-download" onclick="downloadLaporanExcel()">
                <i class="fa-solid fa-file-excel" style="color: #10B981;"></i> Ekspor ke Excel (.CSV)
            </button>

            <div class="filter-tabs">
                <button class="ft-btn active" onclick="filterTrx('semua', this)">Semua Riwayat</button>
                <button class="ft-btn" onclick="filterTrx('masuk', this)">Dana Masuk</button>
                <button class="ft-btn" onclick="filterTrx('keluar', this)">Dana Keluar</button>
            </div>

            <div id="listLaporan">
                <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Menarik data pembukuan...</p></div>
            </div>

        </div>
    </main>

    <div class="bottom-nav-container">
        <div class="nav-item" onclick="window.location.href='index.html'"><i class="fa-solid fa-house"></i><span>Beranda</span></div>
        <div class="nav-item center-btn" onclick="window.location.href='index.html'">
            <div class="center-fab"><i class="fa-solid fa-qrcode"></i><span>Sedekah</span></div>
        </div>
        <div class="nav-item active"><i class="fa-solid fa-chart-pie"></i><span>Laporan</span></div>
    </div>

    <script>
        function updateThemeIcon(theme) { const icon = document.getElementById('themeIcon'); if (theme === 'light') { icon.className = 'fa-solid fa-moon'; } else { icon.className = 'fa-solid fa-sun'; } }
        window.addEventListener('DOMContentLoaded', () => { updateThemeIcon(savedTheme); });
        window.toggleTheme = function() { const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('kgr_theme', t); updateThemeIcon(t); }
    </script>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, query, orderBy, onSnapshot, doc, getDoc, addDoc, serverTimestamp, setDoc, increment, getDocs, Timestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        window.customAlert = function(title, desc, type = 'success') { const el = document.getElementById('customAlert'); document.getElementById('caTitle').innerText = title; document.getElementById('caDesc').innerText = desc; const iconEl = document.getElementById('caIcon'); if(type === 'success') { iconEl.className = 'cp-icon success'; iconEl.innerHTML = '<i class="fa-solid fa-check"></i>'; } else if(type === 'error') { iconEl.className = 'cp-icon error'; iconEl.innerHTML = '<i class="fa-solid fa-xmark"></i>'; } else { iconEl.className = 'cp-icon warning'; iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; } el.classList.add('show'); }
        window.closeCustomAlert = function() { document.getElementById('customAlert').classList.remove('show'); }
        window.customConfirm = function(title, desc, onYes) { const el = document.getElementById('customConfirm'); document.getElementById('ccTitle').innerText = title; document.getElementById('ccDesc').innerText = desc; document.getElementById('ccBtnYes').onclick = function() { closeCustomConfirm(); onYes(); }; el.classList.add('show'); }
        window.closeCustomConfirm = function() { document.getElementById('customConfirm').classList.remove('show'); }
        window.showLoading = function(title = "Memproses...") { document.getElementById('clTitle').innerText = title; document.getElementById('customLoading').classList.add('show'); }
        window.hideLoading = function() { document.getElementById('customLoading').classList.remove('show'); }

        let userRole = "member"; let currentUserName = "Admin"; let allDataLaporan = []; let filterState = 'semua'; let memberMap = {}; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists()) {
                    userRole = (docSnap.data().role || "member").toLowerCase();
                    currentUserName = docSnap.data().nama_lengkap || "Pengurus";
                    if (["developer", "superadmin", "bendahara"].includes(userRole)) { 
                        document.getElementById('btnInputManual').style.display = 'flex'; 
                        loadDropdownMember(); 
                    }
                    loadLaporanData();
                }

                onSnapshot(doc(db, "settings", "rekap_sistem"), (ds) => {
                    if (ds.exists()) { document.getElementById('uiTotalKas').innerText = "Rp " + (ds.data().total_kas || 0).toLocaleString('id-ID'); }
                });
            } else { window.location.href = 'login.html'; }
        });

        // NAMA MEMBER DIAMBIL, TAPI YG DIKIRIM KE DB ADALAH "EMAIL" (Biar match ke Donatur)
        async function loadDropdownMember() {
            try {
                const snap = await getDocs(query(collection(db, "users"), orderBy("nama_lengkap", "asc")));
                let options = '<option value="Hamba Allah">-- Hamba Allah (Luar Anggota) --</option>';
                snap.forEach(d => {
                    const u = d.data();
                    if(u.status !== "Banned" && u.status !== "Pending Admin") {
                        // Value = Email, Tampilan = Nama Lengkap
                        options += `<option value="${u.email}">${u.nama_lengkap} (${u.email})</option>`;
                        memberMap[u.email] = u.nama_lengkap; // Simpan map buat nampilin nama di laporan
                    }
                });
                document.getElementById('trxPengirim').innerHTML = options;
            } catch(e) {
                console.error("Gagal memuat list anggota:", e);
            }
        }

        window.togglePengirim = function() { const v = document.getElementById('trxJenis').value; document.getElementById('boxPengirim').style.display = v === 'Pemasukan' ? 'block' : 'none'; }
        
        window.openModalManual = function() { 
            document.getElementById('modalInputManual').classList.add('show'); 
            document.getElementById('formManual').reset(); 
            document.getElementById('trxTanggal').valueAsDate = new Date();
            togglePengirim(); 
        }
        
        window.closeModalManual = function() { document.getElementById('modalInputManual').classList.remove('show'); }

        window.submitManualTrx = async function(e) {
            e.preventDefault(); showLoading("Menyimpan Laporan...");
            try {
                const jenis = document.getElementById('trxJenis').value;
                const nominal = Number(document.getElementById('trxNominal').value);
                const ket = document.getElementById('trxKet').value;
                const pengirim = jenis === 'Pemasukan' ? document.getElementById('trxPengirim').value : "Sistem Kas";

                const tglInputStr = document.getElementById('trxTanggal').value;
                let finalDate; let isBulanIni = false; const now = new Date();

                if(tglInputStr) {
                    const [thn, bln, tgl] = tglInputStr.split('-');
                    const manualDate = new Date(thn, bln - 1, tgl, 12, 0, 0); 
                    finalDate = Timestamp.fromDate(manualDate);
                    // Ngecek kalau inputan masih di bulan dan tahun yg sama
                    if(manualDate.getMonth() === now.getMonth() && manualDate.getFullYear() === now.getFullYear()) {
                        isBulanIni = true;
                    }
                } else {
                    finalDate = serverTimestamp();
                    isBulanIni = true;
                }

                await addDoc(collection(db, "transactions"), { 
                    jenis: jenis, 
                    metode: "Input Manual", 
                    status: "approved", 
                    pengirim: pengirim, // Ini bakal nyimpen EMAIL!
                    nama_keterangan: ket, 
                    nominal: nominal, 
                    tanggal: finalDate, 
                    dieksekusi_oleh: currentUserName 
                });
                
                const rekapRef = doc(db, "settings", "rekap_sistem");
                const incValue = jenis === 'Pemasukan' ? nominal : -nominal;
                
                let updateData = { total_kas: increment(incValue) };
                // PERBAIKAN: Kalau inputnya bulan ini, Saldo Bulan Ini ikutan nambah!
                if (isBulanIni) {
                    updateData.kas_bulan_ini = increment(incValue);
                }
                
                await setDoc(rekapRef, updateData, { merge: true });

                hideLoading(); customAlert("Berhasil", "Transaksi manual tersimpan. Klasemen dan saldo telah di-update.", "success"); closeModalManual();
            } catch (err) { hideLoading(); customAlert("Gagal", err.message, "error"); }
        }

        // FUNGSI HAPUS TRANSAKSI (KHUSUS DEVELOPER)
        window.hapusTrxLaporan = async function(docId, nominal, isMasukStr) {
            customConfirm("Hapus Permanen?", "Data transaksi akan dihapus dan Saldo Kas otomatis dikurangi. Lanjutkan?", async () => {
                showLoading("Menghapus...");
                try {
                    const trxSnap = await getDoc(doc(db, "transactions", docId));
                    if(!trxSnap.exists()) throw new Error("Data tidak ditemukan");
                    const trxData = trxSnap.data();

                    await deleteDoc(doc(db, "transactions", docId));
                    
                    const isMasuk = isMasukStr === 'true';
                    const incValue = isMasuk ? -nominal : nominal;
                    
                    let updateData = { total_kas: increment(incValue) };

                    if (trxData.tanggal) {
                        const trxDate = trxData.tanggal.toDate();
                        const now = new Date();
                        if (trxDate.getMonth() === now.getMonth() && trxDate.getFullYear() === now.getFullYear()) {
                            updateData.kas_bulan_ini = increment(incValue);
                        }
                    }

                    await setDoc(doc(db, "settings", "rekap_sistem"), updateData, { merge: true });
                    hideLoading(); customAlert("Dihapus", "Transaksi berhasil dicabut dari sistem.", "success");
                } catch(e) { hideLoading(); customAlert("Gagal", e.message, "error"); }
            });
        }

        window.downloadLaporanExcel = async function() {
            showLoading("Menyiapkan Data Laporan...");
            try {
                const snap = await getDocs(collection(db, "transactions"));
                let rawData = [];
                snap.forEach(d => { if(d.data().status === "approved") { rawData.push({id: d.id, ...d.data()}); } });
                
                rawData.sort((a,b) => {
                    let t1 = (a.tanggal && typeof a.tanggal.toMillis === 'function') ? a.tanggal.toMillis() : 0;
                    let t2 = (b.tanggal && typeof b.tanggal.toMillis === 'function') ? b.tanggal.toMillis() : 0;
                    return t2 - t1;
                });
                
                let csvContent = "\uFEFFsep=,\nTanggal,ID Transaksi,Jenis,Metode Pembayaran,Keterangan / Tujuan,Nominal (Rp),Pengirim,Status Eksekusi,Dieksekusi Oleh\n";
                
                rawData.forEach(d => {
                    const tglStr = d.tanggal && typeof d.tanggal.toDate === 'function' ? d.tanggal.toDate().toLocaleString('id-ID') : "-";
                    const jenis = d.jenis || "-";
                    const metode = d.metode || "-";
                    const ket = `"${(d.nama_keterangan || "-").replace(/"/g, '""')}"`;
                    const nom = d.nominal || 0;
                    const rawPengirim = d.pengirim || "-";
                    const pgr = `"${memberMap[rawPengirim] || rawPengirim}"`; // Translate email ke nama di Excel
                    const sts = d.status || "-";
                    const eks = `"${(d.dieksekusi_oleh || "-").replace(/"/g, '""')}"`;
                    
                    csvContent += `${tglStr},${d.id},${jenis},${metode},${ket},${nom},${pgr},${sts},${eks}\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.setAttribute("href", URL.createObjectURL(blob));
                link.setAttribute("download", `Laporan_Pembukuan_KGR_${new Date().toLocaleDateString('id-ID').replace(/\//g, '-')}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                hideLoading(); customAlert("Berhasil", "Laporan berhasil diunduh.", "success");
            } catch (error) { hideLoading(); customAlert("Gagal Mengunduh", "Terjadi kesalahan sistem.", "error"); }
        }

        function loadLaporanData() {
            onSnapshot(collection(db, "transactions"), (snap) => {
                try {
                    allDataLaporan = [];
                    snap.forEach(d => { if (d.data().status === "approved") { allDataLaporan.push({ id: d.id, ...d.data() }); } });
                    
                    allDataLaporan.sort((a,b) => {
                        let t1 = (a.tanggal && typeof a.tanggal.toMillis === 'function') ? a.tanggal.toMillis() : 0;
                        let t2 = (b.tanggal && typeof b.tanggal.toMillis === 'function') ? b.tanggal.toMillis() : 0;
                        return t2 - t1;
                    });
                    renderLaporan();
                } catch (err) { document.getElementById('listLaporan').innerHTML = '<div class="empty-state">Gagal menampilkan data. Cek koneksi Anda.</div>'; }
            }, (error) => { document.getElementById('listLaporan').innerHTML = '<div class="empty-state">Error membaca database.</div>'; });
        }

        window.filterTrx = function(type, el) { document.querySelectorAll('.ft-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); filterState = type; renderLaporan(); }

        function renderLaporan() {
            const list = document.getElementById('listLaporan');
            let filtered = allDataLaporan;
            if (filterState === 'masuk') filtered = allDataLaporan.filter(x => x.jenis === "Pemasukan");
            if (filterState === 'keluar') filtered = allDataLaporan.filter(x => x.jenis === "Pengeluaran");

            if (filtered.length === 0) { list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-folder-open"></i><p>Belum ada riwayat transaksi.</p></div>'; return; }

            list.innerHTML = filtered.map(d => {
                const isMasuk = d.jenis === "Pemasukan";
                const iconHtml = isMasuk ? `<div class="trx-icon in"><i class="fa-solid fa-arrow-down"></i></div>` : `<div class="trx-icon out"><i class="fa-solid fa-arrow-up"></i></div>`;
                const amountHtml = isMasuk ? `<div class="trx-amount in">+ Rp ${Number(d.nominal).toLocaleString('id-ID')}</div>` : `<div class="trx-amount out">- Rp ${Number(d.nominal).toLocaleString('id-ID')}</div>`;
                const dateStr = d.tanggal && typeof d.tanggal.toDate === 'function' ? d.tanggal.toDate().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';
                
                // Ubah tampilan email jadi Nama Lengkap (kalo terdaftar)
                const dispPengirim = memberMap[d.pengirim] || d.pengirim;

                // TAMPILAN TOMBOL HAPUS (Khusus Dewa)
                let btnHapus = "";
                if (userRole === 'developer') {
                    const isMskStr = isMasuk ? 'true' : 'false';
                    btnHapus = `<div style="margin-top:10px; border-top:1px dashed var(--card-border); padding-top:8px; text-align:right;"><span style="color:var(--danger-red); font-size:10px; font-weight:800; cursor:pointer;" onclick="hapusTrxLaporan('${d.id}', ${d.nominal}, '${isMskStr}')"><i class="fa-solid fa-trash"></i> Hapus Baris Ini</span></div>`;
                }
                
                return `<div class="trx-card"><div class="trx-body">${iconHtml}<div class="trx-info"><div class="trx-title">${d.nama_keterangan || "Sedekah Kas"}</div><div class="trx-date">${dateStr} • ${dispPengirim}</div><div class="trx-badge"><i class="fa-solid fa-check-circle" style="color:var(--emerald-main);"></i> Oleh: ${d.dieksekusi_oleh || "Sistem"}</div></div>${amountHtml}</div>${btnHapus}</div>`;
            }).join('');
        }
    </script>
</body>
</html>
