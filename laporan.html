<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F5F5F7">
    <title>Laporan Keuangan Kas</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --bg-base: #F5F5F7; --text-dark: #1C1C1E; --text-gray: #8E8E93; --gold-primary: #D4AF37; --gold-deep: linear-gradient(135deg, #A67C00, #D4AF37, #8B6914, #B38728); --color-in: #28A745; --color-out: #DC3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E5E5E5; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; background: var(--bg-base); display: flex; flex-direction: column; height: 100vh; }
        .header-page { padding: 30px 24px 20px; display: flex; align-items: center; gap: 15px; background: #FFF; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: #F5F5F7; display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-dark); }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 100px; }
        .balance-card { background: var(--text-dark); color: #FFF; border-radius: 24px; padding: 25px; margin-bottom: 20px; }
        .total-balance { font-size: 28px; font-weight: 900; margin: 10px 0; color: var(--gold-primary); }
        .btn-add { width: 100%; padding: 15px; border-radius: 14px; background: var(--gold-primary); color: #FFF; font-weight: 900; border: none; cursor: pointer; margin-bottom: 20px; }
        .tabs-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 800; background: #FFF; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; text-align: center; }
        .tab-btn.active { background: var(--gold-deep); color: #FFF; }
        .trx-item { background: #FFF; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: flex-end; z-index: 100; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: #FFF; border-radius: 28px 28px 0 0; padding: 25px; width: 100%; max-width: 480px; }
        .form-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #CCC; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Laporan Keuangan</h2>
        </div>
        <div class="content-area">
            <button id="btnTambahTrx" class="btn-add" style="display: none;" onclick="document.getElementById('trxModal').classList.add('show')"><i class="fa-solid fa-plus"></i> Catat Transaksi</button>
            <div class="balance-card">
                <div style="font-size: 10px; text-transform: uppercase;">Total Kas Tersedia</div>
                <div class="total-balance" id="uiTotalSaldo">Rp 0</div>
            </div>
            <div class="tabs-container">
                <div class="tab-btn active" onclick="filterTrx('Semua', this)">Semua</div>
                <div class="tab-btn" onclick="filterTrx('Pemasukan', this)">Masuk</div>
                <div class="tab-btn" onclick="filterTrx('Pengeluaran', this)">Keluar</div>
            </div>
            <div id="trxList"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="trxModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Catat Transaksi</h3>
            <form id="formTrx">
                <select id="trxType" class="form-input"><option value="Pemasukan">Pemasukan</option><option value="Pengeluaran">Pengeluaran</option></select>
                <input type="text" id="trxName" class="form-input" placeholder="Keterangan" required>
                <input type="number" id="trxAmount" class="form-input" placeholder="Nominal" required>
                <button type="submit" class="btn-add">Simpan</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, getDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let currentFilter = 'Semua';
        let transactions = [];

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = 'login.html';
            const userSnap = await getDoc(doc(db, "users", user.email));
            const role = userSnap.data().role;
            if (role === 'superadmin' || role === 'bendahara') document.getElementById('btnTambahTrx').style.display = 'block';
        });

        const trxRef = collection(db, "transactions");
        onSnapshot(query(trxRef, orderBy("tanggal", "desc")), (snap) => {
            transactions = [];
            let total = 0;
            snap.forEach(d => {
                const data = d.data();
                transactions.push(data);
                if(data.jenis === 'Pemasukan') total += Number(data.nominal); else total -= Number(data.nominal);
            });
            document.getElementById('uiTotalSaldo').innerText = "Rp " + total.toLocaleString('id-ID');
            render();
        });

        window.filterTrx = (f, el) => {
            currentFilter = f;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const list = document.getElementById('trxList');
            list.innerHTML = transactions.filter(t => currentFilter === 'Semua' || t.jenis === currentFilter).map(t => `
                <div class="trx-item">
                    <div><strong>${t.nama_keterangan}</strong><br><small>${t.jenis}</small></div>
                    <div style="color: ${t.jenis === 'Pemasukan' ? '#28A745' : '#DC3545'}">Rp ${Number(t.nominal).toLocaleString('id-ID')}</div>
                </div>
            `).join('');
        }

        document.getElementById('formTrx').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(trxRef, {
                jenis: document.getElementById('trxType').value,
                nama_keterangan: document.getElementById('trxName').value,
                nominal: Number(document.getElementById('trxAmount').value),
                tanggal: serverTimestamp()
            });
            document.getElementById('trxModal').classList.remove('show');
        }
    </script>
</body>
</html>
