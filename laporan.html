<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A">
    <title>Laporan Keuangan Kas - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { 
            --emerald-main: #059669; --emerald-dark: #022C22; 
            --color-in: #34D399; --color-out: #FCA5A5; --gold-accent: #FBBF24;
            --danger-red: #EF4444; --warning-yellow: #F59E0B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #0F172A; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; color: #FFF; margin: 0;}

        /* NEON ORBS */
        .orb { position: absolute; border-radius: 50%; filter: blur(70px); z-index: 0; animation: float 10s infinite alternate ease-in-out;}
        .orb-1 { top: 10%; left: -10%; width: 250px; height: 250px; background: rgba(5, 150, 105, 0.4); }
        .orb-2 { bottom: 10%; right: -10%; width: 300px; height: 300px; background: rgba(5, 150, 105, 0.3); animation-delay: -5s;}
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

        .app-container { width: 100%; max-width: 480px; background: transparent; display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 10; overflow-x: hidden; overflow-y: auto; scrollbar-width: none;}
        .app-container::-webkit-scrollbar { display: none; }
        @media (min-width: 600px) { .app-container { height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.5); border: 4px solid rgba(255,255,255,0.1); margin: auto; } }

        /* GLASSMORPHISM */
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.2); border-left: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); border-radius: 24px; color: #FFF;}
        .glass-emerald { background: linear-gradient(135deg, rgba(5, 150, 105, 0.4) 0%, rgba(2, 44, 34, 0.6) 100%); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(5, 150, 105, 0.5); box-shadow: 0 15px 35px rgba(5, 150, 105, 0.3); border-radius: 24px; color: #FFF;}

        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px);}
        .btn-back { width: 42px; height: 42px; border-radius: 14px; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; cursor: pointer; color: #FFF; transition: 0.2s; border: 1px solid rgba(255,255,255,0.2);}
        .btn-back:active { transform: scale(0.9); background: var(--emerald-main); }
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: #FFF;}
        
        .content-area { flex-grow: 1; padding: 20px 24px 100px; }
        
        .balance-card { padding: 25px; margin-bottom: 20px; position: relative; overflow: hidden;}
        .total-balance { font-size: 32px; font-weight: 900; margin: 5px 0 0; color: #FFF; letter-spacing: -1px; text-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        
        .btn-add { width: 100%; padding: 18px; border-radius: 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #FFF; font-size: 14px; font-weight: 900; cursor: pointer; margin-bottom: 25px; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-add:active { transform: scale(0.96); background: var(--emerald-main); border-color: var(--emerald-main);}
        
        .filter-section { display: flex; gap: 10px; margin-bottom: 15px; align-items: center;}
        .filter-select { flex: 1; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); font-size: 13px; font-weight: 800; color: #FFF; outline: none; appearance: none;}
        .filter-select option { background: #0F172A; color: #FFF; }
        
        .summary-box { padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
        .sum-item { flex: 1; text-align: center; }
        .sum-item:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.1); }
        .sum-label { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-bottom: 5px;}
        .sum-val { font-size: 13px; font-weight: 900; }
        .val-in { color: var(--color-in); }
        .val-out { color: var(--color-out); }
        .val-total { color: #FFF; }

        .tabs-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 800; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; text-align: center; color: rgba(255,255,255,0.7); transition: 0.2s;}
        .tab-btn.active { background: var(--emerald-main); color: #FFF; border-color: transparent;}
        
        .trx-item { padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;}
        .trx-item:active { transform: scale(0.98); background: rgba(255,255,255,0.1);}
        .icon-box { width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0;}
        .icon-in { background: rgba(52, 211, 153, 0.2); color: var(--color-in); }
        .icon-out { background: rgba(252, 165, 165, 0.2); color: var(--color-out); }
        .trx-info { flex-grow: 1; padding: 0 12px; overflow: hidden;}
        .trx-info h4 { font-size: 13px; font-weight: 900; color: #FFF; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .trx-info p { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 700;}
        .trx-amount { font-size: 14px; font-weight: 900; text-align: right;}
        
        .export-group { display: flex; gap: 10px; margin-bottom: 25px;}
        .btn-export { flex: 1; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: #FFF; transition: 0.2s;}
        .btn-export.excel { background: rgba(16, 185, 129, 0.2); color: #34D399; }
        .btn-export.pdf { background: rgba(239, 68, 68, 0.2); color: #FCA5A5; }
        .btn-export:active { transform: scale(0.95); }
        
        .empty-state { text-align: center; padding: 40px 20px; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px;}
        .empty-state i { font-size: 30px; margin-bottom: 10px; opacity: 0.5;}

        /* MODAL DARK THEME */
        .modal-overlay, .cp-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .modal-overlay { align-items: flex-end; padding: 0; }
        .cp-overlay { padding: 20px; }
        .modal-overlay.show, .cp-overlay.show { opacity: 1; visibility: visible; }
        
        .modal-content { background: rgba(30, 41, 59, 0.98); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 32px 32px 0 0; padding: 30px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.5); color: #FFF; max-height: 85vh; overflow-y: auto;}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h3 { font-size: 18px; font-weight: 900; color: #FFF; }
        .btn-close-modal { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; color: #FFF; transition: 0.2s;}
        .btn-close-modal:active { transform: scale(0.9); }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.7); margin-bottom: 8px; text-transform: uppercase;}
        .form-input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 15px; font-size: 13px; font-weight: 700; color: #FFF; outline: none; background: rgba(255,255,255,0.05); transition: 0.2s;}
        .form-input:focus { border-color: var(--emerald-main); background: rgba(255,255,255,0.1);}

        /* CUSTOM POPUP (ALERT & CONFIRM) */
        .cp-box { background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; width: 100%; max-width: 320px; text-align: center; padding: 30px 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 25px 50px rgba(0,0,0,0.5); color: #FFF; }
        .cp-overlay.show .cp-box { transform: scale(1); }
        .cp-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 0 auto 15px; }
        .cp-icon.success { background: rgba(5, 150, 105, 0.2); color: #34D399; }
        .cp-icon.error { background: rgba(239, 68, 68, 0.2); color: var(--danger-red); }
        .cp-icon.warning { background: rgba(245, 158, 11, 0.2); color: var(--gold-accent); }
        .cp-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; color: #FFF;}
        .cp-desc { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 25px; line-height: 1.5; }
        .cp-btn-wrap { display: flex; gap: 10px; }
        .cp-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .cp-btn:active { transform: scale(0.95); }
        .cp-btn-primary { background: var(--emerald-main); color: #FFF; box-shadow: 0 5px 15px rgba(5,150,105,0.3);}
        .cp-btn-cancel { background: rgba(255,255,255,0.1); color: #FFF; border: 1px solid rgba(255,255,255,0.2);}
        .cp-btn-danger { background: var(--danger-red); color: #FFF; box-shadow: 0 5px 15px rgba(239,68,68,0.3);}
        .spinner-custom { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--emerald-main); animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="cp-overlay" id="customAlert">
        <div class="cp-box">
            <div class="cp-icon success" id="caIcon"><i class="fa-solid fa-check"></i></div>
            <h3 class="cp-title" id="caTitle">Pemberitahuan</h3>
            <p class="cp-desc" id="caDesc">Pesan</p>
            <button class="cp-btn cp-btn-primary" onclick="closeCustomAlert()" style="width: 100%;">Tutup</button>
        </div>
    </div>
    <div class="cp-overlay" id="customConfirm">
        <div class="cp-box">
            <div class="cp-icon warning"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 class="cp-title" id="ccTitle">Konfirmasi</h3>
            <p class="cp-desc" id="ccDesc">Apakah Anda yakin?</p>
            <div class="cp-btn-wrap">
                <button class="cp-btn cp-btn-cancel" onclick="closeCustomConfirm()">Batal</button>
                <button class="cp-btn cp-btn-danger" id="ccBtnYes">Ya, Eksekusi</button>
            </div>
        </div>
    </div>
    <div class="cp-overlay" id="customLoading">
        <div class="cp-box" style="padding: 40px 20px;">
            <div class="spinner-custom"></div>
            <h3 class="cp-title" id="clTitle" style="margin-bottom: 0;">Memproses...</h3>
        </div>
    </div>

    <div class="cp-overlay" id="modalImage" onclick="closeImageView()">
        <div class="cp-box" style="padding: 10px; background: transparent; border: none; box-shadow: none; max-width: 450px;" onclick="event.stopPropagation()">
            <img id="imgViewerSrc" src="" style="width: 100%; border-radius: 24px; border: 4px solid rgba(255,255,255,0.5); max-height: 70vh; object-fit: contain;">
            <button class="btn-close-modal" style="margin: 15px auto 0; width: 40px; height: 40px;" onclick="closeImageView()"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Laporan Pembukuan</h2>
        </div>
        
        <div class="content-area">
            <button id="btnTambahTrx" class="btn-add" style="display: none;" onclick="document.getElementById('trxModal').classList.add('show')"><i class="fa-solid fa-pen-to-square"></i> Input Transaksi Manual</button>
            
            <div class="glass-emerald balance-card">
                <div style="font-size: 11px; text-transform: uppercase; font-weight: 800; color: var(--gold-accent);">Saldo Kas Keseluruhan (All-Time)</div>
                <div class="total-balance" id="uiTotalSaldo">Rp 0</div>
            </div>

            <div class="filter-section">
                <select id="filterBulan" class="filter-select" onchange="applyMonthFilter()">
                    <option value="all">📂 Semua Riwayat Laporan</option>
                </select>
            </div>

            <div class="glass-panel summary-box">
                <div class="sum-item">
                    <div class="sum-label">Pemasukan</div>
                    <div class="sum-val val-in" id="sumIn">+ Rp 0</div>
                </div>
                <div class="sum-item">
                    <div class="sum-label">Pengeluaran</div>
                    <div class="sum-val val-out" id="sumOut">- Rp 0</div>
                </div>
                <div class="sum-item">
                    <div class="sum-label">Sisa Periode</div>
                    <div class="sum-val val-total" id="sumTotal">Rp 0</div>
                </div>
            </div>

            <div class="export-group">
                <button class="btn-export excel" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> File Excel</button>
                <button class="btn-export pdf" onclick="exportToPDF()"><i class="fa-solid fa-file-pdf"></i> Dokumen PDF</button>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="filterTrx('Semua', this)">Semua Riwayat</button>
                <button class="tab-btn" onclick="filterTrx('Pemasukan', this)">Kas Masuk</button>
                <button class="tab-btn" onclick="filterTrx('Pengeluaran', this)">Dana Keluar</button>
            </div>
            
            <div id="trxList">
                <div class="empty-state"><i class="fa-solid fa-spinner fa-spin" style="color:var(--emerald-main);"></i><p>Menarik Laporan Server...</p></div>
            </div>
        </div>
    </div>

    <!-- MODAL CATAT MANUAL -->
    <div id="trxModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Catat Pembukuan Baru</h3>
                <button type="button" onclick="document.getElementById('trxModal').classList.remove('show')" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="formTrx" onsubmit="submitTrx(event)">
                <div class="form-group">
                    <label class="form-label">Tanggal Transaksi</label>
                    <input type="date" id="trxDate" class="form-input" style="padding:15px; margin-bottom:0;" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Arus Transaksi</label>
                    <select id="trxType" class="form-input" style="padding:15px; margin-bottom:0;">
                        <option value="Pemasukan">Pemasukan (Uang Masuk ke Kas)</option>
                        <option value="Pengeluaran">Pengeluaran (Uang Keluar)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Keterangan / Rincian Singkat</label>
                    <input type="text" id="trxName" class="form-input" style="padding:15px; margin-bottom:0;" placeholder="Misal: Beli Konsumsi Rapat" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Nominal Rupiah (Rp)</label>
                    <input type="number" id="trxAmount" class="form-input" style="padding:15px; margin-bottom:0;" placeholder="Cth: 150000" required autocomplete="off">
                </div>
                <div class="form-group" style="margin-bottom: 25px;">
                    <label class="form-label">Foto Bukti / Nota (Opsional)</label>
                    <input type="file" id="trxBukti" class="form-input" accept="image/*" style="padding: 10px; margin-bottom:0;">
                </div>
                <button type="submit" class="btn-add" style="margin-bottom: 0; background: var(--emerald-main); border:none;"><i class="fa-solid fa-floppy-disk"></i> Simpan ke Server</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, query, orderBy, onSnapshot, addDoc, getDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // KENDALI CUSTOM MODAL
        window.customAlert = function(title, desc, type = 'success') {
            const el = document.getElementById('customAlert'); document.getElementById('caTitle').innerText = title; document.getElementById('caDesc').innerText = desc;
            const iconEl = document.getElementById('caIcon');
            if(type === 'success') { iconEl.className = 'cp-icon success'; iconEl.innerHTML = '<i class="fa-solid fa-check"></i>'; }
            else if(type === 'error') { iconEl.className = 'cp-icon error'; iconEl.innerHTML = '<i class="fa-solid fa-xmark"></i>'; }
            else { iconEl.className = 'cp-icon warning'; iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; }
            el.classList.add('show');
        }
        window.closeCustomAlert = function() { document.getElementById('customAlert').classList.remove('show'); }
        window.customConfirm = function(title, desc, onYes) {
            const el = document.getElementById('customConfirm'); document.getElementById('ccTitle').innerText = title; document.getElementById('ccDesc').innerText = desc;
            document.getElementById('ccBtnYes').onclick = function() { closeCustomConfirm(); onYes(); }; el.classList.add('show');
        }
        window.closeCustomConfirm = function() { document.getElementById('customConfirm').classList.remove('show'); }
        window.showLoading = function(title = "Memproses...") { document.getElementById('clTitle').innerText = title; document.getElementById('customLoading').classList.add('show'); }
        window.hideLoading = function() { document.getElementById('customLoading').classList.remove('show'); }

        window.viewImage = function(src) { document.getElementById('imgViewerSrc').src = src; document.getElementById('modalImage').classList.add('show'); }
        window.closeImageView = function() { document.getElementById('modalImage').classList.remove('show'); }

        let currentTabFilter = 'Semua';
        let currentFilterMonth = 'all';
        window.rawTransactions = [];
        let userRole = "member";

        function generateMonthOptions() {
            const select = document.getElementById('filterBulan');
            const now = new Date();
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            
            for (let i = 0; i < 12; i++) { 
                let d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                let val = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2, '0')}`;
                let text = `${months[d.getMonth()]} ${d.getFullYear()}`;
                
                let opt = document.createElement('option');
                opt.value = val;
                opt.innerHTML = (i === 0 ? "📅 Bulan Ini (" : "📅 ") + text + (i === 0 ? ")" : "");
                select.appendChild(opt);
            }
        }
        generateMonthOptions();

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = 'login.html';
            const userSnap = await getDoc(doc(db, "users", user.email));
            userRole = (userSnap.data().role || "").toLowerCase();
            
            if (userRole === 'superadmin' || userRole === 'bendahara') {
                document.getElementById('btnTambahTrx').style.display = 'flex';
            }
            render(); 
        });

        document.getElementById('trxDate').valueAsDate = new Date();

        const trxRef = collection(db, "transactions");
        onSnapshot(query(trxRef, orderBy("tanggal", "desc")), (snap) => {
            window.rawTransactions = [];
            let totalAllTime = 0;
            
            snap.forEach(d => {
                const data = d.data();
                if(data.status !== "pending" && data.status !== "rejected") {
                    let recDate = new Date();
                    if(data.tanggal) recDate = data.tanggal.toDate(); 
                    
                    window.rawTransactions.push({ ...data, parsedDate: recDate, docId: d.id });
                    if(data.jenis === 'Pemasukan') totalAllTime += Number(data.nominal); 
                    else totalAllTime -= Number(data.nominal);
                }
            });
            document.getElementById('uiTotalSaldo').innerText = "Rp " + totalAllTime.toLocaleString('id-ID');
            render();
        });

        window.applyMonthFilter = () => {
            currentFilterMonth = document.getElementById('filterBulan').value;
            render();
        }

        window.filterTrx = (f, el) => {
            currentTabFilter = f;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const list = document.getElementById('trxList');
            let sumIn = 0; let sumOut = 0;

            const filtered = window.rawTransactions.filter(t => {
                const matchTab = currentTabFilter === 'Semua' || t.jenis === currentTabFilter;
                let matchMonth = true;
                if (currentFilterMonth !== 'all') {
                    const [fYear, fMonth] = currentFilterMonth.split('-');
                    if (t.parsedDate.getFullYear() != fYear || (t.parsedDate.getMonth() + 1) != fMonth) matchMonth = false;
                }
                if (matchMonth) {
                    if(t.jenis === 'Pemasukan') sumIn += Number(t.nominal); else sumOut += Number(t.nominal);
                }
                return matchTab && matchMonth;
            });
            
            document.getElementById('sumIn').innerText = "+ Rp " + sumIn.toLocaleString('id-ID');
            document.getElementById('sumOut').innerText = "- Rp " + sumOut.toLocaleString('id-ID');
            document.getElementById('sumTotal').innerText = "Rp " + (sumIn - sumOut).toLocaleString('id-ID');

            if(filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-file-invoice"></i><p>Tidak ada riwayat pembukuan pada periode ini.</p></div>';
                return;
            }

            list.innerHTML = filtered.map(t => {
                const isMasuk = t.jenis === 'Pemasukan';
                const fDate = t.parsedDate.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'});
                
                const btnDelete = (userRole === 'superadmin' || userRole === 'bendahara') 
                    ? `<button onclick="hapusLaporan('${t.docId}')" style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:6px; color:var(--color-out); cursor:pointer; font-size:14px; margin-left:12px; transition:0.2s;"><i class="fa-solid fa-trash-can"></i></button>` : '';
                
                const btnImage = (t.bukti_image) 
                    ? `<button onclick="viewImage('${t.bukti_image}')" style="background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.3); border-radius:10px; padding:6px; color:var(--color-in); cursor:pointer; font-size:14px; margin-left:12px; transition:0.2s;"><i class="fa-solid fa-image"></i></button>` : '';

                return `
                <div class="glass-panel trx-item">
                    <div style="display:flex; align-items:center; gap:12px; overflow:hidden;">
                        <div class="icon-box ${isMasuk ? 'icon-in' : 'icon-out'}"><i class="fa-solid ${isMasuk?'fa-arrow-down':'fa-arrow-up'}"></i></div>
                        <div class="trx-info">
                            <h4>${t.nama_keterangan}</h4>
                            <p>${fDate}</p>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <div class="trx-amount" style="color: ${isMasuk ? 'var(--color-in)' : 'var(--color-out)'}">${isMasuk?'+':'-'} Rp ${Number(t.nominal).toLocaleString('id-ID')}</div>
                        ${btnImage}
                        ${btnDelete}
                    </div>
                </div>
            `}).join('');
        }

        window.hapusLaporan = function(id) {
            customConfirm("Hapus Permanen", "Yakin ingin MENGHAPUS riwayat transaksi ini? Saldo Kas akan otomatis disesuaikan kembali.", async () => {
                showLoading("Menghapus Laporan...");
                try { 
                    await deleteDoc(doc(db, "transactions", id)); 
                    hideLoading(); customAlert("Berhasil", "Data pembukuan telah dihapus.", "success");
                } catch(e) { hideLoading(); customAlert("Gagal", "Error menghapus data.", "error"); }
            });
        }

        const getBase64 = (file) => new Promise((res, rej) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => res(reader.result); reader.onerror = error => rej(error); });

        window.submitTrx = async function(e) {
            e.preventDefault();
            
            // PROTEKSI MEMORI BASE64 LIMIT 3MB
            const fileBuktiManual = document.getElementById('trxBukti').files[0];
            if(fileBuktiManual && fileBuktiManual.size > 3 * 1024 * 1024) {
                return customAlert("Foto Terlalu Besar", "Ukuran foto/nota maksimal 3MB. Silakan kompres foto sebelum upload.", "warning");
            }

            showLoading("Menyimpan ke Server...");
            
            try {
                let base64Image = null;
                if(fileBuktiManual) base64Image = await getBase64(fileBuktiManual);

                const dateVal = document.getElementById('trxDate').value;
                const finalDate = dateVal ? new Date(dateVal) : new Date();

                await addDoc(trxRef, {
                    jenis: document.getElementById('trxType').value,
                    nama_keterangan: document.getElementById('trxName').value,
                    nominal: Number(document.getElementById('trxAmount').value),
                    status: "approved",
                    pengirim: "Pencatatan Manual (" + userRole + ")",
                    bukti_image: base64Image,
                    tanggal: finalDate 
                });
                
                hideLoading();
                customAlert("Berhasil", "Pencatatan manual telah ditambahkan ke Buku Kas.", "success");
                document.getElementById('trxModal').classList.remove('show');
                e.target.reset();
                document.getElementById('trxDate').valueAsDate = new Date(); 
            } catch(err) { hideLoading(); customAlert("Gagal", "Sistem gagal menyimpan.", "error"); }
        }

        // FUNGSI EXPORT
        window.exportToExcel = () => {
            showLoading("Menyiapkan Data Excel...");
            setTimeout(() => {
                let csv = "data:text/csv;charset=utf-8,Tanggal,Keterangan,Jenis,Nominal\n";
                const currentList = window.rawTransactions.filter(t => {
                    let mType = currentTabFilter === 'Semua' || t.jenis === currentTabFilter;
                    let matchMonth = true;
                    if (currentFilterMonth !== 'all') {
                        const [fYear, fMonth] = currentFilterMonth.split('-');
                        if (t.parsedDate.getFullYear() != fYear || (t.parsedDate.getMonth() + 1) != fMonth) matchMonth = false;
                    }
                    return mType && matchMonth;
                });

                currentList.forEach(t => { csv += `${t.parsedDate.toISOString().split('T')[0]},${(t.nama_keterangan||"").replace(/,/g,' ')},${t.jenis},${t.nominal}\n`; });
                const link = document.createElement("a");
                link.href = encodeURI(csv); link.download = `Laporan_Kas_KGR.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                hideLoading(); customAlert("Berhasil", "File Excel Kas telah diunduh.", "success");
            }, 800);
        };

        window.exportToPDF = () => {
            showLoading("Mencetak PDF...");
            setTimeout(() => {
                const currentList = window.rawTransactions.filter(t => {
                    let mType = currentTabFilter === 'Semua' || t.jenis === currentTabFilter;
                    let matchMonth = true;
                    if (currentFilterMonth !== 'all') {
                        const [fYear, fMonth] = currentFilterMonth.split('-');
                        if (t.parsedDate.getFullYear() != fYear || (t.parsedDate.getMonth() + 1) != fMonth) matchMonth = false;
                    }
                    return mType && matchMonth;
                });

                const el = document.createElement('div');
                el.style.padding = '30px'; el.style.fontFamily = 'Helvetica, Arial, sans-serif';
                let rows = "";
                let totalMasuk = 0, totalKeluar = 0;

                currentList.forEach(t => {
                    if(t.jenis === 'Pemasukan') totalMasuk += Number(t.nominal); else totalKeluar += Number(t.nominal);
                    rows += `<tr style="border-bottom: 1px solid #EEE;">
                        <td style="padding:10px; font-size:12px;">${t.parsedDate.toLocaleDateString('id-ID')}</td>
                        <td style="padding:10px; font-size:12px; font-weight:bold;">${t.nama_keterangan}</td>
                        <td style="padding:10px; font-size:12px;">${t.jenis}</td>
                        <td style="padding:10px; font-size:12px; text-align:right;">Rp ${Number(t.nominal).toLocaleString('id-ID')}</td>
                    </tr>`;
                });

                let periodeStr = "Semua Riwayat (All-Time)";
                if (currentFilterMonth !== 'all') {
                    const sel = document.getElementById('filterBulan');
                    periodeStr = sel.options[sel.selectedIndex].text.replace('📅 ', '').replace(' (Bulan Ini)', '');
                }

                el.innerHTML = `
                    <h2 style="text-align:center; color:#064E3B; margin-bottom:5px; text-transform:uppercase;">Laporan Keuangan Kas KGR</h2>
                    <h4 style="text-align:center; color:#333; margin-bottom:20px; font-weight:normal;">Ojol Anak Babah Alun</h4>
                    <div style="background:#F4F6F5; padding:15px; border-radius:10px; margin-bottom:20px;">
                        <p style="font-size:12px; margin-bottom:5px;"><strong>Periode Laporan:</strong> ${periodeStr}</p>
                        <p style="font-size:12px; margin-bottom:5px;"><strong>Total Kas Masuk:</strong> Rp ${totalMasuk.toLocaleString('id-ID')}</p>
                        <p style="font-size:12px; margin-bottom:5px;"><strong>Total Kas Keluar:</strong> Rp ${totalKeluar.toLocaleString('id-ID')}</p>
                        <p style="font-size:14px; margin-top:10px; color:#064E3B;"><strong>Sisa Saldo Periode: Rp ${(totalMasuk - totalKeluar).toLocaleString('id-ID')}</strong></p>
                    </div>
                    <table style="width:100%; border-collapse:collapse;">
                        <tr style="background:#059669; color:#FFF; text-align:left;">
                            <th style="padding:12px;">Tanggal</th><th style="padding:12px;">Keterangan</th><th style="padding:12px;">Jenis</th><th style="padding:12px; text-align:right;">Nominal</th>
                        </tr>
                        ${rows}
                    </table>
                    <p style="text-align:center; font-size:10px; color:#999; margin-top:30px;">Dokumen ini dicetak otomatis pada ${new Date().toLocaleString('id-ID')}</p>`;
                
                html2pdf().set({margin:10, filename:`Laporan_Kas_${periodeStr.replace(/ /g,'_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(el).save().then(() => {
                    hideLoading(); customAlert("Berhasil", "File Laporan PDF telah diunduh.", "success");
                });
            }, 800);
        };
    </script>
    <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err)); }); }</script>
</body>
</html>
