<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F6F5">
    <title>Direktori Anggota - KGR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --emerald-main: #059669; --emerald-dark: #064E3B; --gold-accent: #FBBF24;
            --bg-surface: #F4F6F5; --text-main: #111827; --text-muted: #6B7280; 
            --glass-bg: rgba(255, 255, 255, 0.9);
            --shadow-card: 0 10px 25px rgba(0,0,0,0.04);
        }
        
        body { margin: 0; background: #E2E8E4; font-family: 'Montserrat', sans-serif; color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; text-decoration: none; }

        .app-container { width: 100%; max-width: 480px; background-color: var(--bg-surface); min-height: 100vh; position: relative; display: flex; flex-direction: column; padding-bottom: 50px;}
        @media (min-width: 600px) { .app-container { height: 90vh; max-height: 900px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15); border: 8px solid #FFFFFF; margin: auto; } }

        /* HEADER BERSIH */
        .header-main { padding: 40px 20px 20px; position: relative; z-index: 10; text-align: center; background: #FFF; border-bottom: 1px solid rgba(0,0,0,0.03); border-radius: 0 0 30px 30px; box-shadow: var(--shadow-card);}
        .btn-back { position: absolute; left: 20px; top: 40px; width: 40px; height: 40px; border-radius: 14px; background: #F4F6F5; display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-main); font-size: 18px; transition: 0.2s;}
        .btn-back:active { transform: scale(0.9); }
        .sub-tag { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--emerald-main); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .main-title { font-size: 24px; font-weight: 900; color: var(--text-main); margin: 0; letter-spacing: -1px; }

        /* SEARCH BOX KACA */
        .search-container { padding: 0 20px 15px; position: sticky; top: 0; z-index: 99; margin-top: 15px; }
        .search-box { background: var(--glass-bg); backdrop-filter: blur(15px); border-radius: 20px; padding: 5px 20px; display: flex; align-items: center; box-shadow: var(--shadow-card); border: 1px solid #FFF; transition: 0.3s; }
        .search-box:focus-within { transform: scale(1.02); border-color: var(--emerald-main); box-shadow: 0 15px 30px rgba(5,150,105,0.1); }
        .search-box i { color: var(--emerald-main); font-size: 18px; margin-right: 12px; }
        .search-box input { flex: 1; border: none; padding: 16px 0; font-family: 'Montserrat'; font-size: 13px; font-weight: 700; background: transparent; color: var(--text-main); }

        .list-container { padding: 0 20px 30px; display: flex; flex-direction: column; gap: 12px; flex-grow: 1;}
        
        /* CARD MEMBER MEWAH */
        .member-card { background: #FFF; border-radius: 24px; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: var(--shadow-card); border: 1px solid rgba(0,0,0,0.02); transition: 0.3s; }
        .member-card.is-pengurus { background: linear-gradient(135deg, #FFFFFF 0%, #ECFDF5 100%); border-color: rgba(5, 150, 105, 0.2); }

        .m-photo { width: 60px; height: 60px; border-radius: 18px; object-fit: cover; background: var(--text-main); border: 3px solid #FFF; flex-shrink: 0; cursor: zoom-in; box-shadow: 0 8px 15px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 24px; color: var(--gold-accent);}
        .is-pengurus .m-photo { border-color: var(--gold-accent); }

        .m-info { flex: 1; min-width: 0; }
        .m-name { font-size: 14px; font-weight: 900; color: var(--text-main); text-transform: uppercase; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .m-wa-name { font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 5px;}
        
        .m-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 4px; }
        .badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .bg-role { background: #F3F4F6; color: var(--text-muted); }
        .bg-super { background: rgba(251, 191, 36, 0.2); color: #D97706; }
        .bg-admin { background: rgba(10, 132, 255, 0.1); color: #0A84FF; }
        .bg-bendahara { background: rgba(5, 150, 105, 0.1); color: var(--emerald-main); }
        .bg-status { background: #DCFCE7; color: #16A34A; }

        .btn-call { width: 40px; height: 40px; border-radius: 14px; background: #E0F2FE; color: #0284C7; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.15);}
        .btn-call:active { transform: scale(0.9); background: #0284C7; color: #FFF; }

        /* LIGHTBOX FOTO */
        .photo-viewer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 20px;}
        .pv-container { position: relative; max-width: 400px; width: 100%; text-align: center; }
        .pv-container img { width: 100%; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); object-fit: cover; max-height: 70vh; border: 3px solid rgba(255,255,255,0.2); }
        .pv-close { position: absolute; top: -15px; right: -15px; width: 40px; height: 40px; border-radius: 50%; background: #FFF; color: var(--text-main); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.2s; border: none; }
        .pv-close:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header-main">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></div>
            <span class="sub-tag">Buku Kontak</span>
            <h1 class="main-title">DATA ANGGOTA</h1>
        </header>

        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari nama atau WA .." onkeyup="filterList()">
            </div>
        </div>

        <main class="list-container" id="memberList">
            <div style="text-align:center; padding:50px; color:var(--text-muted); font-size: 12px; font-weight: 700;">
                <i class="fas fa-spinner fa-spin"></i> Memuat Kontak...
            </div>
        </main>

        <div class="photo-viewer-overlay" id="photoViewer" onclick="closePhoto()">
            <div class="pv-container" onclick="event.stopPropagation()">
                <img id="pvImage" src="">
                <button class="pv-close" onclick="closePhoto()"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let membersData = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists() && docSnap.data().status !== "Banned") {
                    loadMembersData();
                } else { window.location.href = 'login.html'; }
            } else { window.location.href = 'login.html'; }
        });

        function loadMembersData() {
            onSnapshot(collection(db, "users"), (snap) => {
                membersData = [];
                snap.forEach(document => { 
                    const d = document.data();
                    // Sembunyikan yang Banned atau masih Pending dari buku kontak publik
                    if(d.status === "Aktif") {
                        membersData.push({ id: document.id, ...d }); 
                    }
                });
                renderList(membersData);
            });
        }

        function renderList(data) {
            const list = document.getElementById('memberList'); list.innerHTML = '';
            
            // Urutkan: Superadmin -> Admin/Bendahara -> Member Biasa
            data.sort((a, b) => {
                const rA = (a.role||"").toLowerCase(); const rB = (b.role||"").toLowerCase();
                const score = { 'superadmin': 1, 'admin': 2, 'bendahara': 2, 'member': 3 };
                const sA = score[rA] || 3; const sB = score[rB] || 3;
                return sA - sB;
            });

            if(data.length === 0) { list.innerHTML = '<div style="text-align:center; padding:30px; color:#999; font-size:12px; font-weight:700;">Data anggota tidak ditemukan.</div>'; return; }

            data.forEach((m) => {
                const role = (m.role || "member").toLowerCase();
                const isPengurus = (role !== 'member');
                const cardClass = isPengurus ? 'member-card is-pengurus' : 'member-card';

                const name = m.nama_lengkap || "Tanpa Nama";
                const wa = m.no_wa || "Tidak ada nomor";
                
                let photoHtml = '';
                if (m.profile_image) { photoHtml = `<img src="${m.profile_image}" class="m-photo" onclick="viewPhoto('${m.profile_image}')">`; } 
                else { photoHtml = `<div class="m-photo" ${role==='superadmin'?'style="background:var(--gold-accent);color:#000;"':''}>${name.charAt(0).toUpperCase()}</div>`; }

                let waLink = wa !== "Tidak ada nomor" ? `https://wa.me/62${wa.replace(/^0+/, '')}` : '#';
                
                let roleHtml = `<span class="badge bg-role">MEMBER</span>`;
                if(role === 'superadmin') roleHtml = `<span class="badge bg-super"><i class="fas fa-crown"></i> SUPERADMIN</span>`;
                else if(role === 'admin') roleHtml = `<span class="badge bg-admin"><i class="fas fa-shield"></i> ADMIN</span>`;
                else if(role === 'bendahara') roleHtml = `<span class="badge bg-bendahara"><i class="fas fa-vault"></i> BENDAHARA</span>`;

                list.innerHTML += `
                    <div class="${cardClass}">
                        ${photoHtml}
                        <div class="m-info">
                            <div class="m-name">${name}</div>
                            <div class="m-wa-name"><i class="fab fa-whatsapp" style="color:#25D366; font-size: 14px;"></i> ${wa}</div>
                            <div class="m-badges">${roleHtml} <span class="badge bg-status"><i class="fas fa-check-circle"></i> AKTIF</span></div>
                        </div>
                        <a href="${waLink}" class="btn-call" target="_blank" title="Chat WhatsApp"><i class="fas fa-comment-dots"></i></a>
                    </div>
                `;
            });
        }

        window.filterList = () => {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            const filtered = membersData.filter(m => 
                (m.nama_lengkap && m.nama_lengkap.toLowerCase().includes(txt)) || 
                (m.no_wa && m.no_wa.toLowerCase().includes(txt)) || 
                (m.role && m.role.toLowerCase().includes(txt))
            );
            renderList(filtered);
        };

        window.viewPhoto = (src) => { document.getElementById('pvImage').src = src; document.getElementById('photoViewer').style.display = 'flex'; };
        window.closePhoto = () => { document.getElementById('photoViewer').style.display = 'none'; };
    </script>
</body>
</html>
