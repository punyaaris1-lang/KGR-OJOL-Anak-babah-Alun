<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F5F5F7">
    <title>Data Anggota - KGR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #F5F5F7; --text-dark: #1C1C1E; --text-gray: #8E8E93; --gold-primary: #D4AF37; --gold-deep: linear-gradient(135deg, #A67C00, #D4AF37, #8B6914, #B38728); --glass-bg: rgba(255, 255, 255, 0.65); --glass-border: rgba(255, 255, 255, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E5E5E5; background-image: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(10, 132, 255, 0.05), transparent 25%); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-base); position: relative; overflow: hidden; display: flex; flex-direction: column; color: var(--text-dark); }
        @media (min-width: 600px) { .app-container { max-width: 480px; height: 90vh; max-height: 900px; border-radius: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15), inset 0 0 0 8px #FFFFFF; border: 1px solid rgba(0,0,0,0.05); } }
        
        .orb { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; animation: floatOrb 8s infinite alternate ease-in-out; }
        .orb-1 { width: 300px; height: 300px; background: rgba(212, 175, 55, 0.25); top: -50px; right: -50px; }
        .orb-2 { width: 250px; height: 250px; background: rgba(10, 132, 255, 0.15); bottom: 100px; left: -50px; animation-delay: -3s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-30px, 40px) scale(1.1); } }
        
        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; z-index: 10; position: relative; border-bottom: 1px solid rgba(0,0,0,0.05); background: rgba(245,245,247,0.8); backdrop-filter: blur(20px); }
        .btn-back { width: 40px; height: 40px; border-radius: 14px; background: #FFF; color: var(--text-dark); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-back:active { transform: scale(0.9); }
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 110px; scrollbar-width: none; z-index: 2; position: relative; }
        .content-area::-webkit-scrollbar { display: none; }
        
        /* Search Box */
        .search-box { display: flex; align-items: center; padding: 14px 18px; border-radius: 16px; background: #FFF; border: 1.5px solid rgba(0,0,0,0.05); margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); transition: 0.3s; }
        .search-box:focus-within { border-color: var(--gold-primary); box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15); }
        .search-box i { color: var(--text-gray); font-size: 16px; margin-right: 12px; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 13px; font-weight: 600; color: var(--text-dark); background: transparent; }
        .search-box input::placeholder { color: #B0B0B0; }

        /* Member Card */
        .member-card { display: flex; align-items: center; padding: 16px; border-radius: 18px; background: #FFF; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.04); box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: 0.2s; }
        .member-card:active { transform: scale(0.98); background: var(--bg-base); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background-color: #F5F5F7; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: 900; color: var(--gold-primary); border: 2px solid #FFF; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-shrink: 0; }
        .info { flex-grow: 1; margin-left: 15px; }
        .info h4 { font-size: 14px; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .info p { font-size: 11px; font-weight: 700; color: var(--text-gray); display: flex; align-items: center; gap: 5px; }
        .role-badge { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .badge-superadmin { background: rgba(212, 175, 55, 0.15); color: #A67C00; }
        .badge-admin { background: rgba(10, 132, 255, 0.15); color: #0A84FF; }
        .badge-bendahara { background: rgba(40, 167, 69, 0.15); color: #28A745; }

        .btn-chat { width: 38px; height: 38px; border-radius: 12px; background: rgba(37, 211, 102, 0.1); color: #25D366; display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; border: none; flex-shrink: 0; transition: 0.2s; text-decoration: none;}
        .btn-chat:active { background: #25D366; color: #FFF; transform: scale(0.9); }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-gray); }
        .empty-state i { font-size: 30px; margin-bottom: 10px; opacity: 0.5; }
        .empty-state p { font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Database Anggota</h2>
        </div>

        <div class="content-area">
            <!-- Kolom Pencarian (Live Search) -->
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Cari nama atau nomor WA..." onkeyup="filterMembers()">
            </div>

            <!-- List Anggota (Akan diisi otomatis oleh Firebase) -->
            <div id="memberList">
                <div class="empty-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Mencari data ke server...</p>
                </div>
            </div>

            <!-- Pesan jika tidak ditemukan saat mencari -->
            <div id="emptyStateSearch" class="empty-state" style="display: none;">
                <i class="fa-solid fa-user-xmark"></i>
                <p>Anggota tidak ditemukan</p>
            </div>
        </div>
    </div>
    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // ==========================================
        // 1. CEK LOGIN
        // ==========================================
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });

        // ==========================================
        // 2. TARIK DATA ANGGOTA DARI FIREBASE
        // ==========================================
        const usersRef = collection(db, "users");
        const memberList = document.getElementById('memberList');
        
        // Urutkan berdasarkan nama abjad (A-Z)
        const q = query(usersRef, orderBy("nama_lengkap", "asc"));

        onSnapshot(q, (snapshot) => {
            memberList.innerHTML = ""; // Bersihkan list dummy/loading
            
            if (snapshot.empty) {
                memberList.innerHTML = `<div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>Belum ada data anggota di server.</p></div>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const nama = data.nama_lengkap || "Tanpa Nama";
                const wa = data.no_wa || "";
                const role = (data.role || "member").toLowerCase();
                const inisial = nama.charAt(0).toUpperCase();
                
                // FORMAT NOMOR WA UNTUK LINK DIRECT CHAT
                // (Ubah 08 jadi 628 atau hilangkan tanda + biar link wa.me nya jalan)
                let waLink = wa;
                if (wa.startsWith('0')) {
                    waLink = '62' + wa.substring(1);
                } else if (wa.startsWith('+62')) {
                    waLink = wa.substring(1);
                }

                // TENTUKAN BADGE JABATAN
                let badgeHtml = "";
                if (role === "superadmin") {
                    badgeHtml = `<span class="role-badge badge-superadmin"><i class="fa-solid fa-crown"></i> Super Admin</span>`;
                } else if (role === "admin") {
                    badgeHtml = `<span class="role-badge badge-admin"><i class="fa-solid fa-shield"></i> Admin</span>`;
                } else if (role === "bendahara") {
                    badgeHtml = `<span class="role-badge badge-bendahara"><i class="fa-solid fa-vault"></i> Bendahara</span>`;
                }

                // BUAT KARTU ANGGOTA
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <div class="avatar">${inisial}</div>
                    <div class="info">
                        <h4 class="member-name">${nama} ${badgeHtml}</h4>
                        <p class="member-phone"><i class="fa-brands fa-whatsapp" style="color: #25D366;"></i> ${wa || 'Belum ada WA'}</p>
                    </div>
                    ${wa ? `<a href="https://wa.me/${waLink}" target="_blank" class="btn-chat"><i class="fa-brands fa-whatsapp"></i></a>` : ''}
                `;
                
                memberList.appendChild(card);
            });
        });

        // ==========================================
        // 3. FUNGSI LIVE SEARCH PINTAR
        // ==========================================
        window.filterMembers = function() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.member-card');
            let hasVisibleCard = false;

            cards.forEach(card => {
                // Ambil teks nama dan nomor hp dari dalam kartu
                const nameText = card.querySelector('.member-name').innerText.toLowerCase();
                const phoneText = card.querySelector('.member-phone').innerText.toLowerCase();
                
                // Cek apakah ketikan cocok dengan nama ATAU nomor WA
                if (nameText.includes(input) || phoneText.includes(input)) {
                    card.style.display = 'flex';
                    hasVisibleCard = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // Tampilkan pesan "Tidak ditemukan" kalau semuanya tersembunyi
            document.getElementById('emptyStateSearch').style.display = hasVisibleCard ? 'none' : 'block';
        }
    </script>
</body>
</html>
