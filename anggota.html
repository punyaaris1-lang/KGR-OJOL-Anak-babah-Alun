<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#064E3B">
    <title>Data Anggota - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-base: #F4F6F5; --text-dark: #111827; --text-gray: #4B5563; --emerald-main: #059669; --gold-accent: #FBBF24; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E2E8E4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-base); background-image: radial-gradient(circle at 50% 35%, rgba(5, 150, 105, 0.12) 0%, rgba(5, 150, 105, 0.03) 35%, var(--bg-base) 70%); position: relative; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; color: var(--text-dark); }
        @media (min-width: 600px) { .app-container { max-width: 480px; height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15); border: 8px solid #FFFFFF; margin: auto; } }

        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; background: #FFF; z-index: 10; border-bottom: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .btn-back { width: 42px; height: 42px; border-radius: 14px; background: #F5F5F7; color: var(--text-dark); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,0,0,0.05); }
        .btn-back:active { transform: scale(0.85); background: var(--emerald-main); color: #FFF; }
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }

        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 110px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }
        
        .search-box { display: flex; align-items: center; padding: 16px 18px; border-radius: 16px; background: #FFF; border: 2px solid rgba(0,0,0,0.05); margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); transition: 0.3s; }
        .search-box:focus-within { border-color: var(--emerald-main); box-shadow: 0 8px 20px rgba(5, 150, 105, 0.15); }
        .search-box i { color: var(--text-gray); font-size: 16px; margin-right: 12px; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 13px; font-weight: 700; color: var(--text-dark); background: transparent; }

        .member-card { display: flex; align-items: center; padding: 16px; border-radius: 20px; background: #FFF; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: 0.2s; }
        .member-card:active { transform: scale(0.96); background: #F9F9F9; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background-color: #F5F5F7; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: 900; color: var(--emerald-main); border: 2px solid #FFF; flex-shrink: 0; }
        .info { flex-grow: 1; margin-left: 15px; overflow: hidden;}
        .info h4 { font-size: 14px; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .info p { font-size: 11px; font-weight: 700; color: var(--text-gray); display: flex; align-items: center; gap: 5px; }
        
        .role-badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-superadmin { background: rgba(251, 191, 36, 0.15); color: #B45309; }
        .badge-admin { background: rgba(5, 150, 105, 0.15); color: var(--emerald-main); }
        .badge-bendahara { background: rgba(30, 64, 175, 0.1); color: #1E40AF; }

        .btn-chat { width: 42px; height: 42px; border-radius: 14px; background: rgba(37, 211, 102, 0.1); color: #25D366; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; border: none; flex-shrink: 0; transition: 0.2s; text-decoration: none;}
        .btn-chat:active { background: #25D366; color: #FFF; transform: scale(0.85); }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-gray); border-radius: 20px; border: 2px dashed rgba(0,0,0,0.1); }
        .empty-state i { font-size: 35px; margin-bottom: 10px; opacity: 0.5; }
        .empty-state p { font-size: 13px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Database Anggota</h2>
        </div>

        <div class="content-area">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Cari nama atau nomor WA..." onkeyup="filterMembers()">
            </div>

            <div id="memberList">
                <div class="empty-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Mencari data ke server...</p>
                </div>
            </div>

            <div id="emptyStateSearch" class="empty-state" style="display: none; margin-top: 15px;">
                <i class="fa-solid fa-user-xmark"></i>
                <p>Anggota tidak ditemukan</p>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = 'login.html'; });

        const usersRef = collection(db, "users");
        const memberList = document.getElementById('memberList');
        const q = query(usersRef, orderBy("nama_lengkap", "asc"));

        onSnapshot(q, (snapshot) => {
            memberList.innerHTML = ""; 
            if (snapshot.empty) {
                memberList.innerHTML = `<div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>Belum ada data anggota di server.</p></div>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const nama = data.nama_lengkap || "Tanpa Nama";
                const wa = data.no_wa || "";
                const role = (data.role || "member").toLowerCase();
                const inisial = nama.charAt(0).toUpperCase();
                
                let waLink = wa;
                if (wa.startsWith('0')) waLink = '62' + wa.substring(1);
                else if (wa.startsWith('+62')) waLink = wa.substring(1);

                let badgeHtml = "";
                if (role === "superadmin") badgeHtml = `<span class="role-badge badge-superadmin"><i class="fa-solid fa-crown"></i> Super Admin</span>`;
                else if (role === "admin") badgeHtml = `<span class="role-badge badge-admin"><i class="fa-solid fa-shield"></i> Admin</span>`;
                else if (role === "bendahara") badgeHtml = `<span class="role-badge badge-bendahara"><i class="fa-solid fa-vault"></i> Bendahara</span>`;

                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <div class="avatar">${inisial}</div>
                    <div class="info">
                        <h4 class="member-name">${nama} ${badgeHtml}</h4>
                        <p class="member-phone"><i class="fa-brands fa-whatsapp" style="color: #25D366;"></i> ${wa || 'Belum ada WA'}</p>
                    </div>
                    ${wa ? `<a href="https://wa.me/${waLink}" target="_blank" class="btn-chat"><i class="fa-brands fa-whatsapp"></i></a>` : ''}
                `;
                memberList.appendChild(card);
            });
        });

        window.filterMembers = function() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.member-card');
            let hasVisibleCard = false;
            cards.forEach(card => {
                const nameText = card.querySelector('.member-name').innerText.toLowerCase();
                const phoneText = card.querySelector('.member-phone').innerText.toLowerCase();
                if (nameText.includes(input) || phoneText.includes(input)) {
                    card.style.display = 'flex'; hasVisibleCard = true;
                } else { card.style.display = 'none'; }
            });
            document.getElementById('emptyStateSearch').style.display = hasVisibleCard ? 'none' : 'block';
        }
    </script>
</body>
</html>
