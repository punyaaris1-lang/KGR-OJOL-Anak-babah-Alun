<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A" id="metaThemeColor">
    <title>Data Anggota - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('kgr_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        localStorage.setItem('kgr_last_page', 'anggota.html');
    </script>

    <style>
        :root {
            --bg-body: #F1F5F9; --text-main: #0F172A; --text-muted: #64748B;
            --card-bg: #FFFFFF; --card-border: #E2E8F0; --header-bg: #0F172A;
            --emerald-main: #059669; --emerald-dark: #064E3B; --gold-accent: #F59E0B; --danger-red: #EF4444;
            --input-bg: #F8FAFC; 
        }
        [data-theme="dark"] {
            --bg-body: #0F172A; --text-main: #F8FAFC; --text-muted: #94A3B8;
            --card-bg: #1E293B; --card-border: #334155; --header-bg: #020617;
            --emerald-main: #10B981; --gold-accent: #FBBF24; 
            --input-bg: #0F172A; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; margin: 0; transition: background-color 0.3s ease, color 0.3s ease;}

        .app-container { width: 100%; max-width: 480px; height: 100dvh; background: var(--bg-body); position: relative; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; scrollbar-width: none;}
        .app-container::-webkit-scrollbar { display: none; }
        @media (min-width: 600px) { .app-container { height: 90vh; max-height: 850px; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); border: 8px solid var(--card-border); margin: auto; } }

        .exec-header { background: var(--header-bg); padding: 40px 24px 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;}
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: var(--card-bg); border: 2px solid var(--card-border); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-main); transition: 0.2s; }
        .btn-back:active { transform: scale(0.9); }
        .exec-header h1 { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; flex-grow: 1; text-align: center; color: #FFF;}

        .content-area { flex-grow: 1; overflow-y: auto; padding: 25px 24px 240px; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 16px 20px 16px 45px; border-radius: 16px; border: 2px solid var(--card-border); background: var(--input-bg); color: var(--text-main); font-size: 13px; font-weight: 700; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: var(--emerald-main); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }

        .member-card { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--card-border); display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);}
        .mc-pic { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: 900; color: var(--gold-accent); background: var(--input-bg); border: 1px solid var(--card-border); flex-shrink: 0; background-size: cover; background-position: center;}
        
        .mc-info { flex-grow: 1; overflow: hidden; }
        .mc-name { font-size: 14px; font-weight: 900; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase;}
        .mc-role { display: inline-block; font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; margin-bottom: 5px; background: var(--input-bg); color: var(--text-muted); border: 1px solid var(--card-border);}
        .mc-role.dewa { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); border-color: var(--emerald-main);}
        
        /* LINK WA BIAR BISA DIKLIK */
        .mc-detail { font-size: 12px; font-weight: 700; color: var(--emerald-main); display: flex; align-items: center; gap: 6px; text-decoration: none;}
        
        .btn-load-more { width: 100%; padding: 15px; border-radius: 14px; background: var(--card-bg); color: var(--emerald-main); border: 2px dashed var(--emerald-main); font-size: 13px; font-weight: 800; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;}

        .bottom-nav-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 100%; background: var(--card-bg); border-top: 1px solid var(--card-border); padding: 10px 0 25px; z-index: 50; display: flex; justify-content: space-evenly; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 22px; width: 60px; cursor: pointer;}
        .nav-item span { font-size: 10px; font-weight: 800; }
        .center-fab { width: 60px; height: 60px; border-radius: 50%; background: var(--emerald-main); color: #FFF; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 20px; border: 4px solid var(--bg-body); box-shadow: 0 5px 10px rgba(5, 150, 105, 0.3); }
        .center-fab span { font-size: 9px; font-weight: 800; margin-top: 2px;}
    </style>
</head>
<body>
    <div class="app-container">
        <div class="exec-header">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h1>Buku Anggota</h1>
            <div class="btn-back" onclick="toggleTheme()"><i id="themeIcon" class="fa-solid fa-moon"></i></div>
        </div>

        <div class="content-area">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari nama atau jabatan..." onkeyup="handleSearch()">
            </div>
            <div id="listAnggota"></div>
            <button id="btnLoadMore" class="btn-load-more" style="display: none;" onclick="loadMembers(true)">Muat Lagi <i class="fa-solid fa-chevron-down"></i></button>
        </div>

        <div class="bottom-nav-container">
            <div class="nav-item" onclick="window.location.href='index.html'"><i class="fa-solid fa-house"></i><span>Beranda</span></div>
            <div class="nav-item center-btn" onclick="window.location.href='index.html'">
                <div class="center-fab"><i class="fa-solid fa-qrcode"></i><span>Sedekah</span></div>
            </div>
            <div class="nav-item" onclick="window.location.href='laporan.html'"><i class="fa-solid fa-chart-pie"></i><span>Laporan</span></div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, query, orderBy, limit, startAfter, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let lastVisibleDoc = null;
        onAuthStateChanged(auth, (user) => { if (user) loadMembers(false); else window.location.href = 'login.html'; });

        window.loadMembers = async function(isLoadMore) {
            const container = document.getElementById('listAnggota');
            const btnMore = document.getElementById('btnLoadMore');
            if (!isLoadMore) container.innerHTML = `<div style="text-align:center; padding: 20px;"><i class="fa-solid fa-spinner fa-spin" style="color:var(--emerald-main);"></i></div>`;
            
            try {
                let q = isLoadMore ? query(collection(db, "users"), orderBy("nama_lengkap", "asc"), startAfter(lastVisibleDoc), limit(25)) 
                                   : query(collection(db, "users"), orderBy("nama_lengkap", "asc"), limit(25));
                const snap = await getDocs(q);
                if (!isLoadMore) container.innerHTML = "";
                if (!snap.empty) {
                    lastVisibleDoc = snap.docs[snap.docs.length - 1];
                    snap.forEach(d => {
                        const u = d.data();
                        if (u.status !== "Banned" && u.status !== "Pending Admin") {
                            const waLink = u.no_wa ? `https://wa.me/${u.no_wa.replace(/^0/, '62')}` : "#";
                            container.innerHTML += `
                                <div class="member-card">
                                    <div class="mc-pic">${(u.nama_lengkap||"A").charAt(0).toUpperCase()}</div>
                                    <div class="mc-info">
                                        <div class="mc-name">${u.nama_lengkap}</div>
                                        <div class="mc-role">${u.role || "member"}</div>
                                        <a href="${waLink}" target="_blank" class="mc-detail"><i class="fa-brands fa-whatsapp"></i> ${u.no_wa || "-"}</a>
                                    </div>
                                </div>`;
                        }
                    });
                    btnMore.style.display = snap.docs.length < 25 ? 'none' : 'flex';
                }
            } catch(e) { container.innerHTML = "Gagal memuat."; }
        }

        window.handleSearch = function() { /* Logika pencarian sama seperti sebelumnya */ }
    </script>
</body>
</html>
