<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Data Anggota - KGR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('kgr_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        localStorage.setItem('kgr_last_page', 'anggota.html');
    </script>
    <style>
        :root { --bg-body: #EAF4F1; --text-main: #0F172A; --text-muted: #64748B; --card-bg: #FFFFFF; --card-border: rgba(0,0,0,0.05); --header-bg: #0F172A; --emerald-main: #0E9B6E; --input-bg: #F8FAFC;}
        [data-theme="dark"] { --bg-body: #0F172A; --text-main: #F8FAFC; --text-muted: #94A3B8; --card-bg: #1E293B; --card-border: #334155; --header-bg: #020617; --emerald-main: #10B981; --input-bg: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; }
        
        .app-container { width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden; scrollbar-width: none;}
        .app-container::-webkit-scrollbar { display: none; }
        
        .exec-header { background: var(--header-bg); padding: 40px 24px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;}
        .btn-back { width: 40px; height: 40px; border-radius: 50%; background: var(--card-bg); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-main); border: 2px solid var(--card-border); transition: 0.2s;}
        .btn-back:active { transform: scale(0.9); }
        .exec-header h1 { font-size: 16px; font-weight: 900; color: #FFF; flex-grow: 1; text-align: center; text-transform: uppercase;}

        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 140px; }

        /* KOTAK TOTAL ANGGOTA */
        .total-box { text-align: center; margin-bottom: 20px; }
        .total-box p { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        .total-box h2 { font-size: 32px; font-weight: 900; color: var(--emerald-main); }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 16px 20px 16px 45px; border-radius: 16px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text-main); font-size: 13px; font-weight: 700; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.2s; }
        .search-input:focus { border-color: var(--emerald-main); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }

        .member-card { background: var(--card-bg); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--card-border); display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .mc-pic { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: 900; color: #FFF; background: var(--emerald-main); flex-shrink: 0; background-size: cover; background-position: center;}
        .mc-info { flex-grow: 1; overflow: hidden; }
        .mc-name { font-size: 14px; font-weight: 900; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase;}
        .mc-role { display: inline-block; font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; margin-bottom: 5px; background: var(--input-bg); color: var(--text-muted); border: 1px solid var(--card-border);}
        .mc-detail { font-size: 12px; font-weight: 700; color: var(--emerald-main); display: flex; align-items: center; gap: 6px; text-decoration: none; padding: 4px 0;}
        
        .btn-load-more { width: 100%; padding: 15px; border-radius: 14px; background: var(--card-bg); color: var(--emerald-main); border: 2px dashed var(--emerald-main); font-size: 13px; font-weight: 800; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px;}

        /* FLOATING BOTTOM NAV */
        .bottom-nav-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--card-bg); border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 50; border: 1px solid var(--card-border);}
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); opacity: 0.8; cursor: pointer; transition: 0.3s; width: 60px; }
        .nav-item i { font-size: 20px; transition: 0.2s; } 
        .nav-item span { font-size: 10px; font-weight: 800; } 
        .nav-item.active { color: var(--emerald-main); opacity: 1; }
        
        .center-btn { position: relative; top: -25px; flex-shrink: 0;}
        .center-fab { width: 65px; height: 65px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2px; color: #FFFFFF; font-size: 22px; background: linear-gradient(135deg, #10B981, #059669); border: 5px solid var(--bg-body); box-shadow: 0 10px 20px rgba(5, 150, 105, 0.3); transition: 0.2s; cursor: pointer; }
        .center-fab span { font-size: 9px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="exec-header">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h1>Data Anggota</h1>
            <div class="btn-back" onclick="toggleTheme()"><i id="themeIcon" class="fa-solid fa-moon"></i></div>
        </div>

        <div class="content-area">
            
            <div class="total-box">
                <p>Total Anggota Aktif</p>
                <h2 id="uiCountHeader">Memuat...</h2>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari nama atau NIK..." onkeyup="handleSearch()">
            </div>
            <div id="listAnggota"></div>
            <button id="btnLoadMore" class="btn-load-more" style="display: none;" onclick="loadMembers(true)">Muat Anggota Lainnya <i class="fa-solid fa-chevron-down"></i></button>
        </div>

        <div class="bottom-nav-container">
            <div class="nav-item" onclick="window.location.href='index.html'"><i class="fa-solid fa-house"></i><span>Beranda</span></div>
            <div class="nav-item center-btn" onclick="window.location.href='index.html'">
                <div class="center-fab"><i class="fa-solid fa-qrcode"></i><span>Sedekah</span></div>
            </div>
            <div class="nav-item" onclick="window.location.href='laporan.html'"><i class="fa-solid fa-chart-pie"></i><span>Laporan</span></div>
        </div>
    </div>

    <script>
        function updateThemeIcon(theme) { const icon = document.getElementById('themeIcon'); if (theme === 'light') icon.className = 'fa-solid fa-moon'; else icon.className = 'fa-solid fa-sun'; }
        window.addEventListener('DOMContentLoaded', () => { updateThemeIcon(savedTheme); });
        window.toggleTheme = function() { const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('kgr_theme', t); updateThemeIcon(t); }
    </script>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, query, orderBy, limit, startAfter, getDocs, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let lastVisibleDoc = null; let isSearching = false;

        onAuthStateChanged(auth, (user) => { 
            if (user) { 
                loadMembers(false); 
                // LISTENER TOTAL ANGGOTA REALTIME
                onSnapshot(doc(db, "settings", "rekap_sistem"), (ds) => { 
                    if(ds.exists()) document.getElementById('uiCountHeader').innerText = (ds.data().total_anggota || 0) + " Orang"; 
                });
            } else { window.location.href = 'login.html'; } 
        });

        window.loadMembers = async function(isLoadMore) {
            const container = document.getElementById('listAnggota');
            const btnMore = document.getElementById('btnLoadMore');
            if (!isLoadMore) container.innerHTML = `<div style="text-align:center; padding: 20px;"><i class="fa-solid fa-spinner fa-spin" style="color:var(--emerald-main); font-size:24px;"></i></div>`;
            
            try {
                let q = isLoadMore ? query(collection(db, "users"), orderBy("nama_lengkap", "asc"), startAfter(lastVisibleDoc), limit(25)) 
                                   : query(collection(db, "users"), orderBy("nama_lengkap", "asc"), limit(25));
                const snap = await getDocs(q);
                if (!isLoadMore) container.innerHTML = "";
                
                if (!snap.empty) {
                    lastVisibleDoc = snap.docs[snap.docs.length - 1];
                    let htmlList = "";
                    snap.forEach(d => {
                        const u = d.data();
                        if (u.status !== "Banned" && u.status !== "Pending Admin") {
                            // LOGIKA WA AUTO 62
                            let cleanWa = u.no_wa ? u.no_wa.toString().replace(/^0/, '62') : "";
                            let waLink = cleanWa ? `https://wa.me/${cleanWa}` : "#";
                            
                            // LOGIKA FOTO PROFIL
                            let bgImg = `none`; let initial = (u.nama_lengkap || "A").charAt(0).toUpperCase();
                            if(u.profile_image && u.profile_image.length > 5) { bgImg = `url('${u.profile_image}')`; initial = ""; }

                            let dispRole = u.custom_badge || u.role || "member";
                            if(u.role === 'developer') dispRole = "MEMBER"; // Mode Siluman di buku kontak

                            htmlList += `
                                <div class="member-card">
                                    <div class="mc-pic" style="background-image: ${bgImg};">${initial}</div>
                                    <div class="mc-info">
                                        <div class="mc-name">${u.nama_lengkap}</div>
                                        <div class="mc-role">${dispRole}</div>
                                        <a href="${waLink}" target="_blank" class="mc-detail"><i class="fa-brands fa-whatsapp"></i> ${u.no_wa || "Belum diatur"}</a>
                                    </div>
                                </div>`;
                        }
                    });
                    container.innerHTML += htmlList;
                    btnMore.style.display = snap.docs.length < 25 ? 'none' : 'flex';
                } else { btnMore.style.display = 'none'; }
            } catch(e) { container.innerHTML = `<div style="text-align:center; padding: 20px; color:red;">Gagal menarik data.</div>`; }
        }

        let searchTimeout;
        window.handleSearch = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const searchTxt = document.getElementById('searchInput').value.trim().toLowerCase();
                const container = document.getElementById('listAnggota');
                const btnMore = document.getElementById('btnLoadMore');
                
                if (searchTxt === "") { isSearching = false; lastVisibleDoc = null; loadMembers(false); return; }

                isSearching = true; btnMore.style.display = 'none'; 
                container.innerHTML = `<div style="text-align:center; padding: 20px;"><i class="fa-solid fa-spinner fa-spin" style="color:var(--emerald-main); font-size:24px;"></i></div>`;
                
                try {
                    const snap = await getDocs(query(collection(db, "users")));
                    let htmlList = "";
                    snap.forEach(d => {
                        const u = d.data();
                        if (u.status !== "Banned" && u.status !== "Pending Admin") {
                            const nama = (u.nama_lengkap || "").toLowerCase();
                            const nikAsli = u.nik ? atob(decodeURIComponent(u.nik)).split("").map(char => String.fromCharCode(char.charCodeAt(0) - 7)).join("") : "";
                            
                            if (nama.includes(searchTxt) || nikAsli.includes(searchTxt)) {
                                let cleanWa = u.no_wa ? u.no_wa.toString().replace(/^0/, '62') : "";
                                let waLink = cleanWa ? `https://wa.me/${cleanWa}` : "#";
                                let bgImg = `none`; let initial = (u.nama_lengkap || "A").charAt(0).toUpperCase();
                                if(u.profile_image && u.profile_image.length > 5) { bgImg = `url('${u.profile_image}')`; initial = ""; }
                                let dispRole = u.custom_badge || u.role || "member";
                                if(u.role === 'developer') dispRole = "MEMBER";

                                htmlList += `
                                    <div class="member-card">
                                        <div class="mc-pic" style="background-image: ${bgImg};">${initial}</div>
                                        <div class="mc-info">
                                            <div class="mc-name">${u.nama_lengkap}</div>
                                            <div class="mc-role">${dispRole}</div>
                                            <a href="${waLink}" target="_blank" class="mc-detail"><i class="fa-brands fa-whatsapp"></i> ${u.no_wa || "Belum diatur"}</a>
                                        </div>
                                    </div>`;
                            }
                        }
                    });
                    container.innerHTML = htmlList || `<div style="text-align:center; padding: 20px; color:var(--text-muted); font-size:12px;">Pencarian tidak ditemukan.</div>`;
                } catch (e) { container.innerHTML = "Error pencarian."; }
            }, 600);
        }
    </script>
</body>
</html>
