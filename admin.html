<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F5F5F7">
    <title>Panel Admin - KGR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #F5F5F7; --text-dark: #000000; --text-black: #111111; --gold-primary: #D4AF37; --gold-deep: linear-gradient(135deg, #A67C00, #D4AF37, #8B6914, #B38728); --danger-color: #DC3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E5E5E5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-base); position: relative; overflow: hidden; display: flex; flex-direction: column; color: var(--text-dark); }
        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; background: rgba(245,245,247,0.8); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .btn-back { width: 40px; height: 40px; border-radius: 14px; background: #FFF; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); }
        .header-title h2 { font-size: 18px; font-weight: 900; }
        .header-title p { font-size: 10px; color: #28A745; font-weight: 800; text-transform: uppercase; }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 110px; scrollbar-width: none; }
        .btn-add-member { width: 100%; padding: 18px; border-radius: 18px; font-size: 14px; font-weight: 900; background: var(--text-dark); color: var(--gold-primary); border: none; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .section-title { font-size: 14px; font-weight: 900; margin: 0 0 15px; text-transform: uppercase;}
        .member-item { display: flex; align-items: center; padding: 16px 15px; border-radius: 18px; margin-bottom: 12px; background: #FFF; border: 1px solid rgba(0,0,0,0.05); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background-size: cover; background-position: center; border: 2px solid #FFF; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .info { flex-grow: 1; display: flex; flex-direction: column; gap: 3px; }
        .info h4 { font-size: 14px; font-weight: 900; }
        .info .role-badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; background: var(--text-dark); color: var(--gold-primary); text-transform: uppercase; width: fit-content; margin-bottom: 3px; }
        .info p { font-size: 11px; font-weight: 700; color: #8E8E93; }
        .btn-manage { width: 35px; height: 35px; border-radius: 12px; background: var(--bg-base); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; border: none; }
        
        /* Modal & Action Sheet CSS */
        .modal-overlay, .action-sheet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); display: flex; justify-content: center; align-items: flex-end; z-index: 100; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.show, .action-sheet-overlay.show { opacity: 1; visibility: visible; }
        .modal-content, .action-sheet { background: #FFF; border-radius: 30px 30px 0 0; padding: 25px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s; }
        .modal-overlay.show .modal-content, .action-sheet-overlay.show .action-sheet { transform: translateY(0); }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-list { display: flex; flex-direction: column; gap: 10px; }
        .action-btn { width: 100%; padding: 16px 20px; border-radius: 16px; font-size: 13px; font-weight: 800; background: var(--bg-base); border: none; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .action-btn.danger { color: var(--danger-color); }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 15px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.1); font-size: 14px; font-weight: 700; outline: none; background: #F9F9F9; }
        .btn-submit { width: 100%; padding: 18px; border-radius: 16px; font-size: 14px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='profil.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <div class="header-title">
                <h2>Panel Pengelola</h2>
                <p>Status: Server Terhubung</p>
            </div>
        </div>

        <div class="content-area">
            <button class="btn-add-member" onclick="document.getElementById('addModal').classList.add('show')"><i class="fa-solid fa-user-plus"></i> Tambah Member Baru</button>
            <div class="section-title">Data Member Server</div>
            <div id="memberListContainer"></div>
        </div>
    </div>

    <div id="addModal" class="modal-overlay">
        <div class="modal-content">
            <div class="sheet-header">
                <h3 style="font-weight:900;">Input Member Baru</h3>
                <button onclick="document.getElementById('addModal').classList.remove('show')" style="width:30px;height:30px;border-radius:50%;border:none;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="formAddMember">
                <div class="form-group"><label class="form-label">Nama Lengkap</label><input type="text" id="inputName" class="form-input" required></div>
                <div class="form-group"><label class="form-label">Nomor WhatsApp</label><input type="tel" id="inputPhone" class="form-input" required></div>
                <div class="form-group">
                    <label class="form-label">Jabatan (Role)</label>
                    <select id="inputRole" class="form-input" required>
                        <option value="Member">Anggota Biasa (Member)</option>
                        <option value="Bendahara">Bendahara</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <button type="submit" id="btnSubmit" class="btn-submit">Simpan ke Database</button>
            </form>
        </div>
    </div>

    <div id="actionSheet" class="action-sheet-overlay">
        <div class="action-sheet">
            <div class="sheet-header">
                <div><p style="font-size: 10px; font-weight: 800; color: #8E8E93;">KELOLA MEMBER</p><h3 id="sheetMemberName">Nama</h3></div>
                <button onclick="document.getElementById('actionSheet').classList.remove('show')" style="width:30px;height:30px;border-radius:50%;border:none;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="action-list">
                <button class="action-btn" onclick="alert('Fitur Edit Profil')"><i class="fa-solid fa-pen-to-square"></i> Edit Data & Profil</button>
                
                <button class="action-btn" id="btnUbahJabatan" style="display: none;" onclick="alert('Fitur Ubah Jabatan')"><i class="fa-solid fa-user-tie"></i> Ubah Jabatan Member</button>
                
                <button class="action-btn danger" style="margin-top: 10px;"><i class="fa-solid fa-ban"></i> Blokir (Suspend)</button>
                <button class="action-btn danger"><i class="fa-solid fa-trash-can"></i> Hapus Member</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './db-config.js';
        import { collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // ======= SIMULASI JABATAN (Ganti teks di bawah untuk ngetes) =======
        const roleSaatIni = "Super Admin"; // Coba ganti jadi "Admin"

        // Fungsi Buka Kelola (Cek Hak Akses Super Admin)
        window.openActionSheet = (name) => {
            document.getElementById('sheetMemberName').innerText = name;
            
            // Logika Pembatasan Tombol Ubah Jabatan
            if(roleSaatIni === "Super Admin") {
                document.getElementById('btnUbahJabatan').style.display = 'flex'; // Munculkan Tombol
            } else {
                document.getElementById('btnUbahJabatan').style.display = 'none'; // Sembunyikan untuk Admin biasa
            }
            
            document.getElementById('actionSheet').classList.add('show');
        };

        const listContainer = document.getElementById('memberListContainer');
        const q = query(collection(db, "users"), orderBy("tanggal_daftar", "desc"));
        
        onSnapshot(q, (snapshot) => {
            let htmlContent = "";
            snapshot.forEach((doc) => {
                const user = doc.data();
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.nama_lengkap || "A")}&background=F5F5F7&color=000&size=150`;
                let badgeHTML = user.jabatan !== "Member" ? `<span class="role-badge">${user.jabatan}</span>` : "";

                htmlContent += `
                    <div class="member-item">
                        <div class="avatar" style="background-image: url('${avatarUrl}');"></div>
                        <div class="info"><h4>${user.nama_lengkap}</h4>${badgeHTML}<p>${user.no_wa}</p></div>
                        <button class="btn-manage" onclick="openActionSheet('${user.nama_lengkap}')"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    </div>`;
            });
            listContainer.innerHTML = htmlContent || `<div style="text-align:center; padding:20px;">Belum ada member</div>`;
        });

        document.getElementById('formAddMember').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit'); btn.innerText = 'Menyimpan...'; btn.disabled = true;
            try {
                await addDoc(collection(db, "users"), {
                    nama_lengkap: document.getElementById('inputName').value, no_wa: document.getElementById('inputPhone').value, jabatan: document.getElementById('inputRole').value, tanggal_daftar: serverTimestamp()
                });
                document.getElementById('formAddMember').reset(); document.getElementById('addModal').classList.remove('show');
            } catch (err) { alert("Gagal menyimpan!"); } finally { btn.innerText = 'Simpan ke Database'; btn.disabled = false; }
        });
    </script>
</body>
</html>
