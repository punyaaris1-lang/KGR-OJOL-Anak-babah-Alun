<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A" id="metaThemeColor">
    <title>Profil Saya - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('kgr_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        localStorage.setItem('kgr_last_page', 'profil.html'); // SMART ROUTER
    </script>

    <style>
        /* TEMA FLAT PREMIUM */
        :root {
            --bg-body: #F1F5F9; --text-main: #0F172A; --text-muted: #64748B;
            --card-bg: #FFFFFF; --card-border: #E2E8F0; --header-bg: #0F172A;
            --emerald-main: #059669; --gold-accent: #F59E0B; --danger-red: #EF4444;
            --input-bg: #F8FAFC; --modal-bg: #FFFFFF;
        }

        [data-theme="dark"] {
            --bg-body: #0F172A; --text-main: #F8FAFC; --text-muted: #94A3B8;
            --card-bg: #1E293B; --card-border: #334155; --header-bg: #020617;
            --emerald-main: #10B981; --gold-accent: #FBBF24; 
            --input-bg: #0F172A; --modal-bg: #1E293B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-body); display: flex; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; color: var(--text-main); margin: 0; transition: background-color 0.3s ease, color 0.3s ease;}

        .app-container { width: 100%; max-width: 480px; background: transparent; display: flex; flex-direction: column; height: 100dvh; position: relative; z-index: 10; overflow-x: hidden; overflow-y: auto; scrollbar-width: none;}
        .app-container::-webkit-scrollbar { display: none; }
        @media (min-width: 600px) { .app-container { height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.15); border: 8px solid var(--card-border); margin: auto; background: var(--bg-body);} }

        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; border-bottom: 1px solid var(--card-border); z-index: 10; background: var(--header-bg); border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;}
        .btn-back { width: 42px; height: 42px; border-radius: 14px; background: var(--card-bg); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-main); transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 2px solid var(--card-border);}
        .btn-back:active { transform: scale(0.9); background: var(--emerald-main); color: #FFF; border-color: var(--emerald-main);}
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: #FFF; text-align: center; flex-grow: 1;}

        .content-area { flex-grow: 1; padding: 25px 24px 100px; }

        .photo-edit-section { text-align: center; margin-bottom: 30px; position: relative;}
        .photo-circle { width: 110px; height: 110px; border-radius: 50%; background: var(--input-bg); border: 4px solid var(--card-border); box-shadow: 0 15px 30px rgba(5,150,105,0.1); margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: 900; color: var(--emerald-main); position: relative; background-size: cover; background-position: center; transition: 0.4s ease;}
        
        .btn-change-photo { position: absolute; bottom: 0; right: 0; width: 36px; height: 36px; border-radius: 50%; background: var(--emerald-main); color: #FFF; border: 3px solid var(--card-bg); display: flex; justify-content: center; align-items: center; font-size: 14px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(5,150,105,0.3);}
        .btn-change-photo:active { transform: scale(0.9); }
        .hidden-file-input { display: none; }

        .form-card { padding: 25px 20px; margin-bottom: 20px; background: var(--card-bg); border-radius: 26px; border: 1px solid var(--card-border); box-shadow: 0 4px 6px rgba(0,0,0,0.02);}
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;}
        .form-input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--card-border); font-size: 14px; font-weight: 700; color: var(--text-main); outline: none; background: var(--input-bg); transition: 0.2s;}
        .form-input:focus { border-color: var(--emerald-main); background: var(--card-bg); }
        .form-input:disabled { background: var(--input-bg); color: var(--text-muted); cursor: not-allowed; border-color: var(--card-border); opacity: 0.7;}

        .btn-save { width: 100%; padding: 18px; border-radius: 16px; font-size: 14px; font-weight: 900; background: var(--emerald-main); color: #FFF; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(5,150,105,0.25); display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-save:active { transform: scale(0.96); }

        .btn-logout { width: 100%; padding: 18px; border-radius: 16px; font-size: 14px; font-weight: 900; background: rgba(239,68,68,0.1); color: var(--danger-red); border: 2px solid rgba(239,68,68,0.2); cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-logout:active { transform: scale(0.96); background: var(--danger-red); color: #FFF;}

        /* CUSTOM POPUP THEME-AWARE */
        .cp-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); z-index: 99999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; padding: 20px; }
        .cp-overlay.show { opacity: 1; visibility: visible; }
        .cp-box { background: var(--modal-bg); border: 1px solid var(--card-border); border-radius: 30px; width: 100%; max-width: 320px; text-align: center; padding: 30px 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 25px 50px rgba(0,0,0,0.3); color: var(--text-main); }
        .cp-overlay.show .cp-box { transform: scale(1); }
        
        .cp-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 0 auto 15px; }
        .cp-icon.success { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); }
        .cp-icon.error { background: rgba(239, 68, 68, 0.15); color: var(--danger-red); }
        .cp-icon.warning { background: rgba(245, 158, 11, 0.15); color: var(--gold-accent); }
        
        .cp-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; color: var(--text-main); }
        .cp-desc { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }
        .cp-btn-wrap { display: flex; gap: 10px; }
        .cp-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .cp-btn:active { transform: scale(0.95); }
        .cp-btn-primary { background: var(--emerald-main); color: #FFF; box-shadow: 0 8px 20px rgba(5,150,105,0.3);}
        .cp-btn-cancel { background: var(--input-bg); color: var(--text-main); border: 2px solid var(--card-border);}
        .cp-btn-danger { background: var(--danger-red); color: #FFF; box-shadow: 0 8px 20px rgba(239,68,68,0.3);}
        
        .spinner-custom { border: 4px solid var(--card-border); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--emerald-main); animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="cp-overlay" id="customAlert">
        <div class="cp-box">
            <div class="cp-icon success" id="caIcon"><i class="fa-solid fa-check"></i></div>
            <h3 class="cp-title" id="caTitle">Pemberitahuan</h3>
            <p class="cp-desc" id="caDesc">Pesan</p>
            <button class="cp-btn cp-btn-primary" onclick="closeCustomAlert()" style="width: 100%;">Mengerti</button>
        </div>
    </div>
    <div class="cp-overlay" id="customConfirm">
        <div class="cp-box">
            <div class="cp-icon warning"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 class="cp-title" id="ccTitle">Konfirmasi</h3>
            <p class="cp-desc" id="ccDesc">Apakah Anda yakin?</p>
            <div class="cp-btn-wrap">
                <button class="cp-btn cp-btn-cancel" onclick="closeCustomConfirm()">Batal</button>
                <button class="cp-btn cp-btn-danger" id="ccBtnYes">Ya, Keluar</button>
            </div>
        </div>
    </div>
    <div class="cp-overlay" id="customLoading">
        <div class="cp-box" style="padding: 40px 20px;">
            <div class="spinner-custom"></div>
            <h3 class="cp-title" id="clTitle" style="margin-bottom: 0;">Memproses...</h3>
        </div>
    </div>

    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Pengaturan Akun</h2>
            <div class="btn-back" onclick="toggleTheme()" title="Ganti Tema"><i id="themeIcon" class="fa-solid fa-moon"></i></div>
        </div>

        <div class="content-area">
            
            <div class="photo-edit-section">
                <div class="photo-circle" id="uiProfilePic"></div>
                <label for="inputPhoto" class="btn-change-photo" title="Ganti Foto">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="inputPhoto" class="hidden-file-input" accept="image/*" onchange="previewPhoto(event)">
                <p style="font-size: 11px; font-weight: 700; color: var(--text-muted); margin-top: 15px;">Ketuk ikon kamera untuk mengganti foto.</p>
            </div>

            <div class="form-card">
                <form id="formProfile" onsubmit="saveProfile(event)">
                    <div class="form-group">
                        <label class="form-label">Email Terdaftar (Permanen)</label>
                        <input type="email" id="pfEmail" class="form-input" disabled>
                    </div>
                    <div class="form-group">
                        <label class="form-label">NIK Terdaftar (Permanen)</label>
                        <input type="text" id="pfNik" class="form-input" disabled style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); color: var(--gold-accent);">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nama Sesuai KTP</label>
                        <input type="text" id="pfName" class="form-input" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label class="form-label">Nomor WhatsApp Aktif</label>
                        <input type="tel" id="pfWa" class="form-input" required oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                    </div>
                    <button type="submit" class="btn-save"><i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan</button>
                </form>
            </div>

            <button class="btn-logout" onclick="prosesLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar dari Aplikasi</button>

        </div>
    </div>

    <script>
        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            const metaTheme = document.getElementById('metaThemeColor');
            if (theme === 'light') {
                icon.className = 'fa-solid fa-moon'; 
                metaTheme.setAttribute("content", "#F1F5F9");
            } else {
                icon.className = 'fa-solid fa-sun'; 
                metaTheme.setAttribute("content", "#0F172A");
            }
        }
        window.addEventListener('DOMContentLoaded', () => { updateThemeIcon(savedTheme); });
        window.toggleTheme = function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('kgr_theme', targetTheme);
            updateThemeIcon(targetTheme);
        }
    </script>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        window.customAlert = function(title, desc, type = 'success') {
            const el = document.getElementById('customAlert'); document.getElementById('caTitle').innerText = title; document.getElementById('caDesc').innerText = desc;
            const iconEl = document.getElementById('caIcon');
            if(type === 'success') { iconEl.className = 'cp-icon success'; iconEl.innerHTML = '<i class="fa-solid fa-check"></i>'; }
            else if(type === 'error') { iconEl.className = 'cp-icon error'; iconEl.innerHTML = '<i class="fa-solid fa-xmark"></i>'; }
            else { iconEl.className = 'cp-icon warning'; iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; }
            el.classList.add('show');
        }
        window.closeCustomAlert = function() { document.getElementById('customAlert').classList.remove('show'); }
        window.customConfirm = function(title, desc, onYes) {
            const el = document.getElementById('customConfirm'); document.getElementById('ccTitle').innerText = title; document.getElementById('ccDesc').innerText = desc;
            document.getElementById('ccBtnYes').onclick = function() { closeCustomConfirm(); onYes(); }; el.classList.add('show');
        }
        window.closeCustomConfirm = function() { document.getElementById('customConfirm').classList.remove('show'); }
        window.showLoading = function(title = "Memproses...") { document.getElementById('clTitle').innerText = title; document.getElementById('customLoading').classList.add('show'); }
        window.hideLoading = function() { document.getElementById('customLoading').classList.remove('show'); }

        const CRYPTO_OFFSET = 7;
        function decryptData(encoded) {
            if (!encoded) return "";
            try {
                let decoded = decodeURIComponent(escape(atob(encoded))); 
                return decoded.split("").map(char => String.fromCharCode(char.charCodeAt(0) - CRYPTO_OFFSET)).join("");
            } catch(e) { return encoded; } 
        }

        let userEmail = "";
        let newBase64Photo = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userEmail = user.email;
                document.getElementById('pfEmail').value = userEmail;
                
                showLoading("Memuat Profil...");
                try {
                    const docSnap = await getDoc(doc(db, "users", userEmail));
                    if (docSnap.exists()) {
                        const d = docSnap.data();
                        document.getElementById('pfName').value = d.nama_lengkap || "";
                        document.getElementById('pfWa').value = d.no_wa ? String(d.no_wa) : "";
                        document.getElementById('pfNik').value = decryptData(d.nik || "");
                        
                        const picEl = document.getElementById('uiProfilePic');
                        if (d.profile_image) {
                            picEl.style.backgroundImage = `url('${d.profile_image}')`;
                            picEl.innerHTML = "";
                        } else {
                            picEl.innerHTML = (d.nama_lengkap || "A").charAt(0).toUpperCase();
                        }
                    }
                    hideLoading();
                } catch(e) { hideLoading(); customAlert("Gagal", "Gagal menarik data profil.", "error"); }
            } else { window.location.href = 'login.html'; }
        });

        window.previewPhoto = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 3 * 1024 * 1024) { return customAlert("Foto Terlalu Besar", "Ukuran foto maksimal 3MB. Silahkan pilih foto lain.", "warning"); }

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500; 
                    let scaleSize = MAX_WIDTH / img.width;
                    if(scaleSize > 1) scaleSize = 1;
                    
                    canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    newBase64Photo = canvas.toDataURL('image/jpeg', 0.6); 
                    
                    const picEl = document.getElementById('uiProfilePic');
                    picEl.style.backgroundImage = `url('${newBase64Photo}')`;
                    picEl.innerHTML = "";
                }
            };
        }

        window.saveProfile = async function(e) {
            e.preventDefault();
            const nameParts = document.getElementById('pfName').value.trim().split(/\s+/);
            if (nameParts.length < 2) return customAlert('Nama Tidak Lengkap', 'Harap masukkan Nama Lengkap sesuai KTP (Minimal 2 kata).', 'warning');

            showLoading("Menyimpan Perubahan...");
            try {
                let updates = { nama_lengkap: document.getElementById('pfName').value, no_wa: document.getElementById('pfWa').value };
                if (newBase64Photo) updates.profile_image = newBase64Photo;

                await updateDoc(doc(db, "users", userEmail), updates);
                hideLoading(); customAlert("Berhasil", "Profil Anda telah diperbarui.", "success");
            } catch(e) { hideLoading(); customAlert("Gagal", "Error menyimpan perubahan profil.", "error"); }
        }

        window.prosesLogout = function() {
            customConfirm("Konfirmasi Keluar", "Anda yakin ingin keluar dari aplikasi KGR?", async () => {
                showLoading("Keluar Aplikasi...");
                try {
                    await signOut(auth); hideLoading(); window.location.href = 'login.html';
                } catch(e) { hideLoading(); customAlert("Gagal Keluar", e.message, "error"); }
            });
        }
    </script>
    <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err)); }); }</script>
</body>
</html>
