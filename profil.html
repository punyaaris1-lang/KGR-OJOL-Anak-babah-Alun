<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F5F5F7">
    <title>Setting Profil - KGR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #F5F5F7; --text-dark: #000000; --text-black: #111111; --text-gray: #8E8E93; --gold-primary: #D4AF37; --gold-deep: linear-gradient(135deg, #A67C00, #D4AF37, #8B6914, #B38728); --glass-bg: rgba(255, 255, 255, 0.75); --glass-border: rgba(255, 255, 255, 0.9); --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.04); --color-out: #DC3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E5E5E5; background-image: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(10, 132, 255, 0.05), transparent 25%); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-base); position: relative; overflow: hidden; display: flex; flex-direction: column; color: var(--text-dark); }
        @media (min-width: 600px) { .app-container { max-width: 480px; height: 90vh; max-height: 900px; border-radius: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15), inset 0 0 0 8px #FFFFFF; border: 1px solid rgba(0,0,0,0.05); } }
        .orb { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; animation: floatOrb 8s infinite alternate ease-in-out; }
        .orb-1 { width: 300px; height: 300px; background: rgba(212, 175, 55, 0.25); top: -50px; right: -50px; }
        .orb-2 { width: 250px; height: 250px; background: rgba(10, 132, 255, 0.15); bottom: 100px; left: -50px; animation-delay: -3s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-30px, 40px) scale(1.1); } }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft), inset 0 0 20px rgba(255,255,255,0.5); z-index: 2; position: relative; }
        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; z-index: 10; position: relative; border-bottom: 1px solid rgba(0,0,0,0.05); background: rgba(245,245,247,0.8); backdrop-filter: blur(20px); }
        .btn-back { width: 40px; height: 40px; border-radius: 14px; background: #FFF; color: var(--text-dark); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); }
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 110px; scrollbar-width: none; z-index: 2; position: relative; }
        .content-area::-webkit-scrollbar { display: none; }
        .profile-card { border-radius: 24px; padding: 30px 20px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; background-size: cover; background-position: center; border: 4px solid #FFF; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .btn-edit-foto { position: absolute; bottom: 0; right: 0; width: 32px; height: 32px; background: var(--text-dark); color: var(--gold-primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; border: 2px solid #FFF; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .role-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; background: var(--gold-deep); color: #FFF; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }
        .form-group { width: 100%; margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--text-gray); }
        .form-input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1.5px solid rgba(0,0,0,0.06); font-size: 14px; font-weight: 700; color: var(--text-dark); outline: none; background: #FFF; transition: 0.2s; }
        .form-input:focus { border-color: var(--gold-primary); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
        .form-input:disabled { background: #F0F0F0; color: #A0A0A0; cursor: not-allowed; border-color: transparent; }
        .btn-save { width: 100%; padding: 16px; border-radius: 16px; font-size: 13px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-save i { color: var(--gold-primary); }
        .btn-save:disabled { background: #CCC; cursor: not-allowed; box-shadow: none; }
        .btn-superadmin { width: 100%; padding: 16px; border-radius: 16px; font-size: 13px; font-weight: 800; background: var(--text-dark); color: var(--gold-primary); border: none; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; }
        .btn-logout { width: 100%; padding: 16px; border-radius: 16px; font-size: 13px; font-weight: 800; background: #FFF; color: var(--color-out); border: 2px solid var(--color-out); display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Pengaturan Profil</h2>
        </div>

        <div class="content-area">
            <div class="profile-card glass-panel">
                <div class="profile-avatar" id="avatarPreview" style="background-image: url('https://ui-avatars.com/api/?name=Ahmad+Rizky&background=1C1C1E&color=D4AF37&size=200');">
                    <div class="btn-edit-foto" onclick="document.getElementById('uploadFoto').click()"><i class="fa-solid fa-camera"></i></div>
                    <input type="file" id="uploadFoto" accept="image/*" hidden onchange="previewImage(event)">
                </div>
                
                <div class="role-badge" id="uiRoleBadge"><i class="fa-solid fa-crown" style="margin-right: 4px;"></i> Memuat...</div>

                <div class="form-group"><label class="form-label">Nama Lengkap</label><input type="text" id="inputNama" class="form-input" value="Ahmad Rizky" oninput="checkChanges()"></div>
                <div class="form-group"><label class="form-label">Nomor WhatsApp</label><input type="tel" id="inputWa" class="form-input" value="0812-3456-7890" oninput="checkChanges()"></div>
                <div class="form-group"><label class="form-label">ID Member (Hanya Baca)</label><input type="text" class="form-input" value="OBA-001" disabled></div>

                <button class="btn-save" id="btnSave" onclick="saveProfile()" disabled><i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan</button>
            </div>

            <button id="btnPanelAdmin" class="btn-superadmin" style="display: none;" onclick="window.location.href='admin.html'">
                <i class="fa-solid fa-user-shield"></i> Buka Panel Admin
            </button>

            <button class="btn-logout" onclick="confirmLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar Akun</button>
        </div>
    </div>

    <script>
        // ======= SIMULASI JABATAN (Ganti teks di bawah untuk ngetes) =======
        const roleSaatIni = "Super Admin"; // Coba ganti jadi "Admin", "Bendahara", atau "Member"

        // Render UI Berdasarkan Jabatan
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('uiRoleBadge').innerHTML = `<i class="fa-solid fa-star" style="margin-right: 4px;"></i> ${roleSaatIni}`;
            
            // Logika Pembatasan Tombol Panel Admin
            if (roleSaatIni === "Admin" || roleSaatIni === "Super Admin") {
                document.getElementById('btnPanelAdmin').style.display = 'flex'; // Munculkan Tombol
            }
        });

        // Logika Editor Profil
        let originalName = document.getElementById('inputNama').value;
        let originalWa = document.getElementById('inputWa').value;
        let newImageUploaded = false;

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').style.backgroundImage = `url('${e.target.result}')`;
                    newImageUploaded = true; checkChanges();
                }
                reader.readAsDataURL(file);
            }
        }

        function checkChanges() {
            const currentName = document.getElementById('inputNama').value;
            const currentWa = document.getElementById('inputWa').value;
            document.getElementById('btnSave').disabled = !(currentName !== originalName || currentWa !== originalWa || newImageUploaded);
        }

        function saveProfile() {
            const btnSave = document.getElementById('btnSave');
            btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...'; btnSave.disabled = true;
            setTimeout(() => {
                originalName = document.getElementById('inputNama').value; originalWa = document.getElementById('inputWa').value; newImageUploaded = false;
                btnSave.innerHTML = '<i class="fa-solid fa-check" style="color: #28A745;"></i> Berhasil Disimpan';
                setTimeout(() => { btnSave.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan'; btnSave.disabled = true; }, 2000);
            }, 1000);
        }

        function confirmLogout() { if(confirm("Yakin ingin keluar?")) alert("Berhasil Keluar."); }
    </script>
</body>
</html>
