<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A" id="metaThemeColor">
    <title>Pusat Informasi - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('kgr_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        localStorage.setItem('kgr_last_page', 'info.html'); // SMART ROUTER
    </script>

    <style>
        /* TEMA FLAT PREMIUM */
        :root { 
            --bg-body: #F1F5F9; --text-main: #0F172A; --text-muted: #64748B;
            --card-bg: #FFFFFF; --card-border: #E2E8F0; --header-bg: #0F172A;
            --emerald-main: #059669; --gold-accent: #F59E0B; --danger-red: #EF4444;
            --input-bg: #F8FAFC; --modal-bg: #FFFFFF;
        }

        [data-theme="dark"] {
            --bg-body: #0F172A; --text-main: #F8FAFC; --text-muted: #94A3B8;
            --card-bg: #1E293B; --card-border: #334155; --header-bg: #020617;
            --emerald-main: #10B981; --gold-accent: #FBBF24; 
            --input-bg: #0F172A; --modal-bg: #1E293B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-body); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; position: relative; color: var(--text-main); margin: 0; transition: background-color 0.3s ease, color 0.3s ease;}

        .app-container { width: 100%; max-width: 480px; height: 100dvh; background: var(--bg-body); position: relative; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; z-index: 10; scrollbar-width: none;}
        .app-container::-webkit-scrollbar { display: none; }
        @media (min-width: 600px) { .app-container { height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.15); border: 8px solid var(--card-border); margin: auto; } }

        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; border-bottom: 1px solid var(--card-border); z-index: 10; background: var(--header-bg); border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;}
        .btn-back { width: 42px; height: 42px; border-radius: 14px; background: var(--card-bg); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-main); transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 2px solid var(--card-border);}
        .btn-back:active { transform: scale(0.9); background: var(--emerald-main); color: #FFF; border-color: var(--emerald-main);}
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: #FFF; text-align: center; flex-grow: 1;}

        .content-area { flex-grow: 1; padding: 25px 24px 110px; }

        .btn-add-info { width: 100%; padding: 18px; border-radius: 18px; font-size: 14px; font-weight: 900; background: var(--card-bg); border: 2px solid var(--card-border); color: var(--emerald-main); display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 10px rgba(0,0,0,0.02); }
        .btn-add-info:active { transform: scale(0.96); background: var(--emerald-main); color: #FFF; border-color: var(--emerald-main);}
        .btn-add-info i { color: var(--gold-accent); }

        .section-title { font-size: 15px; font-weight: 900; margin: 0 0 15px; color: var(--text-main); text-transform: uppercase; letter-spacing: 1px;}

        /* INFO CARD FLAT */
        .info-card { padding: 22px 20px; margin-bottom: 15px; position: relative; overflow: hidden; transition: 0.2s; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px;}
        .info-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--emerald-main); }
        .info-card.urgent::before { background: var(--danger-red); }
        .info-card.urgent { background: var(--card-bg); border-color: rgba(239, 68, 68, 0.3); }

        .info-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .badge.gold { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); }
        .badge.red { background: rgba(239, 68, 68, 0.15); color: var(--danger-red); }
        
        .info-date { font-size: 11px; font-weight: 800; color: var(--text-muted); }
        .info-card h3 { font-size: 16px; font-weight: 900; color: var(--text-main); margin-bottom: 8px; line-height: 1.4; letter-spacing: -0.3px;}
        .info-card p { font-size: 13px; font-weight: 700; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; white-space: pre-wrap;}

        .info-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed var(--card-border); padding-top: 15px; margin-top: 15px; }
        .info-author { font-size: 11px; font-weight: 800; color: var(--text-muted); display: flex; align-items: center; gap: 5px;}
        .info-author i { color: var(--emerald-main); }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger-red); border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
        .btn-delete:active { background: var(--danger-red); color: #FFF; transform: scale(0.9); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); border: 2px dashed var(--card-border); border-radius: 20px;}
        .empty-state i { font-size: 35px; margin-bottom: 10px; opacity: 0.5; }
        .empty-state p { font-size: 13px; font-weight: 700; }

        /* MODAL KACA THEME-AWARE */
        .modal-overlay, .cp-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .modal-overlay { align-items: flex-end; padding: 0; }
        .cp-overlay { padding: 20px; }
        .modal-overlay.show, .cp-overlay.show { opacity: 1; visibility: visible; }
        
        .modal-content { background: var(--modal-bg); border-top: 1px solid var(--card-border); border-radius: 32px 32px 0 0; padding: 30px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.3); color: var(--text-main); max-height: 85vh; overflow-y: auto;}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 900; }
        .btn-close-modal { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--card-border); background: var(--input-bg); display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; color: var(--text-main); transition: 0.2s;}
        .btn-close-modal:active { transform: scale(0.9); }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); }
        .form-input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--card-border); font-size: 14px; font-weight: 700; outline: none; background: var(--input-bg); color: var(--text-main); transition: 0.2s;}
        .form-input:focus { border-color: var(--emerald-main); }
        
        .btn-submit { width: 100%; padding: 18px; border-radius: 16px; font-size: 14px; font-weight: 900; background: var(--emerald-main); color: #FFF; border: none; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 20px rgba(5,150,105,0.3); transition: 0.2s;}
        .btn-submit:active { transform: scale(0.96); }

        /* CUSTOM POPUP THEME-AWARE */
        .cp-box { background: var(--modal-bg); border: 1px solid var(--card-border); border-radius: 30px; width: 100%; max-width: 320px; text-align: center; padding: 30px 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 25px 50px rgba(0,0,0,0.3); color: var(--text-main); }
        .cp-overlay.show .cp-box { transform: scale(1); }
        .cp-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 0 auto 15px; }
        .cp-icon.success { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); }
        .cp-icon.error { background: rgba(239, 68, 68, 0.15); color: var(--danger-red); }
        .cp-icon.warning { background: rgba(245, 158, 11, 0.15); color: var(--gold-accent); }
        .cp-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
        .cp-desc { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }
        .cp-btn-wrap { display: flex; gap: 10px; }
        .cp-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .cp-btn:active { transform: scale(0.95); }
        .cp-btn-primary { background: var(--emerald-main); color: #FFF; box-shadow: 0 8px 20px rgba(5,150,105,0.3);}
        .cp-btn-cancel { background: var(--input-bg); color: var(--text-main); border: 2px solid var(--card-border);}
        .cp-btn-danger { background: var(--danger-red); color: #FFF; box-shadow: 0 8px 20px rgba(239,68,68,0.3);}
        .spinner-custom { border: 4px solid var(--card-border); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--emerald-main); animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="cp-overlay" id="customAlert">
        <div class="cp-box">
            <div class="cp-icon success" id="caIcon"><i class="fa-solid fa-check"></i></div>
            <h3 class="cp-title" id="caTitle">Pemberitahuan</h3>
            <p class="cp-desc" id="caDesc">Pesan</p>
            <button class="cp-btn cp-btn-primary" onclick="closeCustomAlert()" style="width: 100%;">Mengerti</button>
        </div>
    </div>
    <div class="cp-overlay" id="customConfirm">
        <div class="cp-box">
            <div class="cp-icon warning"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 class="cp-title" id="ccTitle">Konfirmasi</h3>
            <p class="cp-desc" id="ccDesc">Apakah Anda yakin?</p>
            <div class="cp-btn-wrap">
                <button class="cp-btn cp-btn-cancel" onclick="closeCustomConfirm()">Batal</button>
                <button class="cp-btn cp-btn-danger" id="ccBtnYes">Ya, Eksekusi</button>
            </div>
        </div>
    </div>
    <div class="cp-overlay" id="customLoading">
        <div class="cp-box" style="padding: 40px 20px;">
            <div class="spinner-custom"></div>
            <h3 class="cp-title" id="clTitle" style="margin-bottom: 0;">Memproses...</h3>
        </div>
    </div>

    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Pusat Informasi</h2>
            <div class="btn-back" onclick="toggleTheme()" title="Ganti Tema"><i id="themeIcon" class="fa-solid fa-moon"></i></div>
        </div>
        <div class="content-area">
            <button id="btnTambahInfo" class="btn-add-info" style="display: none;" onclick="openModal()">
                <i class="fa-solid fa-bullhorn"></i> Buat Pengumuman Baru
            </button>
            <div class="section-title">Papan Pengumuman</div>
            <div id="infoListContainer">
                <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Memuat pengumuman terbaru...</p></div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Buat Pengumuman</h3>
                <button type="button" onclick="closeModal()" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="formInfo" onsubmit="submitPengumuman(event)">
                <div class="form-group">
                    <label class="form-label">Tingkat Kepentingan</label>
                    <select id="infoTipe" class="form-input">
                        <option value="normal">Normal (Hijau) - Kegiatan / Info</option>
                        <option value="urgent">Penting (Merah) - Wajib Dibaca Segera</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Judul Pengumuman</label>
                    <input type="text" id="infoJudul" class="form-input" placeholder="Contoh: Jadwal Kopdar Bulan Ini" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Isi Detail</label>
                    <textarea id="infoIsi" class="form-input" rows="5" placeholder="Tuliskan isi pengumuman secara detail di sini..." required style="resize: none;"></textarea>
                </div>
                <button type="submit" id="btnSubmitInfo" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Terbitkan Sekarang</button>
            </form>
        </div>
    </div>

    <script>
        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            const metaTheme = document.getElementById('metaThemeColor');
            if (theme === 'light') {
                icon.className = 'fa-solid fa-moon'; 
                metaTheme.setAttribute("content", "#F1F5F9");
            } else {
                icon.className = 'fa-solid fa-sun'; 
                metaTheme.setAttribute("content", "#0F172A");
            }
        }
        window.addEventListener('DOMContentLoaded', () => { updateThemeIcon(savedTheme); });
        window.toggleTheme = function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('kgr_theme', targetTheme);
            updateThemeIcon(targetTheme);
        }
    </script>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, onSnapshot, doc, getDoc, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        window.customAlert = function(title, desc, type = 'success') {
            const el = document.getElementById('customAlert'); document.getElementById('caTitle').innerText = title; document.getElementById('caDesc').innerText = desc;
            const iconEl = document.getElementById('caIcon');
            if(type === 'success') { iconEl.className = 'cp-icon success'; iconEl.innerHTML = '<i class="fa-solid fa-check"></i>'; }
            else if(type === 'error') { iconEl.className = 'cp-icon error'; iconEl.innerHTML = '<i class="fa-solid fa-xmark"></i>'; }
            else { iconEl.className = 'cp-icon warning'; iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; }
            el.classList.add('show');
        }
        window.closeCustomAlert = function() { document.getElementById('customAlert').classList.remove('show'); }
        window.customConfirm = function(title, desc, onYes) {
            const el = document.getElementById('customConfirm'); document.getElementById('ccTitle').innerText = title; document.getElementById('ccDesc').innerText = desc;
            document.getElementById('ccBtnYes').onclick = function() { closeCustomConfirm(); onYes(); }; el.classList.add('show');
        }
        window.closeCustomConfirm = function() { document.getElementById('customConfirm').classList.remove('show'); }
        window.showLoading = function(title = "Memproses...") { document.getElementById('clTitle').innerText = title; document.getElementById('customLoading').classList.add('show'); }
        window.hideLoading = function() { document.getElementById('customLoading').classList.remove('show'); }

        let userRole = "member"; let userName = "Admin KGR";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists()) {
                    userRole = (docSnap.data().role || "member").toLowerCase(); userName = docSnap.data().nama_lengkap || "Pengurus";
                    if (["developer", "superadmin", "admin"].includes(userRole)) {
                        document.getElementById('btnTambahInfo').style.display = 'flex'; 
                    }
                    loadPengumuman();
                }
            } else { window.location.href = 'login.html'; }
        });

        window.openModal = function() { document.getElementById('infoModal').classList.add('show'); }
        window.closeModal = function() { document.getElementById('infoModal').classList.remove('show'); document.getElementById('formInfo').reset(); }

        function loadPengumuman() {
            onSnapshot(query(collection(db, "pengumuman"), orderBy("tanggal", "desc")), (snapshot) => {
                const listContainer = document.getElementById('infoListContainer'); listContainer.innerHTML = ""; 
                if (snapshot.empty) { listContainer.innerHTML = `<div class="empty-state"><i class="fa-solid fa-folder-open"></i><p>Belum ada pengumuman untuk saat ini.</p></div>`; return; }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const id = docSnap.id;
                    let tglText = "Baru saja"; if(data.tanggal) tglText = data.tanggal.toDate().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                    
                    const isUrgent = data.tipe === "urgent";
                    const cardClass = isUrgent ? "info-card urgent" : "info-card"; 
                    const badgeClass = isUrgent ? "badge red" : "badge gold";
                    const badgeIcon = isUrgent ? "fa-triangle-exclamation" : "fa-bullhorn"; 
                    const badgeText = isUrgent ? "Wajib Dibaca" : "Informasi";

                    const deleteBtnHtml = (["developer", "superadmin", "admin"].includes(userRole)) 
                        ? `<button class="btn-delete" onclick="hapusPengumuman('${id}')"><i class="fa-solid fa-trash-can"></i> Hapus</button>` : ``;

                    listContainer.innerHTML += `
                        <div class="${cardClass}">
                            <div class="info-header"><div class="${badgeClass}"><i class="fa-solid ${badgeIcon}" style="margin-right: 4px;"></i> ${badgeText}</div><div class="info-date">${tglText}</div></div>
                            <h3>${data.judul}</h3><p>${data.isi}</p>
                            <div class="info-footer"><div class="info-author"><i class="fa-solid fa-pen-nib"></i> Oleh: ${data.pembuat}</div>${deleteBtnHtml}</div>
                        </div>`;
                });
            });
        }

        window.submitPengumuman = async function(e) {
            e.preventDefault(); 
            showLoading("Menerbitkan Pengumuman...");
            try {
                await addDoc(collection(db, "pengumuman"), { tipe: document.getElementById('infoTipe').value, judul: document.getElementById('infoJudul').value, isi: document.getElementById('infoIsi').value, pembuat: userName, tanggal: serverTimestamp() });
                hideLoading(); customAlert("Berhasil", "Pengumuman telah disebar ke seluruh anggota.", "success");
                closeModal();
            } catch (error) { hideLoading(); customAlert("Gagal", "Sistem error saat menerbitkan.", "error"); } 
        }

        window.hapusPengumuman = async function(docId) { 
            customConfirm("Hapus Pengumuman", "Apakah Anda yakin ingin menarik/menghapus pengumuman ini?", async () => {
                showLoading("Menghapus...");
                try {
                    await deleteDoc(doc(db, "pengumuman", docId)); 
                    hideLoading(); customAlert("Terhapus", "Pengumuman ditarik.", "success");
                } catch(e) { hideLoading(); customAlert("Gagal", "Error menghapus data.", "error"); }
            });
        }
    </script>
    <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err)); }); }</script>
</body>
</html>
