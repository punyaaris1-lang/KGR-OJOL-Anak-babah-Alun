<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#064E3B">
    <title>Pusat Informasi - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-base: #F4F6F5; --text-dark: #111827; --text-gray: #4B5563; --emerald-main: #059669; --gold-accent: #FBBF24; --danger-red: #DC2626; --danger-light: rgba(220, 38, 38, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E2E8E4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-base); background-image: radial-gradient(circle at 50% 35%, rgba(5, 150, 105, 0.12) 0%, rgba(5, 150, 105, 0.03) 35%, var(--bg-base) 70%); position: relative; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; color: var(--text-dark); }
        @media (min-width: 600px) { .app-container { max-width: 480px; height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15); border: 8px solid #FFFFFF; margin: auto;} }

        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; background: #FFF; z-index: 10; border-bottom: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .btn-back { width: 42px; height: 42px; border-radius: 14px; background: #F5F5F7; color: var(--text-dark); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,0,0,0.05); }
        .btn-back:active { transform: scale(0.85); background: var(--emerald-main); color: #FFF; }
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }

        .content-area { flex-grow: 1; overflow-y: auto; padding: 25px 24px 110px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        .btn-add-info { width: 100%; padding: 18px; border-radius: 18px; font-size: 14px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); }
        .btn-add-info:active { transform: scale(0.96); }
        .btn-add-info i { color: var(--gold-accent); }

        .section-title { font-size: 15px; font-weight: 900; margin: 0 0 15px; color: var(--text-dark); text-transform: uppercase; letter-spacing: 1px;}

        /* INFO CARD */
        .info-card { padding: 22px 20px; border-radius: 20px; margin-bottom: 15px; background: #FFF; border: 1px solid rgba(0,0,0,0.04); box-shadow: 0 5px 20px rgba(0,0,0,0.02); position: relative; overflow: hidden; transition: 0.2s;}
        .info-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--emerald-main); }
        .info-card.urgent::before { background: var(--danger-red); }
        .info-card.urgent { background: linear-gradient(to right, rgba(220, 38, 38, 0.02), #FFF); border-color: rgba(220, 38, 38, 0.1); }

        .info-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .badge.gold { background: rgba(5, 150, 105, 0.15); color: var(--emerald-main); }
        .badge.red { background: var(--danger-light); color: var(--danger-red); }
        
        .info-date { font-size: 11px; font-weight: 800; color: var(--text-gray); }
        .info-card h3 { font-size: 16px; font-weight: 900; color: var(--text-dark); margin-bottom: 8px; line-height: 1.4; letter-spacing: -0.3px;}
        .info-card p { font-size: 13px; font-weight: 700; color: var(--text-gray); line-height: 1.6; margin-bottom: 16px; white-space: pre-wrap;}

        .info-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 15px; margin-top: 15px; }
        .info-author { font-size: 11px; font-weight: 800; color: var(--text-gray); display: flex; align-items: center; gap: 5px;}
        .info-author i { color: var(--emerald-main); }
        .btn-delete { background: var(--danger-light); color: var(--danger-red); border: none; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
        .btn-delete:active { background: var(--danger-red); color: #FFF; transform: scale(0.9); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-gray); border: 2px dashed rgba(0,0,0,0.1); border-radius: 20px;}
        .empty-state i { font-size: 35px; margin-bottom: 10px; opacity: 0.5; }
        .empty-state p { font-size: 13px; font-weight: 700; }

        /* MODAL BOUNCY */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: flex-end; z-index: 100; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: #FFF; border-radius: 32px 32px 0 0; padding: 30px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.15);}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 900; color: var(--text-dark); }
        .btn-close-modal { width: 32px; height: 32px; border-radius: 50%; border: none; background: #F5F5F7; display: flex; justify-content: center; align-items: center; font-size: 14px; cursor: pointer; color: var(--text-dark); transition: 0.2s;}
        .btn-close-modal:active { transform: scale(0.9); }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--text-gray); }
        .form-input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.06); font-size: 14px; font-weight: 700; outline: none; background: #F9F9F9; color: var(--text-dark); appearance: none; transition: 0.2s;}
        .form-input:focus { border-color: var(--emerald-main); background: #FFF; }
        .btn-submit { width: 100%; padding: 18px; border-radius: 16px; font-size: 14px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.15); transition: 0.2s;}
        .btn-submit:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Pusat Informasi</h2>
        </div>
        <div class="content-area">
            <button id="btnTambahInfo" class="btn-add-info" style="display: none;" onclick="openModal()">
                <i class="fa-solid fa-bullhorn"></i> Buat Pengumuman Baru
            </button>
            <div class="section-title">Papan Pengumuman</div>
            <div id="infoListContainer">
                <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Memuat pengumuman terbaru...</p></div>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Buat Pengumuman</h3>
                <button type="button" onclick="closeModal()" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="formInfo" onsubmit="submitPengumuman(event)">
                <div class="form-group">
                    <label class="form-label">Tingkat Kepentingan</label>
                    <select id="infoTipe" class="form-input">
                        <option value="normal">Normal (Hijau) - Kegiatan / Info</option>
                        <option value="urgent">Penting (Merah) - Wajib Dibaca Segera</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Judul Pengumuman</label>
                    <input type="text" id="infoJudul" class="form-input" placeholder="Contoh: Jadwal Kopdar Bulan Ini" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Isi Detail</label>
                    <textarea id="infoIsi" class="form-input" rows="5" placeholder="Tuliskan isi pengumuman secara detail di sini..." required style="resize: none;"></textarea>
                </div>
                <button type="submit" id="btnSubmitInfo" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Terbitkan Sekarang</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, onSnapshot, doc, getDoc, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let userRole = "member"; let userName = "Admin KGR";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists()) {
                    userRole = (docSnap.data().role || "member").toLowerCase(); userName = docSnap.data().nama_lengkap || "Pengurus";
                    if (userRole === "superadmin" || userRole === "admin") document.getElementById('btnTambahInfo').style.display = 'flex'; 
                    loadPengumuman();
                }
            } else { window.location.href = 'login.html'; }
        });

        window.openModal = function() { document.getElementById('infoModal').classList.add('show'); }
        window.closeModal = function() { document.getElementById('infoModal').classList.remove('show'); document.getElementById('formInfo').reset(); }

        function loadPengumuman() {
            onSnapshot(query(collection(db, "pengumuman"), orderBy("tanggal", "desc")), (snapshot) => {
                const listContainer = document.getElementById('infoListContainer'); listContainer.innerHTML = ""; 
                if (snapshot.empty) { listContainer.innerHTML = `<div class="empty-state"><i class="fa-solid fa-folder-open"></i><p>Belum ada pengumuman untuk saat ini.</p></div>`; return; }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const id = docSnap.id;
                    let tglText = "Baru saja"; if(data.tanggal) tglText = data.tanggal.toDate().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                    
                    const isUrgent = data.tipe === "urgent";
                    const cardClass = isUrgent ? "info-card urgent" : "info-card"; const badgeClass = isUrgent ? "badge red" : "badge gold";
                    const badgeIcon = isUrgent ? "fa-triangle-exclamation" : "fa-bullhorn"; const badgeText = isUrgent ? "Wajib Dibaca" : "Informasi";

                    const deleteBtnHtml = (userRole === "superadmin" || userRole === "admin") 
                        ? `<button class="btn-delete" onclick="hapusPengumuman('${id}')"><i class="fa-solid fa-trash-can"></i> Hapus</button>` : ``;

                    listContainer.innerHTML += `
                        <div class="${cardClass}">
                            <div class="info-header"><div class="${badgeClass}"><i class="fa-solid ${badgeIcon}" style="margin-right: 4px;"></i> ${badgeText}</div><div class="info-date">${tglText}</div></div>
                            <h3>${data.judul}</h3><p>${data.isi}</p>
                            <div class="info-footer"><div class="info-author"><i class="fa-solid fa-pen-nib"></i> Oleh: ${data.pembuat}</div>${deleteBtnHtml}</div>
                        </div>`;
                });
            });
        }

        window.submitPengumuman = async function(e) {
            e.preventDefault(); const btn = document.getElementById('btnSubmitInfo'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menerbitkan...'; btn.disabled = true;
            try {
                await addDoc(collection(db, "pengumuman"), { tipe: document.getElementById('infoTipe').value, judul: document.getElementById('infoJudul').value, isi: document.getElementById('infoIsi').value, pembuat: userName, tanggal: serverTimestamp() });
                closeModal();
            } catch (error) { alert('Gagal menerbitkan pengumuman.'); } finally { btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Terbitkan Sekarang'; btn.disabled = false; }
        }

        window.hapusPengumuman = async function(docId) { if(confirm("Apakah Anda yakin ingin menghapus pengumuman ini?")) { await deleteDoc(doc(db, "pengumuman", docId)); } }
    </script>
</body>
</html>
