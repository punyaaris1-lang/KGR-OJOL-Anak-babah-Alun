<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A">
    <title>Kegiatan Sosial - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --emerald-main: #059669; --emerald-dark: #022C22;
            --gold-accent: #FBBF24; --danger-red: #EF4444; --warning-yellow: #F59E0B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #0F172A; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; position: relative; color: #FFF; margin: 0;}

        .orb { position: absolute; border-radius: 50%; filter: blur(70px); z-index: 0; animation: float 10s infinite alternate ease-in-out;}
        .orb-1 { top: 10%; right: -10%; width: 250px; height: 250px; background: rgba(5, 150, 105, 0.4); }
        .orb-2 { bottom: 5%; left: -10%; width: 300px; height: 300px; background: rgba(5, 150, 105, 0.3); animation-delay: -5s;}
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

        .app-container { width: 100%; max-width: 414px; height: 100vh; background: transparent; position: relative; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; z-index: 10; scrollbar-width: none;}
        .app-container::-webkit-scrollbar { display: none; }
        @media (min-width: 600px) { .app-container { max-width: 480px; height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5); border: 4px solid rgba(255,255,255,0.1); margin: auto; } }

        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.2); border-left: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); border-radius: 24px; color: #FFF;}
        .glass-emerald { background: linear-gradient(135deg, rgba(5, 150, 105, 0.4) 0%, rgba(2, 44, 34, 0.6) 100%); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(5, 150, 105, 0.5); box-shadow: 0 15px 35px rgba(5, 150, 105, 0.3); border-radius: 24px; color: #FFF;}

        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px);}
        .btn-back { width: 42px; height: 42px; border-radius: 14px; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; cursor: pointer; color: #FFF; transition: 0.2s; border: 1px solid rgba(255,255,255,0.2);}
        .btn-back:active { transform: scale(0.9); background: var(--emerald-main); }
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: #FFF;}

        .content-area { flex-grow: 1; padding: 25px 24px 110px; }

        .summary-card { padding: 25px 20px; margin-bottom: 25px; text-align: center; position: relative; overflow: hidden;}
        .summary-card .label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;}
        .summary-card .amount { font-size: 28px; font-weight: 900; color: #FFF; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .summary-card .desc { font-size: 12px; font-weight: 700; color: var(--gold-accent); display: flex; align-items: center; justify-content: center; gap: 5px;}

        .section-title { font-size: 15px; font-weight: 900; margin: 0 0 15px; color: #FFF; text-transform: uppercase; letter-spacing: 1px;}
        
        .btn-tambah { width: 100%; padding: 18px; border-radius: 18px; font-size: 14px; font-weight: 900; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #FFF; display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; cursor: pointer; transition: 0.2s;}
        .btn-tambah:active { transform: scale(0.96); background: var(--emerald-main); border-color: var(--emerald-main); }
        .btn-tambah i { color: var(--gold-accent); }

        .kegiatan-item { overflow: hidden; margin-bottom: 20px; position: relative; transition: 0.2s;}
        .kegiatan-item:active { transform: scale(0.98); }
        
        .kegiatan-img { width: 100%; height: 220px; background-color: #1E293B; background-size: cover; background-position: center; position: relative; }
        .img-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 70%; background: linear-gradient(to top, rgba(15,23,42,1), transparent); }
        .kegiatan-date { position: absolute; top: 15px; right: 15px; padding: 6px 12px; border-radius: 10px; background: rgba(15,23,42,0.8); backdrop-filter: blur(5px); color: #FFF; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2);}
        .btn-delete-kegiatan { position: absolute; top: 15px; left: 15px; width: 35px; height: 35px; border-radius: 12px; background: rgba(239,68,68,0.9); color: #FFF; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); z-index: 5; transition: 0.2s;}
        .btn-delete-kegiatan:active { transform: scale(0.85); background: var(--danger-red); }

        .kegiatan-detail { padding: 20px 20px; }
        .kegiatan-detail h3 { font-size: 16px; font-weight: 900; color: #FFF; margin-bottom: 8px; line-height: 1.3; }
        .kegiatan-meta { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 18px; }
        .kegiatan-meta i { color: #34D399; font-size: 14px; }

        .kegiatan-funds { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .funds-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; }
        .funds-amount { font-size: 16px; font-weight: 900; color: #FCA5A5; letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px;}

        .empty-state { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.5); border-radius: 24px; border: 2px dashed rgba(255,255,255,0.1);}
        .empty-state i { font-size: 35px; margin-bottom: 10px; opacity: 0.5; }
        .empty-state p { font-size: 13px; font-weight: 700; }

        /* MODAL DARK THEME */
        .modal-overlay, .cp-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .modal-overlay { align-items: flex-end; padding: 0; }
        .cp-overlay { padding: 20px; }
        .modal-overlay.show, .cp-overlay.show { opacity: 1; visibility: visible; }
        
        .modal-content { background: rgba(30, 41, 59, 0.98); border-top: 1px solid rgba(255,255,255,0.1); border-radius: 32px 32px 0 0; padding: 30px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.5); color: #FFF; max-height: 85vh; overflow-y: auto;}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 900; color: #FFF; }
        .btn-close-modal { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 14px; cursor: pointer; color: #FFF; transition: 0.2s;}
        .btn-close-modal:active { transform: scale(0.9); }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: rgba(255,255,255,0.7); }
        .form-input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; font-weight: 700; outline: none; background: rgba(255,255,255,0.05); color: #FFF; transition: 0.2s;}
        .form-input::placeholder { color: rgba(255,255,255,0.4); }
        .form-input:focus { border-color: var(--emerald-main); background: rgba(255,255,255,0.1); }
        
        .file-upload-wrapper { position: relative; width: 100%; margin-bottom: 5px; }
        .file-upload-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; z-index: 2; cursor: pointer;}
        .file-upload-btn { width: 100%; padding: 16px; border-radius: 14px; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.3); font-size: 13px; font-weight: 800; display: flex; justify-content: center; align-items: center; gap: 8px; color: #FFF; transition: 0.2s;}
        .btn-submit { width: 100%; padding: 18px; border-radius: 16px; font-size: 14px; font-weight: 900; background: var(--emerald-main); color: #FFF; border: none; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 20px rgba(5,150,105,0.3); transition: 0.2s;}
        .btn-submit:active { transform: scale(0.96); }

        /* CUSTOM POPUP (ALERT & CONFIRM) */
        .cp-box { background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; width: 100%; max-width: 320px; text-align: center; padding: 30px 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 25px 50px rgba(0,0,0,0.5); color: #FFF; }
        .cp-overlay.show .cp-box { transform: scale(1); }
        .cp-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 0 auto 15px; }
        .cp-icon.success { background: rgba(5, 150, 105, 0.2); color: #34D399; }
        .cp-icon.error { background: rgba(239, 68, 68, 0.2); color: var(--danger-red); }
        .cp-icon.warning { background: rgba(245, 158, 11, 0.2); color: var(--gold-accent); }
        .cp-title { font-size: 18px; font-weight: 900; color: #FFF; margin-bottom: 8px; }
        .cp-desc { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 25px; line-height: 1.5; }
        .cp-btn-wrap { display: flex; gap: 10px; }
        .cp-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .cp-btn:active { transform: scale(0.95); }
        .cp-btn-primary { background: var(--emerald-main); color: #FFF; box-shadow: 0 5px 15px rgba(5,150,105,0.3);}
        .cp-btn-cancel { background: rgba(255,255,255,0.1); color: #FFF; border: 1px solid rgba(255,255,255,0.2);}
        .cp-btn-danger { background: var(--danger-red); color: #FFF; box-shadow: 0 5px 15px rgba(239,68,68,0.3);}
        .spinner-custom { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--emerald-main); animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="cp-overlay" id="customAlert">
        <div class="cp-box">
            <div class="cp-icon success" id="caIcon"><i class="fa-solid fa-check"></i></div>
            <h3 class="cp-title" id="caTitle">Pemberitahuan</h3>
            <p class="cp-desc" id="caDesc">Pesan</p>
            <button class="cp-btn cp-btn-primary" onclick="closeCustomAlert()" style="width: 100%;">Tutup</button>
        </div>
    </div>
    <div class="cp-overlay" id="customConfirm">
        <div class="cp-box">
            <div class="cp-icon warning"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 class="cp-title" id="ccTitle">Konfirmasi</h3>
            <p class="cp-desc" id="ccDesc">Apakah Anda yakin?</p>
            <div class="cp-btn-wrap">
                <button class="cp-btn cp-btn-cancel" onclick="closeCustomConfirm()">Batal</button>
                <button class="cp-btn cp-btn-danger" id="ccBtnYes">Ya, Eksekusi</button>
            </div>
        </div>
    </div>
    <div class="cp-overlay" id="customLoading">
        <div class="cp-box" style="padding: 40px 20px;">
            <div class="spinner-custom"></div>
            <h3 class="cp-title" id="clTitle" style="margin-bottom: 0;">Memproses...</h3>
        </div>
    </div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Kegiatan Sosial</h2>
        </div>

        <div class="content-area">
            <button id="btnTambahKegiatan" class="btn-tambah" style="display: none;" onclick="openModal()">
                <i class="fa-solid fa-camera"></i> Upload Dokumentasi Baru
            </button>

            <div class="glass-emerald summary-card">
                <div class="label">Total Dana Tersalurkan</div>
                <div class="amount" id="uiTotalDana">Rp 0</div>
                <div class="desc"><i class="fa-solid fa-hands-holding-child"></i> Terkumpul dari <span id="uiTotalKegiatan" style="margin: 0 4px;">0</span> Kegiatan</div>
            </div>

            <div class="section-title">Dokumentasi Penyaluran</div>
            
            <div id="listKegiatan">
                <div class="empty-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Memuat dokumentasi kegiatan...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modalKegiatan" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload Dokumentasi Baru</h3>
                <button type="button" onclick="closeModal()" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="formKegiatan" onsubmit="submitKegiatan(event)">
                <div class="form-group">
                    <label class="form-label">Nama / Judul Kegiatan</label>
                    <input type="text" id="kegJudul" class="form-input" placeholder="Contoh: Santunan Anak Yatim" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Lokasi Kegiatan</label>
                    <input type="text" id="kegLokasi" class="form-input" placeholder="Contoh: Panti Asuhan Cahaya" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Total Dana Disalurkan (Rp)</label>
                    <input type="number" id="kegNominal" class="form-input" placeholder="Contoh: 1500000" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Foto Dokumentasi Utama</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="kegFoto" class="file-upload-input" accept="image/*" required onchange="gantiTeksUpload(this)">
                        <div class="file-upload-btn" id="btnUploadText">
                            <i class="fa-solid fa-image"></i> Pilih Foto dari Galeri
                        </div>
                    </div>
                </div>
                <button type="submit" id="btnKirimKegiatan" class="btn-submit"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Kegiatan</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, onSnapshot, doc, getDoc, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        window.customAlert = function(title, desc, type = 'success') {
            const el = document.getElementById('customAlert'); document.getElementById('caTitle').innerText = title; document.getElementById('caDesc').innerText = desc;
            const iconEl = document.getElementById('caIcon');
            if(type === 'success') { iconEl.className = 'cp-icon success'; iconEl.innerHTML = '<i class="fa-solid fa-check"></i>'; }
            else if(type === 'error') { iconEl.className = 'cp-icon error'; iconEl.innerHTML = '<i class="fa-solid fa-xmark"></i>'; }
            else { iconEl.className = 'cp-icon warning'; iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; }
            el.classList.add('show');
        }
        window.closeCustomAlert = function() { document.getElementById('customAlert').classList.remove('show'); }
        window.customConfirm = function(title, desc, onYes) {
            const el = document.getElementById('customConfirm'); document.getElementById('ccTitle').innerText = title; document.getElementById('ccDesc').innerText = desc;
            document.getElementById('ccBtnYes').onclick = function() { closeCustomConfirm(); onYes(); }; el.classList.add('show');
        }
        window.closeCustomConfirm = function() { document.getElementById('customConfirm').classList.remove('show'); }
        window.showLoading = function(title = "Memproses...") { document.getElementById('clTitle').innerText = title; document.getElementById('customLoading').classList.add('show'); }
        window.hideLoading = function() { document.getElementById('customLoading').classList.remove('show'); }

        let userRole = "member";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists()) {
                    userRole = (docSnap.data().role || "member").toLowerCase();
                    if (userRole === "superadmin" || userRole === "admin") document.getElementById('btnTambahKegiatan').style.display = 'flex';
                    loadDataKegiatan(); 
                }
            } else { window.location.href = 'login.html'; }
        });

        window.openModal = function() { document.getElementById('modalKegiatan').classList.add('show'); }
        window.closeModal = function() { document.getElementById('modalKegiatan').classList.remove('show'); document.getElementById('formKegiatan').reset(); document.getElementById('btnUploadText').innerHTML = '<i class="fa-solid fa-image"></i> Pilih Foto dari Galeri';}
        
        window.gantiTeksUpload = function(input) {
            if (input.files && input.files[0]) {
                document.getElementById('btnUploadText').innerHTML = `<i class="fa-solid fa-check-circle" style="color:#34D399;"></i> Foto Siap Diupload`;
            }
        }

        const getBase64 = (file) => new Promise((res, rej) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => res(reader.result); reader.onerror = error => rej(error); });

        window.submitKegiatan = async function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('kegFoto').files[0];
            if(!fileInput) return customAlert("Foto Kosong", "Harap pilih foto dokumentasi.", "warning");
            
            // BOM WAKTU PROTEKSI BASE64 LIMIT 3MB AMAN
            if(fileInput.size > 3 * 1024 * 1024) return customAlert("Foto Terlalu Besar", "Ukuran foto maksimal 3MB biar HP anggota lain nggak ngelag saat buka menu ini.", "warning");
            
            showLoading("Mengupload Kegiatan...");
            try {
                let base64Image = await getBase64(fileInput);
                await addDoc(collection(db, "kegiatan_sosial"), { 
                    judul: document.getElementById('kegJudul').value, 
                    lokasi: document.getElementById('kegLokasi').value, 
                    nominal: Number(document.getElementById('kegNominal').value), 
                    bukti_image: base64Image, 
                    tanggal: serverTimestamp() 
                });
                hideLoading(); customAlert('Berhasil', 'Dokumentasi Kegiatan berhasil ditambahkan!', 'success'); 
                closeModal();
            } catch (error) { hideLoading(); customAlert('Gagal', 'Gagal mengupload kegiatan.', 'error'); } 
        }

        function loadDataKegiatan() {
            onSnapshot(query(collection(db, "kegiatan_sosial"), orderBy("tanggal", "desc")), (snapshot) => {
                const listContainer = document.getElementById('listKegiatan'); listContainer.innerHTML = ""; 
                let totalDanaKeluar = 0; let totalKegiatan = 0;

                if (snapshot.empty) {
                    listContainer.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open"></i><p>Belum ada dokumentasi kegiatan sosial.</p></div>';
                    document.getElementById('uiTotalDana').innerText = "Rp 0"; document.getElementById('uiTotalKegiatan').innerText = "0"; return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const id = docSnap.id;
                    totalDanaKeluar += Number(data.nominal); totalKegiatan++;

                    let tglText = "Baru saja"; if(data.tanggal) tglText = data.tanggal.toDate().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                    
                    const deleteBtnHtml = (userRole === "superadmin" || userRole === "admin") ? `<button class="btn-delete-kegiatan" onclick="hapusKegiatan('${id}')" title="Hapus Kegiatan"><i class="fa-solid fa-trash-can"></i></button>` : ``;
                    const imgUrl = data.bukti_image || 'https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=600&auto=format&fit=crop';

                    listContainer.innerHTML += `
                        <div class="glass-panel kegiatan-item">
                            ${deleteBtnHtml}
                            <div class="kegiatan-img" style="background-image: url('${imgUrl}');"><div class="img-overlay"></div><div class="kegiatan-date">${tglText}</div></div>
                            <div class="kegiatan-detail">
                                <h3>${data.judul}</h3>
                                <div class="kegiatan-meta"><i class="fa-solid fa-location-dot"></i> ${data.lokasi}</div>
                                <div class="kegiatan-funds">
                                    <div class="funds-label">Dana Disalurkan</div>
                                    <div class="funds-amount"><i class="fa-solid fa-arrow-right-from-bracket"></i> Rp ${Number(data.nominal).toLocaleString('id-ID')}</div>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('uiTotalDana').innerText = "Rp " + totalDanaKeluar.toLocaleString('id-ID');
                document.getElementById('uiTotalKegiatan').innerText = totalKegiatan;
            });
        }

        window.hapusKegiatan = async function(docId) { 
            customConfirm("Hapus Dokumentasi", "Yakin ingin menghapus dokumentasi kegiatan ini secara permanen?", async () => {
                showLoading("Menghapus Data...");
                try {
                    await deleteDoc(doc(db, "kegiatan_sosial", docId)); 
                    hideLoading(); customAlert("Terhapus", "Data berhasil dihapus.", "success");
                } catch(e) { hideLoading(); customAlert("Gagal", "Sistem error saat menghapus.", "error");}
            });
        }
    </script>
    <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err)); }); }</script>
</body>
</html>
