<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#064E3B">
    <title>Kegiatan Sosial - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-base: #F4F6F5; --text-dark: #111827; --text-gray: #4B5563; 
            --emerald-main: #059669; --emerald-dark: #064E3B; --emerald-card: linear-gradient(135deg, #065F46 0%, #022C22 100%);
            --gold-accent: #FBBF24; --color-out: #DC2626; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E2E8E4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-base); background-image: radial-gradient(circle at 50% 35%, rgba(5, 150, 105, 0.12) 0%, rgba(5, 150, 105, 0.03) 35%, var(--bg-base) 70%); position: relative; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; color: var(--text-dark); }
        @media (min-width: 600px) { .app-container { max-width: 480px; height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15); border: 8px solid #FFFFFF; margin: auto; } }

        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; background: #FFF; z-index: 10; border-bottom: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .btn-back { width: 42px; height: 42px; border-radius: 14px; background: #F5F5F7; color: var(--text-dark); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,0,0,0.05); }
        .btn-back:active { transform: scale(0.85); background: var(--emerald-main); color: #FFF; }
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }

        .content-area { flex-grow: 1; overflow-y: auto; padding: 25px 24px 110px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        /* SUMMARY CARD PREMIUM */
        .summary-card { background: var(--emerald-card); border-radius: 24px; padding: 25px 20px; margin-bottom: 25px; text-align: center; box-shadow: 0 20px 40px rgba(5, 150, 105, 0.25); position: relative; overflow: hidden;}
        .summary-card::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(to bottom right, rgba(255,255,255,0.15) 0%, transparent 40%, transparent 100%); transform: rotate(30deg); pointer-events: none; }
        .summary-card .label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; position: relative; z-index: 2;}
        .summary-card .amount { font-size: 28px; font-weight: 900; color: #FFF; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; z-index: 2;}
        .summary-card .desc { font-size: 12px; font-weight: 700; color: var(--gold-accent); position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 5px;}

        .section-title { font-size: 15px; font-weight: 900; margin: 0 0 15px; color: var(--text-dark); text-transform: uppercase; letter-spacing: 1px;}
        
        .btn-tambah { width: 100%; padding: 18px; border-radius: 18px; font-size: 14px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-tambah:active { transform: scale(0.96); }
        .btn-tambah i { color: var(--gold-accent); }

        /* KARTU KEGIATAN HIGH CONTRAST */
        .kegiatan-item { border-radius: 24px; overflow: hidden; margin-bottom: 20px; background: #FFF; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 25px rgba(0,0,0,0.04); position: relative; transition: 0.2s;}
        .kegiatan-item:active { transform: scale(0.98); }
        
        .kegiatan-img { width: 100%; height: 220px; background-color: #E5E5E5; background-size: cover; background-position: center; position: relative; }
        .img-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .kegiatan-date { position: absolute; top: 15px; right: 15px; padding: 6px 12px; border-radius: 10px; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); color: var(--text-dark); font-size: 11px; font-weight: 800; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .btn-delete-kegiatan { position: absolute; top: 15px; left: 15px; width: 35px; height: 35px; border-radius: 12px; background: rgba(220,38,38,0.9); color: #FFF; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s;}
        .btn-delete-kegiatan:active { transform: scale(0.85); background: var(--color-out); }

        .kegiatan-detail { padding: 20px 20px; }
        .kegiatan-detail h3 { font-size: 16px; font-weight: 900; color: var(--text-dark); margin-bottom: 8px; line-height: 1.3; }
        .kegiatan-meta { font-size: 12px; color: var(--text-gray); font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 18px; }
        .kegiatan-meta i { color: var(--emerald-main); font-size: 14px; }

        .kegiatan-funds { display: flex; justify-content: space-between; align-items: center; background: #F9F9F9; padding: 15px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.04); }
        .funds-label { font-size: 11px; font-weight: 800; color: var(--text-gray); text-transform: uppercase; }
        .funds-amount { font-size: 16px; font-weight: 900; color: var(--color-out); letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px;}

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-gray); border-radius: 24px; border: 2px dashed rgba(0,0,0,0.1);}
        .empty-state i { font-size: 35px; margin-bottom: 10px; opacity: 0.5; }
        .empty-state p { font-size: 13px; font-weight: 700; }

        /* MODAL UPLOAD BOUNCY */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: flex-end; z-index: 100; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: #FFF; border-radius: 32px 32px 0 0; padding: 30px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); overflow-y: auto; max-height: 85vh; box-shadow: 0 -10px 40px rgba(0,0,0,0.15);}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 900; color: var(--text-dark); }
        .btn-close-modal { width: 32px; height: 32px; border-radius: 50%; border: none; background: #F5F5F7; display: flex; justify-content: center; align-items: center; font-size: 14px; cursor: pointer; color: var(--text-dark); transition: 0.2s;}
        .btn-close-modal:active { transform: scale(0.9); }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--text-gray); }
        .form-input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.06); font-size: 14px; font-weight: 700; outline: none; background: #F9F9F9; color: var(--text-dark); transition: 0.2s;}
        .form-input:focus { border-color: var(--emerald-main); background: #FFF; }
        
        .file-upload-wrapper { position: relative; width: 100%; margin-bottom: 5px; }
        .file-upload-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; z-index: 2; cursor: pointer;}
        .file-upload-btn { width: 100%; padding: 16px; border-radius: 14px; background: #F9F9F9; border: 2px dashed var(--emerald-main); font-size: 13px; font-weight: 800; display: flex; justify-content: center; align-items: center; gap: 8px; color: var(--text-dark); transition: 0.2s;}
        .btn-submit { width: 100%; padding: 18px; border-radius: 16px; font-size: 14px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.15); transition: 0.2s;}
        .btn-submit:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Kegiatan Sosial</h2>
        </div>

        <div class="content-area">
            <button id="btnTambahKegiatan" class="btn-tambah" style="display: none;" onclick="openModal()">
                <i class="fa-solid fa-camera"></i> Upload Dokumentasi Baru
            </button>

            <div class="summary-card">
                <div class="label">Total Dana Tersalurkan</div>
                <div class="amount" id="uiTotalDana">Rp 0</div>
                <div class="desc"><i class="fa-solid fa-hands-holding-child"></i> Terkumpul dari <span id="uiTotalKegiatan" style="margin: 0 4px;">0</span> Kegiatan</div>
            </div>

            <div class="section-title">Dokumentasi Penyaluran</div>
            
            <div id="listKegiatan">
                <div class="empty-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Memuat dokumentasi kegiatan...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modalKegiatan" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload Dokumentasi Baru</h3>
                <button type="button" onclick="closeModal()" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="formKegiatan" onsubmit="submitKegiatan(event)">
                <div class="form-group">
                    <label class="form-label">Nama / Judul Kegiatan</label>
                    <input type="text" id="kegJudul" class="form-input" placeholder="Contoh: Santunan Anak Yatim" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Lokasi Kegiatan</label>
                    <input type="text" id="kegLokasi" class="form-input" placeholder="Contoh: Panti Asuhan Cahaya" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Total Dana Disalurkan (Rp)</label>
                    <input type="number" id="kegNominal" class="form-input" placeholder="Contoh: 1500000" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Foto Dokumentasi Utama</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="kegFoto" class="file-upload-input" accept="image/*" required onchange="gantiTeksUpload(this)">
                        <div class="file-upload-btn" id="btnUploadText">
                            <i class="fa-solid fa-image"></i> Pilih Foto dari Galeri
                        </div>
                    </div>
                </div>
                <button type="submit" id="btnKirimKegiatan" class="btn-submit"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Kegiatan</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, onSnapshot, doc, getDoc, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let userRole = "member";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists()) {
                    userRole = (docSnap.data().role || "member").toLowerCase();
                    if (userRole === "superadmin" || userRole === "admin") document.getElementById('btnTambahKegiatan').style.display = 'flex';
                    loadDataKegiatan(); 
                }
            } else { window.location.href = 'login.html'; }
        });

        window.openModal = function() { document.getElementById('modalKegiatan').classList.add('show'); }
        window.closeModal = function() { document.getElementById('modalKegiatan').classList.remove('show'); document.getElementById('formKegiatan').reset(); document.getElementById('btnUploadText').innerHTML = '<i class="fa-solid fa-image"></i> Pilih Foto dari Galeri';}
        
        window.gantiTeksUpload = function(input) {
            if (input.files && input.files[0]) {
                document.getElementById('btnUploadText').innerHTML = `<i class="fa-solid fa-check-circle" style="color:var(--emerald-main);"></i> Foto Siap Diupload`;
            }
        }

        const getBase64 = (file) => new Promise((res, rej) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => res(reader.result); reader.onerror = error => rej(error); });

        window.submitKegiatan = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnKirimKegiatan'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengupload...'; btn.disabled = true;
            try {
                let base64Image = await getBase64(document.getElementById('kegFoto').files[0]);
                await addDoc(collection(db, "kegiatan_sosial"), { judul: document.getElementById('kegJudul').value, lokasi: document.getElementById('kegLokasi').value, nominal: Number(document.getElementById('kegNominal').value), bukti_image: base64Image, tanggal: serverTimestamp() });
                alert('Dokumentasi Kegiatan berhasil ditambahkan!'); closeModal();
            } catch (error) { alert('Gagal mengupload kegiatan.'); } finally { btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Upload Kegiatan'; btn.disabled = false; }
        }

        function loadDataKegiatan() {
            onSnapshot(query(collection(db, "kegiatan_sosial"), orderBy("tanggal", "desc")), (snapshot) => {
                const listContainer = document.getElementById('listKegiatan'); listContainer.innerHTML = ""; 
                let totalDanaKeluar = 0; let totalKegiatan = 0;

                if (snapshot.empty) {
                    listContainer.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open"></i><p>Belum ada dokumentasi kegiatan sosial.</p></div>';
                    document.getElementById('uiTotalDana').innerText = "Rp 0"; document.getElementById('uiTotalKegiatan').innerText = "0"; return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const id = docSnap.id;
                    totalDanaKeluar += Number(data.nominal); totalKegiatan++;

                    let tglText = "Baru saja"; if(data.tanggal) tglText = data.tanggal.toDate().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                    
                    const deleteBtnHtml = (userRole === "superadmin" || userRole === "admin") ? `<button class="btn-delete-kegiatan" onclick="hapusKegiatan('${id}')" title="Hapus Kegiatan"><i class="fa-solid fa-trash-can"></i></button>` : ``;
                    const imgUrl = data.bukti_image || 'https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=600&auto=format&fit=crop';

                    listContainer.innerHTML += `
                        <div class="kegiatan-item">
                            ${deleteBtnHtml}
                            <div class="kegiatan-img" style="background-image: url('${imgUrl}');"><div class="img-overlay"></div><div class="kegiatan-date">${tglText}</div></div>
                            <div class="kegiatan-detail">
                                <h3>${data.judul}</h3>
                                <div class="kegiatan-meta"><i class="fa-solid fa-location-dot"></i> ${data.lokasi}</div>
                                <div class="kegiatan-funds">
                                    <div class="funds-label">Dana Disalurkan</div>
                                    <div class="funds-amount"><i class="fa-solid fa-arrow-right-from-bracket"></i> Rp ${Number(data.nominal).toLocaleString('id-ID')}</div>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('uiTotalDana').innerText = "Rp " + totalDanaKeluar.toLocaleString('id-ID');
                document.getElementById('uiTotalKegiatan').innerText = totalKegiatan;
            });
        }

        window.hapusKegiatan = async function(docId) { if(confirm("Yakin ingin menghapus dokumentasi kegiatan ini?")) { await deleteDoc(doc(db, "kegiatan_sosial", docId)); } }
    </script>
</body>
</html>
