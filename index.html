<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#EAF4F1" id="metaThemeColor">
    <meta name="description" content="Kotak Gotong Royong - Ojol Anak Babah Alun">
    <title>Dashboard - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        const savedTheme = localStorage.getItem('kgr_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (!sessionStorage.getItem('kgr_app_started')) {
            sessionStorage.setItem('kgr_app_started', 'true');
            const lastPage = localStorage.getItem('kgr_last_page');
            if (lastPage && lastPage !== 'index.html' && lastPage !== '/' && !window.location.href.includes(lastPage)) {
                window.location.href = lastPage;
            }
        } else { document.documentElement.classList.add('skip-splash'); }
        localStorage.setItem('kgr_last_page', 'index.html');
    </script>

    <style>
        :root {
            --bg-body: #EAF4F1; --text-main: #0F172A; --text-muted: #64748B;
            --card-bg: #FFFFFF; --card-border: rgba(0,0,0,0.05); 
            --emerald-main: #0E9B6E; --gold-accent: #F59E0B; --danger-red: #EF4444;
            --input-bg: #F8FAFC; --modal-bg: #FFFFFF;
        }
        [data-theme="dark"] {
            --bg-body: #0F172A; --text-main: #F8FAFC; --text-muted: #94A3B8;
            --card-bg: #1E293B; --card-border: #334155; 
            --emerald-main: #10B981; --gold-accent: #FBBF24; 
            --input-bg: #020617; --modal-bg: #1E293B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); width: 100%; min-height: 100vh; margin: 0; overflow-x: hidden; display: flex; justify-content: center; align-items: flex-start; transition: 0.3s; }

        html.skip-splash #splashScreen { display: none !important; }
        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-body); z-index: 9999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.6s ease; }
        #splashScreen.hide { opacity: 0; visibility: hidden; }
        .splash-logo { width: 150px; animation: pulseGlow 1.5s infinite alternate ease-in-out; }
        .splash-text { margin-top: 25px; font-size: 13px; font-weight: 800; color: var(--emerald-main); letter-spacing: 1.5px; text-transform: uppercase; text-align: center; line-height: 1.6; min-height: 45px; }
        .splash-text::after { content: '|'; animation: blinkCursor 0.7s infinite; color: var(--text-main);}
        @keyframes pulseGlow { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }
        @keyframes blinkCursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .app-container { width: 100%; max-width: 480px; margin: 0 auto; height: 100dvh; position: relative; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; scrollbar-width: none; }
        .app-container::-webkit-scrollbar { display: none; }

        .header-cover { 
            width: 100%; height: 250px; min-height: 250px; flex-shrink: 0; 
            background-image: url('bg-header.jpg'); background-size: cover; background-position: top center; 
            background-color: #0F172A; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: flex-end; 
            align-items: center; padding-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .header-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; z-index: 1; }
        
        /* LOGO DITURUNIN & DIATUR UKURANNYA */
        .header-logo {
            width: 240px; 
            max-width: 80%;
            position: relative;
            margin-top: 60px; /* TURUNIN LAGI BIAR GAK NUTUP MUKA */
            z-index: 2;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        /* PROFIL DITURUNIN */
        .profile-container { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            padding: 0 24px; margin-top: -20px; /* DITURUNIN DARI -40 KE -20 */
            position: relative; z-index: 10; 
        }
        
        .profile-pic { 
            width: 85px; height: 85px; border-radius: 50%; 
            border: 4px solid var(--bg-body); background-color: var(--card-bg);
            background-size: cover; background-position: center; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 32px; font-weight: 900; color: var(--emerald-main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-shrink: 0; 
        }

        .profile-details { flex-grow: 1; margin-left: 15px; margin-top: 45px; }
        .profile-details h2 { font-size: 22px; font-weight: 900; color: var(--text-main); margin-bottom: 2px; letter-spacing: -0.5px;}
        .profile-details p { font-size: 11px; font-weight: 800; color: var(--emerald-main); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px;}

        .header-icons { display: flex; gap: 10px; margin-top: 45px; }
        .btn-settings { width: 40px; height: 40px; border-radius: 50%; background: var(--card-bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; border: 2px solid var(--card-border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; }
        .btn-settings:active { transform: scale(0.9); }

        .content-area { padding: 20px 24px 150px; z-index: 5; position: relative; flex-grow: 1; }
        
        .premium-card { background: var(--emerald-main); padding: 25px; margin-bottom: 25px; border-radius: 24px; color: #FFF; box-shadow: 0 10px 20px rgba(14, 155, 110, 0.25); position: relative; overflow: hidden;}
        .card-label { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .card-balance { font-size: 34px; font-weight: 900; color: #FFFFFF; letter-spacing: -1px; margin-bottom: 25px; }
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .card-bottom-label { font-size: 11px; color: rgba(255,255,255,0.9); font-weight: 800; margin-bottom: 4px; }
        .card-bottom-val { font-size: 16px; font-weight: 900; color: var(--gold-accent); }

        .section-title { font-size: 16px; font-weight: 900; margin: 10px 0 15px; color: var(--text-main); display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;}
        .pengurus-panel { border: none; padding: 0; background: transparent; margin-bottom: 25px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .menu-item { padding: 18px 5px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
        .menu-item:active { transform: scale(0.95); }
        .menu-icon { width: 50px; height: 50px; border-radius: 16px; background: var(--bg-body); color: var(--emerald-main); display: flex; justify-content: center; align-items: center; font-size: 22px; border: 1px solid var(--card-border);}
        .menu-item span { font-size: 11px; font-weight: 800; color: var(--text-main); text-align: center; line-height: 1.3; }

        .bottom-nav-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--card-bg); border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 50; border: 1px solid var(--card-border);}
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); opacity: 0.8; cursor: pointer; transition: 0.3s; width: 60px; }
        .nav-item i { font-size: 20px; transition: 0.2s; } 
        .nav-item span { font-size: 10px; font-weight: 800; } 
        .nav-item.active { color: var(--emerald-main); opacity: 1; }
        
        .center-btn { position: relative; top: -25px; flex-shrink: 0;}
        .center-fab { width: 65px; height: 65px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2px; color: #FFFFFF; font-size: 22px; background: linear-gradient(135deg, #10B981, #059669); border: 5px solid var(--bg-body); box-shadow: 0 10px 20px rgba(5, 150, 105, 0.3); transition: 0.2s; cursor: pointer; }
        .center-fab:active { transform: scale(0.9); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: 999999; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: var(--modal-bg); border-top: 1px solid var(--card-border); border-radius: 32px 32px 0 0; padding: 30px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.3); color: var(--text-main); max-height: 85vh; overflow-y: auto;}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-close-modal { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--card-border); background: var(--input-bg); display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; color: var(--text-main); transition: 0.2s;}

        /* POPUP ALERT */
        .cp-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 999999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; padding: 20px; }
        .cp-overlay.show { opacity: 1; visibility: visible; }
        .cp-box { background: var(--modal-bg); border: 1px solid var(--card-border); border-radius: 28px; width: 100%; max-width: 320px; text-align: center; padding: 30px 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .cp-overlay.show .cp-box { transform: scale(1); }
        .cp-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 0 auto 15px; }
        .cp-icon.success { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); }
        .cp-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
        .cp-desc { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }
        .cp-btn-primary { background: var(--emerald-main); color: #FFF; width: 100%; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; border: none; cursor: pointer;}
        .spinner-custom { border: 4px solid var(--card-border); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--emerald-main); animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splashScreen">
        <img src="logo1.png" class="splash-logo" alt="Logo KGR">
        <div class="splash-text" id="typewriterText"></div>
    </div>

    <script>
        if (!document.documentElement.classList.contains('skip-splash')) { 
            const textToType = "MENCARI BERKAH\nLEWAT SEDEKAH"; 
            const twElement = document.getElementById('typewriterText'); 
            let twIndex = 0;
            function typeWriter() { 
                if (twIndex < textToType.length) { 
                    if(textToType.charAt(twIndex) === '\n') { twElement.innerHTML += '<br>'; } else { twElement.innerHTML += textToType.charAt(twIndex); } 
                    twIndex++; setTimeout(typeWriter, 60); 
                } 
            } 
            setTimeout(typeWriter, 400);
        }
    </script>

    <div class="cp-overlay" id="customAlert"><div class="cp-box"><div class="cp-icon success" id="caIcon"><i class="fa-solid fa-check"></i></div><h3 class="cp-title" id="caTitle">Pemberitahuan</h3><p class="cp-desc" id="caDesc">Pesan di sini.</p><button class="cp-btn-primary" onclick="closeCustomAlert()">Tutup</button></div></div>
    <div class="cp-overlay" id="customLoading"><div class="cp-box" style="padding: 40px 20px;"><div class="spinner-custom"></div><h3 class="cp-title" id="clTitle" style="margin-bottom: 0;">Memproses...</h3></div></div>

    <main class="app-container">
        <div class="header-cover">
            <div class="header-overlay"></div> 
            <img src="logo.png" class="header-logo" alt="Logo KGR">
        </div>

        <div class="profile-container">
            <div class="profile-pic" id="uiProfilePic"></div>
            <div class="profile-details">
                <h2 id="uiUserName">Memuat...</h2>
                <p id="uiRoleText"><i class="fa-solid fa-spinner fa-spin"></i> Mengecek Data</p>
            </div>
            <div class="header-icons">
                <div class="btn-settings" onclick="toggleTheme()" title="Ganti Tema"><i id="themeIcon" class="fa-solid fa-moon"></i></div>
                <div class="btn-settings" onclick="window.location.href='profil.html'"><i class="fa-solid fa-gear"></i></div>
            </div>
        </div>

        <script>
            if(localStorage.getItem('kgr_nama')) document.getElementById('uiUserName').innerText = localStorage.getItem('kgr_nama');
            if(localStorage.getItem('kgr_badge')) document.getElementById('uiRoleText').innerHTML = localStorage.getItem('kgr_badge');
            if(localStorage.getItem('kgr_badge_color')) document.getElementById('uiRoleText').style.color = localStorage.getItem('kgr_badge_color');
            if(localStorage.getItem('kgr_pic')) {
                const pic = localStorage.getItem('kgr_pic'); const el = document.getElementById('uiProfilePic');
                if(pic.length > 5) { el.style.backgroundImage = `url('${pic}')`; el.innerText = ""; } else { el.style.backgroundImage = "none"; el.innerText = pic; }
            }
        </script>

        <div class="content-area">
            <div class="premium-card">
                <div class="card-label"><span>Total Kas (Keseluruhan)</span><i class="fa-brands fa-nfc-symbol" style="font-size: 20px;"></i></div>
                <div class="card-balance" id="uiTotalAll">Rp 0</div>
                <div class="card-bottom">
                    <div>
                        <div class="card-bottom-label">Saldo Kas Bulan Ini</div>
                        <div class="card-bottom-val" id="uiTotalMonth">Rp 0</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="card-bottom-label">Total Anggota</div>
                        <div class="card-bottom-val" style="color: #FFF;"><span id="uiTotalMembers">0</span> <i class="fa-solid fa-users" style="font-size: 14px; opacity:0.8;"></i></div>
                    </div>
                </div>
            </div>

            <div id="panelPengurus" style="display: none;">
                <div class="section-title">Panel Pengurus</div>
                <div class="pengurus-panel">
                    <div class="menu-grid" id="gridPengurus">
                        <div class="solid-panel menu-item" id="menuSuperadmin" style="display: none;" onclick="window.location.href='superadmin.html'">
                            <div class="menu-icon"><i class="fa-solid fa-crown"></i></div><span>Pusat<br>Kendali</span>
                        </div>
                    </div>
                </div>
            </div>

            <h3 class="section-title">Menu Anggota</h3>
            <div class="menu-grid">
                <div class="solid-panel menu-item menu-absen" id="menuAbsensi" style="display: none;" onclick="window.location.href='absen.html'">
                    <div class="menu-icon"><i class="fa-solid fa-satellite-dish"></i></div><span>Absensi<br>Acara</span>
                </div>
                <div class="solid-panel menu-item" onclick="window.location.href='anggota.html'">
                    <div class="menu-icon"><i class="fa-solid fa-users"></i></div><span>Data<br>Anggota</span>
                </div>
                <div class="solid-panel menu-item" onclick="window.location.href='laporan.html'">
                    <div class="menu-icon"><i class="fa-solid fa-file-invoice-dollar"></i></div><span>Laporan<br>Kas</span>
                </div>
            </div>
        </div>
    </main>

    <div class="bottom-nav-container">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Beranda</span></div>
        <div class="nav-item center-btn" onclick="window.location.href='sedekah.html'">
            <div class="center-fab"><i class="fa-solid fa-qrcode"></i><span>Sedekah</span></div>
        </div>
        <div class="nav-item" onclick="window.location.href='laporan.html'"><i class="fa-solid fa-chart-pie"></i><span>Laporan</span></div>
    </div>
</body>
</html>
