<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F6F5">
    <title>Pusat Kendali - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --emerald-main: #059669; --emerald-dark: #064E3B; 
            --gold-accent: #F59E0B; --danger-red: #EF4444; --warning-yellow: #F59E0B;
            --text-dark: #0F172A; --text-gray: #64748B; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #E2E8E4; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; color: var(--text-dark); margin: 0;}

        /* NEON ORBS TERANG */
        .orb { position: absolute; border-radius: 50%; filter: blur(70px); z-index: 0; animation: float 10s infinite alternate ease-in-out;}
        .orb-1 { top: 10%; right: -10%; width: 250px; height: 250px; background: rgba(5, 150, 105, 0.2); }
        .orb-2 { bottom: 10%; left: -10%; width: 300px; height: 300px; background: rgba(5, 150, 105, 0.15); animation-delay: -5s;}
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

        .app-container { width: 100%; max-width: 480px; background: transparent; display: flex; flex-direction: column; height: 100dvh; position: relative; z-index: 10; overflow-x: hidden; overflow-y: hidden; }
        @media (min-width: 600px) { .app-container { height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.15); border: 8px solid #FFFFFF; margin: auto; background: rgba(244, 246, 245, 0.85); backdrop-filter: blur(20px);} }

        /* GLASSMORPHISM */
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px) saturate(150%); -webkit-backdrop-filter: blur(25px) saturate(150%); border: 1px solid #FFF; box-shadow: 0 15px 35px rgba(5, 150, 105, 0.05), inset 0 0 20px rgba(255, 255, 255, 0.6); border-radius: 24px; color: var(--text-dark);}

        .exec-header { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(20px); padding: 40px 24px 10px; color: var(--text-dark); position: relative; z-index: 10; border-bottom: 1px solid #FFF; }
        .header-top { display: flex; align-items: center; gap: 15px; margin-bottom: 20px;}
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: #FFF; display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--text-dark); transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.05);}
        .btn-back:active { transform: scale(0.9); background: var(--emerald-main); color: #FFF; }
        .header-top h1 { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase;}
        
        .nav-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;}
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex-shrink: 0; padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; background: #FFF; color: var(--text-gray); cursor: pointer; border: 1px solid rgba(0,0,0,0.05); transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px;}
        .tab-btn.active { background: var(--emerald-main); color: #FFF; border-color: var(--emerald-main); box-shadow: 0 5px 15px rgba(5,150,105,0.3);}

        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 20px 100px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hrd-filters { display: flex; gap: 8px; margin-bottom: 20px; padding: 6px;}
        .hrd-pill { flex: 1; padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; color: var(--text-gray); border: none; background: transparent;}
        .hrd-pill.active { background: var(--emerald-main); color: #FFF; box-shadow: 0 4px 10px rgba(5,150,105,0.3);}
        .badge-count { background: var(--danger-red); color: #FFF; padding: 2px 6px; border-radius: 6px; font-size: 9px; margin-left: 5px; vertical-align: middle;}

        .data-card { padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;}
        .data-card:active { transform: scale(0.98); background: rgba(255,255,255,0.9); }
        .dc-info h4 { font-size: 14px; font-weight: 900; color: var(--text-dark); margin-bottom: 4px; text-transform: uppercase;}
        .dc-info p { font-size: 11px; font-weight: 600; color: var(--text-gray); display: flex; align-items: center; gap: 5px; margin-bottom: 6px;}
        .status-tag { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase;}
        .st-pending { background: rgba(245, 158, 11, 0.15); color: var(--gold-accent); }
        .st-active { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); }
        .st-banned { background: rgba(239, 68, 68, 0.15); color: var(--danger-red); }
        
        .btn-edit-round { width: 40px; height: 40px; border-radius: 50%; background: #FFF; color: var(--emerald-main); border: 1px solid rgba(0,0,0,0.05); font-size: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
        .btn-edit-round:active { transform: scale(0.9); background: var(--emerald-main); color: #FFF;}

        .form-section { padding: 25px 20px; margin-bottom: 20px; }
        .section-title { font-size: 14px; font-weight: 900; color: var(--text-dark); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .section-title i { color: var(--emerald-main); font-size: 18px;}
        
        .form-group { margin-bottom: 16px; text-align: left;}
        .form-label { display: block; font-size: 11px; font-weight: 800; color: var(--text-gray); margin-bottom: 6px; text-transform: uppercase;}
        .form-input, .form-select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.06); font-size: 13px; font-weight: 700; color: var(--text-dark); outline: none; background: #F8FAFC; transition: 0.2s;}
        .form-input:focus, .form-select:focus { border-color: var(--emerald-main); background: #FFF; box-shadow: 0 5px 15px rgba(5,150,105,0.1);}
        
        .btn-primary { width: 100%; padding: 16px; border-radius: 14px; font-size: 13px; font-weight: 900; background: var(--emerald-main); color: #FFF; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(5,150,105,0.3); display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-primary:active { transform: scale(0.96); }

        /* MODAL KACA TERANG */
        .modal-overlay, .cp-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .modal-overlay { align-items: flex-end; padding: 0; }
        .cp-overlay { padding: 20px; }
        .modal-overlay.show, .cp-overlay.show { opacity: 1; visibility: visible; }
        
        .modal-content { background: rgba(255, 255, 255, 0.95); border: 1px solid #FFF; border-radius: 32px 32px 0 0; padding: 30px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.2); color: var(--text-dark); max-height: 85vh; overflow-y: auto;}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h3 { font-size: 18px; font-weight: 900; }
        .btn-close-modal { width: 34px; height: 34px; border-radius: 50%; border: none; background: #F1F5F9; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; color: var(--text-dark); transition: 0.2s;}
        .btn-close-modal:active { transform: scale(0.9); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-gray); border: 2px dashed rgba(0,0,0,0.1); border-radius: 20px; }
        .empty-state i { font-size: 35px; margin-bottom: 10px; opacity: 0.4; }
        .empty-state p { font-size: 13px; font-weight: 700; }

        /* CUSTOM POPUP TERANG GLOWING */
        .cp-box { background: rgba(255, 255, 255, 0.95); border: 1px solid #FFF; border-radius: 30px; width: 100%; max-width: 320px; text-align: center; padding: 30px 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 25px 50px rgba(0,0,0,0.2); color: var(--text-dark); }
        .cp-overlay.show .cp-box { transform: scale(1); }
        .cp-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 0 auto 15px; }
        .cp-icon.success { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); }
        .cp-icon.error { background: rgba(239, 68, 68, 0.15); color: var(--danger-red); }
        .cp-icon.warning { background: rgba(245, 158, 11, 0.15); color: var(--gold-accent); }
        .cp-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
        .cp-desc { font-size: 12px; font-weight: 600; color: var(--text-gray); margin-bottom: 25px; line-height: 1.5; }
        .cp-btn-wrap { display: flex; gap: 10px; }
        .cp-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .cp-btn:active { transform: scale(0.95); }
        .cp-btn-primary { background: var(--emerald-main); color: #FFF; width: 100%; box-shadow: 0 8px 20px rgba(5,150,105,0.3);}
        .cp-btn-cancel { background: #F1F5F9; color: var(--text-dark); border: 1px solid rgba(0,0,0,0.05);}
        .cp-btn-danger { background: var(--danger-red); color: #FFF; box-shadow: 0 8px 20px rgba(239,68,68,0.3);}
        
        .spinner-custom { border: 4px solid rgba(5,150,105,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--emerald-main); animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    
    <div class="cp-overlay" id="customAlert">
        <div class="cp-box">
            <div class="cp-icon success" id="caIcon"><i class="fa-solid fa-check"></i></div>
            <h3 class="cp-title" id="caTitle">Pemberitahuan</h3>
            <p class="cp-desc" id="caDesc">Pesan</p>
            <button class="cp-btn cp-btn-primary" onclick="closeCustomAlert()">Mengerti</button>
        </div>
    </div>
    <div class="cp-overlay" id="customConfirm">
        <div class="cp-box">
            <div class="cp-icon warning"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 class="cp-title" id="ccTitle">Konfirmasi</h3>
            <p class="cp-desc" id="ccDesc">Apakah Anda yakin?</p>
            <div class="cp-btn-wrap">
                <button class="cp-btn cp-btn-cancel" onclick="closeCustomConfirm()">Batal</button>
                <button class="cp-btn cp-btn-danger" id="ccBtnYes">Ya, Eksekusi</button>
            </div>
        </div>
    </div>
    <div class="cp-overlay" id="customLoading">
        <div class="cp-box" style="padding: 40px 20px;">
            <div class="spinner-custom"></div>
            <h3 class="cp-title" id="clTitle" style="margin-bottom: 0;">Memproses...</h3>
        </div>
    </div>

    <div class="cp-overlay" id="modalImage" onclick="closeImageView()">
        <div class="cp-box" style="padding: 10px; background: transparent; border:none; box-shadow: none; max-width: 450px;" onclick="event.stopPropagation()">
            <img id="imgViewerSrc" src="" style="width: 100%; border-radius: 24px; border: 4px solid rgba(255,255,255,0.6); max-height: 70vh; object-fit: contain;">
            <button class="btn-close-modal" style="margin: 15px auto 0;" onclick="closeImageView()"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="app-container">
        <div class="exec-header">
            <div class="header-top">
                <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
                <h1>Panel Pengurus</h1>
            </div>
            
            <div class="nav-tabs" id="mainTabs">
                <button class="tab-btn active" onclick="switchNavTab('viewAnggota', this)"><i class="fa-solid fa-users"></i> Anggota</button>
                <button class="tab-btn" onclick="switchNavTab('viewKas', this)"><i class="fa-solid fa-vault"></i> Kas</button>
                <button class="tab-btn superadmin-only" style="display:none;" onclick="switchNavTab('viewRadar', this)"><i class="fa-solid fa-satellite-dish"></i> Radar</button>
                <button class="tab-btn superadmin-only" style="display:none;" onclick="switchNavTab('viewSistem', this)"><i class="fa-solid fa-gear"></i> Sistem</button>
            </div>
        </div>

        <div class="content-area">
            
            <!-- TAB 1: KELOLA ANGGOTA & HRD -->
            <div id="viewAnggota" class="view-section active">
                <div class="glass-panel hrd-filters">
                    <button class="hrd-pill active" onclick="filterHrd('Semua', this)">Semua Aktif</button>
                    <button class="hrd-pill" onclick="filterHrd('Pending', this)">Menunggu Aktivasi <span class="badge-count" id="badgePendingCount">0</span></button>
                </div>
                <div class="form-group">
                    <input type="text" id="searchUser" class="form-input" placeholder="🔍 Cari nama atau NIK member..." onkeyup="searchMember()" style="padding: 12px 16px; border-radius: 12px; background: #FFF;">
                </div>
                <div id="listAnggotaContainer"></div>
            </div>

            <!-- TAB 2: VERIFIKASI KAS -->
            <div id="viewKas" class="view-section">
                <div class="section-title"><i class="fa-solid fa-file-invoice-dollar"></i> Antrean Verifikasi Kas</div>
                <div id="listKasContainer"></div>
            </div>

            <!-- TAB 3: RADAR ACARA -->
            <div id="viewRadar" class="view-section superadmin-only" style="display:none;">
                <div class="glass-panel form-section">
                    <div class="section-title"><i class="fa-solid fa-satellite-dish"></i> Kontrol Acara KGR</div>
                    <form id="formEvent" onsubmit="saveEventConfig(event)">
                        <div class="form-group">
                            <label class="form-label">Nama / Tema Acara</label>
                            <input type="text" id="evName" class="form-input" required>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <div class="form-group" style="flex: 1;">
                                <label class="form-label">Latitude (GPS)</label>
                                <input type="text" id="evLat" class="form-input" required>
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label class="form-label">Longitude (GPS)</label>
                                <input type="text" id="evLng" class="form-input" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Radius Toleransi (Meter)</label>
                            <input type="number" id="evRadius" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status Saklar Radar</label>
                            <select id="evActive" class="form-select">
                                <option value="true">🟢 HIDUP (Menerima Absen)</option>
                                <option value="false">🔴 MATI (Absen Ditutup)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i> Simpan Konfigurasi</button>
                    </form>
                </div>

                <div class="glass-panel form-section">
                    <div class="section-title"><i class="fa-solid fa-file-excel"></i> Rekap Absensi Terakhir</div>
                    <button class="btn-primary" style="background: var(--emerald-light);" onclick="downloadAbsen()"><i class="fa-solid fa-download"></i> Download Excel (.csv)</button>
                </div>
            </div>

            <!-- TAB 4: KONFIGURASI SISTEM -->
            <div id="viewSistem" class="view-section superadmin-only" style="display:none;">
                <div class="glass-panel form-section">
                    <div class="section-title"><i class="fa-solid fa-server"></i> Parameter Otomasi Kas</div>
                    <form id="formSystem" onsubmit="saveAppConfig(event)">
                        <div class="form-group">
                            <label class="form-label">Limit Maksimal Sedekah (Bulan)</label>
                            <input type="number" id="sysLimit" class="form-input" placeholder="Cth: 10000" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Syarat Sedekah Muncul Barcode (Rp)</label>
                            <input type="number" id="sysSyarat" class="form-input" placeholder="Cth: 50000 (Akumulasi All-time)" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">URL Gambar QRIS (Format .jpg/.png/.svg)</label>
                            <input type="url" id="sysQris" class="form-input" required>
                        </div>
                        <button type="submit" class="btn-primary"><i class="fa-solid fa-gears"></i> Update Sistem</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL EDIT MEMBER -->
    <div id="modalEditMember" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Moderasi Anggota</h3>
                <button type="button" onclick="document.getElementById('modalEditMember').classList.remove('show')" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="formEditUser" onsubmit="saveEditUser(event)">
                <input type="hidden" id="editEmail">
                <div class="form-group">
                    <label class="form-label">Nama Sesuai KTP</label>
                    <input type="text" id="editName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">NIK (Rahasia & Terdekripsi)</label>
                    <input type="text" id="editNik" class="form-input" style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); color:var(--gold-accent);" required maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>
                <div class="form-group">
                    <label class="form-label">Nomor WhatsApp</label>
                    <input type="tel" id="editWa" class="form-input" required oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Jabatan (Kasta)</label>
                        <select id="editRole" class="form-select">
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Status Akun</label>
                        <select id="editStatus" class="form-select">
                            <option value="Active">Aktif / Disetujui</option>
                            <option value="Pending Admin">Pending (Kunci)</option>
                            <option value="Banned">Banned (Blokir)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 15px;">
                    <label class="form-label" style="color: var(--emerald-main);"><i class="fa-solid fa-qrcode"></i> Bypass Akses Barcode</label>
                    <select id="editHakAbsen" class="form-select">
                        <option value="otomatis">⚙️ Otomatis (Sesuai Limit Sistem)</option>
                        <option value="buka_paksa">🟢 BUKA PAKSA (VIP / Selalu Muncul)</option>
                        <option value="kunci_paksa">🔴 KUNCI PAKSA (Skorsing)</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 10px;"><i class="fa-solid fa-user-shield"></i> Simpan Perubahan</button>
            </form>
        </div>
    </div>

    <!-- MODAL CEK KAS -->
    <div id="modalApproveTrx" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Verifikasi Sedekah</h3>
                <button type="button" onclick="document.getElementById('modalApproveTrx').classList.remove('show')" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input type="hidden" id="apvTrxId">
            <div class="form-group">
                <label class="form-label">Nama Keterangan (Bisa diedit)</label>
                <input type="text" id="apvTrxName" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Nominal (Bisa diedit jika salah)</label>
                <input type="number" id="apvTrxNominal" class="form-input" required>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button type="button" class="btn-primary" style="flex: 1; background: rgba(239, 68, 68, 0.1); color: var(--danger-red); border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: none;" onclick="actionTrx('reject')"><i class="fa-solid fa-xmark"></i> Tolak</button>
                <button type="button" class="btn-primary" style="flex: 1;" onclick="actionTrx('approve')"><i class="fa-solid fa-check"></i> Terima Uang</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, onSnapshot, doc, getDoc, updateDoc, setDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        window.customAlert = function(title, desc, type = 'success') {
            const el = document.getElementById('customAlert'); document.getElementById('caTitle').innerText = title; document.getElementById('caDesc').innerText = desc;
            const iconEl = document.getElementById('caIcon');
            if(type === 'success') { iconEl.className = 'cp-icon success'; iconEl.innerHTML = '<i class="fa-solid fa-check"></i>'; }
            else if(type === 'error') { iconEl.className = 'cp-icon error'; iconEl.innerHTML = '<i class="fa-solid fa-xmark"></i>'; }
            else { iconEl.className = 'cp-icon warning'; iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; }
            el.classList.add('show');
        }
        window.closeCustomAlert = function() { document.getElementById('customAlert').classList.remove('show'); }
        window.customConfirm = function(title, desc, onYes) {
            const el = document.getElementById('customConfirm'); document.getElementById('ccTitle').innerText = title; document.getElementById('ccDesc').innerText = desc;
            document.getElementById('ccBtnYes').onclick = function() { closeCustomConfirm(); onYes(); }; el.classList.add('show');
        }
        window.closeCustomConfirm = function() { document.getElementById('customConfirm').classList.remove('show'); }
        window.showLoading = function(title = "Memproses...") { document.getElementById('clTitle').innerText = title; document.getElementById('customLoading').classList.add('show'); }
        window.hideLoading = function() { document.getElementById('customLoading').classList.remove('show'); }

        const CRYPTO_OFFSET = 7;
        function encryptData(plainText) {
            if (!plainText) return ""; let shifted = plainText.split("").map(char => String.fromCharCode(char.charCodeAt(0) + CRYPTO_OFFSET)).join(""); return btoa(unescape(encodeURIComponent(shifted)));
        }
        function decryptData(encoded) {
            if (!encoded) return "";
            try { let decoded = decodeURIComponent(escape(atob(encoded))); return decoded.split("").map(char => String.fromCharCode(char.charCodeAt(0) - CRYPTO_OFFSET)).join("");
            } catch(e) { return encoded; } 
        }

        let currentUserRole = "member"; let allUsers = []; let filterHrdState = 'Semua';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists()) {
                    currentUserRole = (docSnap.data().role || "member").toLowerCase();
                    if (["superadmin", "admin", "bendahara"].includes(currentUserRole)) { initAdminPanel(); } 
                    else { window.location.href = 'index.html'; } 
                }
            } else { window.location.href = 'login.html'; }
        });

        function initAdminPanel() {
            if (currentUserRole === 'superadmin') {
                document.querySelectorAll('.superadmin-only').forEach(el => el.style.display = 'block');
                loadConfigData();
            }

            const roleSelect = document.getElementById('editRole');
            if (currentUserRole === 'superadmin') {
                roleSelect.innerHTML = `<option value="member">Member</option><option value="admin">Admin</option><option value="bendahara">Bendahara</option><option value="superadmin">⭐ Superadmin (Dewa)</option>`;
            } else {
                roleSelect.innerHTML = `<option value="member">Member</option><option value="admin">Admin</option><option value="bendahara">Bendahara</option>`;
            }

            loadAnggotaList(); loadKasPending();
        }

        window.switchNavTab = function(viewId, el) {
            document.querySelectorAll('.nav-tabs .tab-btn').forEach(b => b.classList.remove('active')); el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active')); document.getElementById(viewId).classList.add('active');
        }

        window.filterHrd = function(state, el) {
            document.querySelectorAll('.hrd-pill').forEach(p => p.classList.remove('active')); el.classList.add('active');
            filterHrdState = state; renderAnggota();
        }
        window.searchMember = function() { renderAnggota(); }

        function loadAnggotaList() {
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = []; let pendingCount = 0;
                snap.forEach(d => {
                    const data = d.data(); allUsers.push({ id: d.id, ...data });
                    if(data.status === "Pending Admin") pendingCount++;
                });
                document.getElementById('badgePendingCount').innerText = pendingCount;
                renderAnggota();
            });
        }

        function renderAnggota() {
            const list = document.getElementById('listAnggotaContainer');
            const searchTxt = document.getElementById('searchUser').value.toLowerCase();
            
            const filtered = allUsers.filter(u => {
                const matchState = filterHrdState === 'Semua' ? (u.status !== 'Pending Admin') : (u.status === 'Pending Admin');
                const cleanNik = decryptData(u.nik || "").toLowerCase();
                const matchSearch = (u.nama_lengkap || "").toLowerCase().includes(searchTxt) || cleanNik.includes(searchTxt);
                return matchState && matchSearch;
            });

            if (filtered.length === 0) { list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>Tidak ada data anggota ditemukan.</p></div>'; return; }

            list.innerHTML = filtered.map(u => {
                let stClass = "st-active"; let stText = "Aktif";
                if(u.status === "Pending Admin") { stClass = "st-pending"; stText = "Pending"; }
                else if(u.status === "Banned") { stClass = "st-banned"; stText = "Blokir"; }

                const hakAbsen = u.hak_absen || "otomatis";
                let hakIcon = '';
                if(hakAbsen === 'buka_paksa') hakIcon = '<i class="fa-solid fa-lock-open" style="color:var(--emerald-main); margin-left:5px;" title="Bypass Barcode"></i>';
                else if(hakAbsen === 'kunci_paksa') hakIcon = '<i class="fa-solid fa-lock" style="color:var(--danger-red); margin-left:5px;" title="Barcode Dikunci"></i>';

                return `
                <div class="glass-panel data-card">
                    <div class="dc-info">
                        <h4>${u.nama_lengkap || "Tanpa Nama"} ${hakIcon}</h4>
                        <p><i class="fa-brands fa-whatsapp" style="color:var(--emerald-main);"></i> ${u.no_wa || "-"} | ${u.email}</p>
                        <div>
                            <span class="status-tag ${stClass}">${stText}</span>
                            <span class="status-tag" style="background:#F1F5F9; color:var(--text-gray); margin-left:5px;">${u.role || "member"}</span>
                        </div>
                    </div>
                    <button class="btn-edit-round" onclick="openEditMember('${u.email}')"><i class="fa-solid fa-pen-to-square"></i></button>
                </div>
            `}).join('');
        }

        window.openEditMember = function(email) {
            const u = allUsers.find(x => x.email === email); if(!u) return;
            document.getElementById('editEmail').value = u.email;
            document.getElementById('editName').value = u.nama_lengkap || "";
            document.getElementById('editWa').value = u.no_wa || "";
            document.getElementById('editNik').value = decryptData(u.nik || "");
            document.getElementById('editRole').value = (u.role || "member").toLowerCase();
            document.getElementById('editStatus').value = u.status || "Active";
            document.getElementById('editHakAbsen').value = u.hak_absen || "otomatis";
            document.getElementById('modalEditMember').classList.add('show');
        }

        window.saveEditUser = async function(e) {
            e.preventDefault(); showLoading("Menyimpan Data Anggota...");
            const email = document.getElementById('editEmail').value;
            const newNik = document.getElementById('editNik').value;
            if(newNik.length !== 16) { hideLoading(); return customAlert("NIK Salah", "NIK harus berjumlah 16 digit.", "warning"); }

            try {
                const encNik = encryptData(newNik);
                await updateDoc(doc(db, "users", email), {
                    nama_lengkap: document.getElementById('editName').value,
                    no_wa: document.getElementById('editWa').value,
                    nik: encNik,
                    role: document.getElementById('editRole').value,
                    status: document.getElementById('editStatus').value,
                    hak_absen: document.getElementById('editHakAbsen').value
                });
                hideLoading(); customAlert("Berhasil", "Data anggota berhasil dimoderasi.", "success");
                document.getElementById('modalEditMember').classList.remove('show');
            } catch(error) { hideLoading(); customAlert("Gagal", "Error menyimpan data.", "error"); }
        }

        let pendingKas = [];
        function loadKasPending() {
            onSnapshot(query(collection(db, "transactions"), orderBy("tanggal", "desc")), (snap) => {
                pendingKas = [];
                snap.forEach(d => {
                    const data = d.data();
                    if(data.status === "pending" && data.jenis === "Pemasukan") pendingKas.push({ id: d.id, ...data });
                });
                renderKas();
            });
        }

        function renderKas() {
            const list = document.getElementById('listKasContainer');
            if (pendingKas.length === 0) { list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-check-double"></i><p>Semua bukti transfer sudah diverifikasi.</p></div>'; return; }

            list.innerHTML = pendingKas.map(k => {
                const dateStr = k.tanggal ? k.tanggal.toDate().toLocaleDateString('id-ID') : '-';
                return `
                <div class="glass-panel data-card" style="align-items: flex-start;">
                    <div class="dc-info" style="flex:1;">
                        <h4>${k.pengirim}</h4>
                        <p><i class="fa-solid fa-calendar-day"></i> ${dateStr} | ${k.nama_keterangan || "Sedekah"}</p>
                        <div style="font-size: 15px; font-weight: 900; color: var(--emerald-main); margin-top:8px;">Rp ${Number(k.nominal).toLocaleString('id-ID')}</div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <button class="btn-edit-round" style="background:rgba(16, 185, 129, 0.1); color:var(--emerald-main); border-color:rgba(16, 185, 129, 0.3);" onclick="viewImage('${k.bukti_image}')"><i class="fa-solid fa-image"></i></button>
                        <button class="btn-edit-round" onclick="openApproveKas('${k.id}')"><i class="fa-solid fa-clipboard-check"></i></button>
                    </div>
                </div>
            `}).join('');
        }

        window.viewImage = function(src) { document.getElementById('imgViewerSrc').src = src; document.getElementById('modalImage').classList.add('show'); }
        window.closeImageView = function() { document.getElementById('modalImage').classList.remove('show'); }

        window.openApproveKas = function(id) {
            const k = pendingKas.find(x => x.id === id); if(!k) return;
            document.getElementById('apvTrxId').value = k.id;
            document.getElementById('apvTrxName').value = k.nama_keterangan || "Sedekah";
            document.getElementById('apvTrxNominal').value = k.nominal;
            document.getElementById('modalApproveTrx').classList.add('show');
        }

        window.actionTrx = async function(act) {
            const id = document.getElementById('apvTrxId').value;
            const msg = act === 'approve' ? 'Yakin terima dan masukkan dana ini ke Kas?' : 'Yakin TOLAK bukti transfer ini?';
            
            customConfirm("Konfirmasi Verifikasi", msg, async () => {
                showLoading();
                try {
                    if (act === 'approve') {
                        await updateDoc(doc(db, "transactions", id), { status: "approved", nama_keterangan: document.getElementById('apvTrxName').value, nominal: Number(document.getElementById('apvTrxNominal').value) });
                        customAlert("Berhasil", "Dana masuk telah tercatat.", "success");
                    } else {
                        await updateDoc(doc(db, "transactions", id), { status: "rejected" });
                        customAlert("Ditolak", "Bukti transfer telah ditolak.", "success");
                    }
                    document.getElementById('modalApproveTrx').classList.remove('show');
                } catch(e) { customAlert("Gagal", "Error memproses data.", "error"); }
                finally { hideLoading(); }
            });
        }

        async function loadConfigData() {
            const sys = await getDoc(doc(db, "settings", "app_config"));
            if(sys.exists()) {
                document.getElementById('sysLimit').value = sys.data().limit_sedekah || 10000;
                document.getElementById('sysSyarat').value = sys.data().min_sedekah_absen || 0; 
                document.getElementById('sysQris').value = sys.data().qris_url || "";
            }
            const evt = await getDoc(doc(db, "settings", "event_config"));
            if(evt.exists()) {
                document.getElementById('evName').value = evt.data().nama_acara || "";
                document.getElementById('evLat').value = evt.data().lat || "";
                document.getElementById('evLng').value = evt.data().lng || "";
                document.getElementById('evRadius').value = evt.data().radius || 100;
                document.getElementById('evActive').value = String(evt.data().is_active);
            }
        }

        window.saveAppConfig = async function(e) {
            e.preventDefault(); showLoading("Menyimpan Konfigurasi...");
            try {
                await setDoc(doc(db, "settings", "app_config"), { limit_sedekah: Number(document.getElementById('sysLimit').value), min_sedekah_absen: Number(document.getElementById('sysSyarat').value), qris_url: document.getElementById('sysQris').value }, {merge: true});
                hideLoading(); customAlert("Update Sistem", "Parameter aplikasi berhasil diubah.", "success");
            } catch(err) { hideLoading(); customAlert("Gagal", "Sistem gagal menyimpan.", "error"); }
        }

        window.saveEventConfig = async function(e) {
            e.preventDefault(); showLoading("Menyimpan Radar...");
            try {
                await setDoc(doc(db, "settings", "event_config"), { nama_acara: document.getElementById('evName').value, lat: parseFloat(document.getElementById('evLat').value), lng: parseFloat(document.getElementById('evLng').value), radius: Number(document.getElementById('evRadius').value), is_active: document.getElementById('evActive').value === 'true' }, {merge: true});
                hideLoading(); customAlert("Radar Update", "Konfigurasi acara berhasil disimpan.", "success");
            } catch(err) { hideLoading(); customAlert("Gagal", "Gagal mengupdate Radar.", "error"); }
        }

        window.downloadAbsen = async function() {
            showLoading("Menyiapkan Data Excel...");
            try {
                const eventName = document.getElementById('evName').value;
                if(!eventName) throw new Error("Nama acara belum diatur.");
                const q = query(collection(db, "absensi_acara"), where("event_name", "==", eventName));
                const snap = await getDocs(q);
                let csv = "data:text/csv;charset=utf-8,Waktu Scan,Nama Member,Email (ID),Sistem Absen,Admin Scanner\n";
                snap.forEach(d => {
                    const dt = d.data();
                    const time = dt.scan_time ? dt.scan_time.toDate().toLocaleString('id-ID') : "";
                    const type = dt.is_manual ? "Bypass/Manual" : "Scan QR";
                    csv += `${time},${dt.member_name},${dt.member_email},${type},${dt.scanner_admin}\n`;
                });
                const link = document.createElement("a"); link.href = encodeURI(csv); link.download = `Absensi_${eventName.replace(/ /g,'_')}.csv`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
                hideLoading(); customAlert("Berhasil", "File Absensi telah diunduh.", "success");
            } catch(e) { hideLoading(); customAlert("Gagal", e.message, "error"); }
        }
    </script>
    <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Fail', err)); }); }</script>
</body>
