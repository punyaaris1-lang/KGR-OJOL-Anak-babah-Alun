<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#059669">
    <title>Panel Superadmin - KGR</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #F4F6F5; --text-dark: #111827; --text-gray: #4B5563;
            --emerald-dark: #064E3B; --emerald-main: #059669; 
            --gold-accent: #FBBF24; --danger-red: #DC2626; --success-green: #059669;
            --shadow-card: 0 10px 25px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #E2E8E4; color: var(--text-dark); display: flex; justify-content: center; min-height: 100vh; }
        
        .app-container { width: 100%; max-width: 480px; background-color: var(--bg-base); display: flex; flex-direction: column; height: 100vh; position: relative; overflow: hidden;}
        @media (min-width: 600px) { .app-container { height: 90vh; max-height: 900px; border-radius: 40px; border: 8px solid #FFF; margin: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.15); } }

        /* HEADER PUTIH BERSIH */
        .header-god { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); background: #FFFFFF; z-index: 10; position: relative; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: #FFF; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); color: var(--text-dark); font-size: 16px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
        .btn-back:active { transform: scale(0.9); }
        .header-title h1 { font-size: 18px; font-weight: 900; color: var(--text-dark); letter-spacing: 0.5px; text-transform: uppercase; }
        .header-title p { font-size: 10px; font-weight: 800; color: var(--emerald-main); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 100px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        .section-title { font-size: 13px; font-weight: 900; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 15px; display: flex; align-items: center; gap: 8px;}
        .section-title i { color: var(--emerald-main); font-size: 16px; }

        /* PANEL STYLE PUTIH */
        .god-panel { background: #FFFFFF; border: 1px solid rgba(0,0,0,0.03); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; box-shadow: var(--shadow-card); }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-gray); margin-bottom: 8px; letter-spacing: 1px;}
        .form-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.05); background: #F9F9F9; color: var(--text-dark); font-size: 14px; font-weight: 700; outline: none; transition: 0.3s; }
        .form-input:focus { border-color: var(--emerald-main); background: #FFF; }
        .form-input:disabled { color: var(--text-gray); background: #E5E5E5; border-color: transparent; }
        
        .btn-god { width: 100%; padding: 16px; border-radius: 12px; font-size: 13px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-god:active { transform: scale(0.97); }

        .btn-outline { width: 100%; padding: 14px; border-radius: 12px; font-size: 12px; font-weight: 800; background: #FFF; color: var(--emerald-main); border: 2px solid var(--emerald-main); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 15px; }
        .btn-outline:active { background: var(--emerald-main); color: #FFF; }

        /* SAKLAR HIGH-TECH (Putih) */
        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #F9F9F9; border: 1px solid rgba(0,0,0,0.05); border-radius: 12px; margin-bottom: 20px; }
        .switch-label { font-size: 13px; font-weight: 900; color: var(--text-dark); }
        .switch-desc { font-size: 9px; color: var(--text-gray); font-weight: 800; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px;}
        .switch { position: relative; display: inline-block; width: 60px; height: 32px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #CCC; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 24px; width: 24px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
        input:checked + .slider { background-color: var(--emerald-main); }
        input:checked + .slider:before { transform: translateX(28px); }

        /* USER LIST CARD (Putih) */
        .user-card { border: 1px solid rgba(0,0,0,0.05); background: #FFF; border-radius: 16px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #111827; display: flex; justify-content: center; align-items: center; font-size: 16px; font-weight: 900; color: var(--gold-accent); }
        .user-details h4 { font-size: 13px; font-weight: 900; color: var(--text-dark); margin-bottom: 3px; }
        .user-details p { font-size: 10px; font-weight: 700; color: var(--text-gray); }
        .role-tag { font-size: 9px; font-weight: 800; padding: 3px 6px; border-radius: 4px; margin-top: 5px; display: inline-flex; align-items: center; gap: 3px; text-transform: uppercase; background: #E5E5E5; color: var(--text-dark); }
        .role-tag.super { background: rgba(251, 191, 36, 0.2); color: #D97706; }
        .role-tag.admin { background: rgba(10, 132, 255, 0.1); color: #0A84FF; }
        .btn-edit-user { width: 35px; height: 35px; border-radius: 10px; background: #F4F6F5; color: var(--text-dark); border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;}
        
        .empty-state { text-align: center; padding: 30px 20px; color: var(--text-gray); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* MODAL KONTROL USER */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: flex-end; z-index: 100; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: #FFF; border-radius: 30px 30px 0 0; padding: 25px 24px 35px; width: 100%; max-width: 480px; transform: translateY(100%); transition: 0.4s; box-shadow: 0 -10px 40px rgba(0,0,0,0.1);}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .modal-header h3 { font-size: 18px; font-weight: 900; color: var(--text-dark); }
        .modal-header p { font-size: 11px; color: var(--text-gray); font-weight: 700; margin-top: 4px;}
        .btn-close { width: 32px; height: 32px; border-radius: 50%; background: #F4F6F5; border: none; color: var(--text-dark); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .form-select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.05); font-size: 14px; font-weight: 800; background: #F9F9F9; color: var(--text-dark); margin-bottom: 25px; outline: none; appearance: none;}
        
        .btn-nuke { background: var(--danger-red); color: #FFF; }
        .btn-action-group { display: flex; gap: 10px; }
        .btn-action-group button { flex: 1; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-god">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <div class="header-title">
                <h1>SUPER ADMIN</h1>
                <p>Pusat Kendali Aplikasi</p>
            </div>
        </div>

        <div class="content-area">
            
            <!-- PANEL ABSENSI & GEOFENCING -->
            <div class="section-title"><i class="fa-solid fa-satellite-dish"></i> RADAR ACARA (GEOFENCING)</div>
            <div class="god-panel" style="border: 2px solid var(--emerald-main);">
                
                <div class="switch-container">
                    <div>
                        <div class="switch-label">SAKLAR ACARA</div>
                        <div class="switch-desc" id="txtStatusAcara">Saat ini OFF (Tersembunyi)</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggleAcara">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">Nama / Judul Acara</label>
                    <input type="text" id="evtName" class="form-input" placeholder="Cth: Kopdar Gabungan KGR">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Tanggal Pelaksanaan Acara</label>
                    <input type="date" id="evtDate" class="form-input">
                </div>
                
                <button class="btn-outline" onclick="lockGPS()"><i class="fa-solid fa-location-crosshairs"></i> Kunci Koordinat di Posisi Saya</button>
                <div style="font-size: 10px; color: var(--text-gray); text-align: center; margin-bottom: 15px; margin-top: -5px; font-weight: 700;">*Atau ketik/copy-paste kordinat manual dari Google Maps</div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label class="form-label">Latitude</label>
                        <input type="text" id="evtLat" class="form-input" placeholder="Cth: -6.123456">
                    </div>
                    <div style="flex: 1;">
                        <label class="form-label">Longitude</label>
                        <input type="text" id="evtLng" class="form-input" placeholder="Cth: 106.123456">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Radius Toleransi Absen (Meter)</label>
                    <input type="number" id="evtRadius" class="form-input" value="50" placeholder="Cth: 50">
                </div>

                <button class="btn-god" id="btnSaveEvent" onclick="saveEventConfig()" style="background: var(--emerald-main);"><i class="fa-solid fa-satellite"></i> Broadcast Setting Acara</button>
                
                <button class="btn-god" onclick="exportAbsensi()" style="margin-top: 10px; background: #FFF; color: var(--success-green); border: 2px solid var(--success-green);"><i class="fa-solid fa-file-excel"></i> Download Data Absensi</button>
            </div>

            <!-- MANAJEMEN KASTA & ADMIN -->
            <div class="section-title"><i class="fa-solid fa-users-gear"></i> Kontrol Kasta & Member</div>
            <div class="god-panel" style="padding: 10px;">
                <div id="godUserList" style="max-height: 280px; overflow-y: auto; padding: 10px; scrollbar-width: none;">
                    <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Memuat entitas...</div>
                </div>
            </div>

            <!-- KONFIGURASI SISTEM -->
            <div class="section-title"><i class="fa-solid fa-sliders"></i> Konfigurasi Sistem Utama</div>
            <div class="god-panel">
                <div class="form-group">
                    <label class="form-label">Limit Maksimal Sedekah (Rp)</label>
                    <input type="number" id="cfgLimit" class="form-input" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">URL Gambar QRIS</label>
                    <input type="text" id="cfgQris" class="form-input" autocomplete="off">
                </div>
                <button class="btn-god" id="btnSaveConfig" onclick="saveAppConfig()"><i class="fa-solid fa-microchip"></i> Terapkan ke Sistem</button>
            </div>
        </div>
    </div>

    <!-- MODAL EDIT USER -->
    <div class="modal-overlay" id="modalEditUser">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h3 id="modalUserName">Nama Anggota</h3>
                    <p id="modalUserEmail">email@domain.com</p>
                </div>
                <button class="btn-close" onclick="closeUserModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <label class="form-label">Tetapkan Kasta (Jabatan)</label>
            <select id="selectRole" class="form-select">
                <option value="member">Anggota Biasa (Member)</option>
                <option value="admin">Admin / Pemindai Absen</option>
                <option value="bendahara">Bendahara (Keuangan)</option>
                <option value="superadmin">Super Admin (Dewa)</option>
            </select>

            <div class="btn-action-group">
                <button class="btn-god" id="btnSaveUser" onclick="saveUserRole()"><i class="fa-solid fa-fingerprint"></i> Terapkan</button>
                <button class="btn-god btn-nuke" onclick="deleteUser()"><i class="fa-solid fa-user-slash"></i> Hapus</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { doc, getDoc, setDoc, updateDoc, collection, query, orderBy, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let targetEditEmail = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists() && (docSnap.data().role || "").toLowerCase() === "superadmin") {
                    loadAllUsers(); loadConfig(); loadEventConfig();
                } else { alert("Akses ditolak! Hanya untuk Superadmin."); window.location.href = "index.html"; }
            } else { window.location.href = 'login.html'; }
        });

        // ==========================================
        // FITUR SAKLAR AJAIB (AUTO SAVE)
        // ==========================================
        async function loadEventConfig() {
            try {
                const cfg = await getDoc(doc(db, "settings", "event_config"));
                if (cfg.exists()) {
                    const d = cfg.data();
                    document.getElementById('evtName').value = d.nama_acara || "";
                    document.getElementById('evtDate').value = d.tanggal_acara || "";
                    document.getElementById('evtLat').value = d.lat || "";
                    document.getElementById('evtLng').value = d.lng || "";
                    document.getElementById('evtRadius').value = d.radius || 50;
                    document.getElementById('toggleAcara').checked = d.is_active || false;
                    updateToggleText(d.is_active);
                }
            } catch(e) { console.log("Event config belum ada."); }
        }

        // FUNGSI BARU: AUTO SAVE SAAT SAKLAR DIGESER KE OFF/ON
        document.getElementById('toggleAcara').addEventListener('change', async function() { 
            updateToggleText(this.checked); 
            try {
                // Langsung ngirim data On/Off ke database tanpa nunggu tombol Broadcast diklik
                await setDoc(doc(db, "settings", "event_config"), { is_active: this.checked }, { merge: true });
            } catch(e) { console.error("Gagal Auto-Save"); }
        });

        function updateToggleText(isActive) {
            const txt = document.getElementById('txtStatusAcara');
            if(isActive) { txt.innerText = "ON (Tampil di semua HP)"; txt.style.color = "var(--success-green)"; } 
            else { txt.innerText = "OFF (Sembunyi)"; txt.style.color = "var(--danger-red)"; }
        }

        window.lockGPS = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        document.getElementById('evtLat').value = position.coords.latitude;
                        document.getElementById('evtLng').value = position.coords.longitude;
                        alert("Berhasil! Koordinat Pusat Acara telah dikunci di lokasi Anda.");
                    },
                    (error) => { alert("Gagal mengambil GPS. Pastikan izin lokasi (GPS) menyala."); },
                    { enableHighAccuracy: true }
                );
            } else { alert("Browser Anda tidak mendukung GPS."); }
        }

        // TOmbol broadcast ini tetep berguna buat nyimpen data form yg diketik (Nama Acara, Tanggal, Radius)
        window.saveEventConfig = async function() {
            const btn = document.getElementById('btnSaveEvent');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Broadcasting...'; btn.disabled = true;
            try {
                await setDoc(doc(db, "settings", "event_config"), {
                    nama_acara: document.getElementById('evtName').value,
                    tanggal_acara: document.getElementById('evtDate').value,
                    lat: document.getElementById('evtLat').value,
                    lng: document.getElementById('evtLng').value,
                    radius: Number(document.getElementById('evtRadius').value),
                    is_active: document.getElementById('toggleAcara').checked,
                    updated_at: new Date()
                }, { merge: true });
                alert("Setting Acara & Titik Kordinat berhasil disimpan!");
            } catch(e) { alert("Gagal menyimpan setting acara."); } 
            finally { btn.innerHTML = '<i class="fa-solid fa-satellite"></i> Broadcast Setting Acara'; btn.disabled = false; }
        }

        window.exportAbsensi = async function() {
            const evtName = document.getElementById('evtName').value;
            if(!evtName) return alert("Nama acara kosong! Tentukan nama acara terlebih dahulu.");
            
            try {
                const q = query(collection(db, "absensi_acara"));
                const snap = await getDocs(q);
                let csv = "data:text/csv;charset=utf-8,Tanggal,Jam,Nama Acara,Nama Member,Email,Metode\n";
                let count = 0;

                snap.forEach(d => {
                    const data = d.data();
                    if(data.event_name === evtName) {
                        const dateObj = data.scan_time ? data.scan_time.toDate() : new Date();
                        const tgl = dateObj.toLocaleDateString('id-ID');
                        const jam = dateObj.toLocaleTimeString('id-ID');
                        const metode = data.is_manual ? "Manual Bypass" : "Scan QR";
                        csv += `${tgl},${jam},${data.event_name},${(data.member_name||"").replace(/,/g,' ')},${data.member_email},${metode}\n`;
                        count++;
                    }
                });

                if(count === 0) return alert("Belum ada data absensi untuk acara: " + evtName);

                const link = document.createElement("a");
                link.href = encodeURI(csv); link.download = `Absensi_${evtName.replace(/\s+/g, '_')}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            } catch(e) { alert("Gagal menarik data absensi."); }
        }

        // KONTROL USER & CONFIG LAINNYA
        function loadAllUsers() {
            const list = document.getElementById('godUserList');
            onSnapshot(query(collection(db, "users"), orderBy("created_at", "desc")), (snapshot) => {
                list.innerHTML = "";
                if(snapshot.empty) { list.innerHTML = '<div class="empty-state">Data kosong.</div>'; return; }

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const email = docSnap.id;
                    const role = (data.role || "member").toLowerCase();
                    const inisial = (data.nama_lengkap || "X").charAt(0).toUpperCase();

                    let badges = `<span class="role-tag">${role}</span>`;
                    if(role === 'superadmin') badges = `<span class="role-tag super"><i class="fa-solid fa-crown"></i> Super Admin</span>`;
                    else if(role === 'admin') badges = `<span class="role-tag admin"><i class="fa-solid fa-shield"></i> Admin</span>`;
                    
                    list.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <div class="user-avatar">${inisial}</div>
                                <div class="user-details"><h4>${data.nama_lengkap || 'Tanpa Nama'}</h4><p>${data.no_wa || email}</p><div>${badges}</div></div>
                            </div>
                            <button class="btn-edit-user" onclick="openUserModal('${email}', '${data.nama_lengkap}', '${role}')"><i class="fa-solid fa-sliders"></i></button>
                        </div>
                    `;
                });
            });
        }

        window.openUserModal = function(email, nama, role) {
            targetEditEmail = email;
            document.getElementById('modalUserName').innerText = nama || "Tanpa Nama";
            document.getElementById('modalUserEmail').innerText = email;
            document.getElementById('selectRole').value = role;
            document.getElementById('modalEditUser').classList.add('show');
        }

        window.closeUserModal = function() { document.getElementById('modalEditUser').classList.remove('show'); }

        window.saveUserRole = async function() {
            const btn = document.getElementById('btnSaveUser');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>...'; btn.disabled = true;
            try { await updateDoc(doc(db, "users", targetEditEmail), { role: document.getElementById('selectRole').value }); closeUserModal(); } 
            catch(e) { alert("Gagal merubah kasta user."); } finally { btn.innerHTML = '<i class="fa-solid fa-fingerprint"></i> Terapkan'; btn.disabled = false; }
        }

        window.deleteUser = async function() {
            if(document.getElementById('selectRole').value === 'superadmin') return alert("ERROR: Tidak dapat menghapus sesama dewa.");
            if(confirm("MENGHAPUS MEMBER PERMANEN?")) { await deleteDoc(doc(db, "users", targetEditEmail)); closeUserModal(); }
        }

        async function loadConfig() {
            try {
                const configDoc = await getDoc(doc(db, "settings", "app_config"));
                if (configDoc.exists()) {
                    document.getElementById('cfgLimit').value = configDoc.data().limit_sedekah || 10000;
                    document.getElementById('cfgQris').value = configDoc.data().qris_url || "";
                }
            } catch(e) { console.log("Config belum ada."); }
        }

        window.saveAppConfig = async function() {
            const btn = document.getElementById('btnSaveConfig');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>...'; btn.disabled = true;
            try {
                await setDoc(doc(db, "settings", "app_config"), { limit_sedekah: Number(document.getElementById('cfgLimit').value), qris_url: document.getElementById('cfgQris').value }, { merge: true });
                alert("Sistem Utama berhasil di-update!");
            } catch(e) { alert("Gagal update sistem."); } finally { btn.innerHTML = '<i class="fa-solid fa-microchip"></i> Terapkan ke Sistem'; btn.disabled = false; }
        }
    </script>
</body>
</html>
