<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F6F5">
    <title>Kelola Anggota - KGR</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #F4F6F5; --text-dark: #111827; --text-gray: #4B5563;
            --emerald-main: #059669; --emerald-dark: #064E3B; --emerald-light: #D1FAE5;
            --danger-red: #DC2626; --gold-accent: #FBBF24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #E2E8E4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; height: 100vh; max-width: 480px; background-color: var(--bg-base); position: relative; overflow: hidden; display: flex; flex-direction: column; }

        @media (min-width: 600px) {
            .app-container { height: 90vh; max-height: 900px; border-radius: 40px; border: 1px solid rgba(0,0,0,0.05); margin: auto;}
        }

        /* HEADER */
        .header-top { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; background: #FFF; box-shadow: 0 4px 15px rgba(0,0,0,0.03); z-index: 10;}
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: #F4F6F5; display: flex; justify-content: center; align-items: center; font-size: 18px; color: var(--text-dark); cursor: pointer; transition: 0.2s;}
        .btn-back:active { background: #E5E5EA; transform: scale(0.9); }
        .header-title h1 { font-size: 18px; font-weight: 900; color: var(--text-dark); }
        .header-title p { font-size: 11px; font-weight: 700; color: var(--emerald-main); text-transform: uppercase; letter-spacing: 1px; }

        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 100px; scrollbar-width: none; }
        .content-area::-webkit-scrollbar { display: none; }

        /* INFO PANEL */
        .info-panel { background: var(--emerald-main); border-radius: 20px; padding: 20px; color: #FFF; margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(5, 150, 105, 0.2);}
        .info-panel::after { content:''; position:absolute; top:-50%; right:-20%; width:150px; height:150px; background:#FFF; opacity:0.1; border-radius:50%; }
        .info-panel h3 { font-size: 14px; font-weight: 800; margin-bottom: 5px; }
        .info-panel p { font-size: 11px; font-weight: 600; line-height: 1.4; opacity: 0.9; }

        .section-title { font-size: 14px; font-weight: 800; margin-bottom: 15px; color: var(--text-dark); display: flex; justify-content: space-between; align-items: center;}
        .badge-count { background: var(--emerald-main); color: #FFF; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 800;}

        /* USER CARD */
        .user-card { background: #FFF; border-radius: 18px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--emerald-light); display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: 900; color: var(--emerald-main); }
        .user-details h4 { font-size: 14px; font-weight: 800; color: var(--text-dark); margin-bottom: 2px; }
        .user-details p { font-size: 10px; font-weight: 700; color: var(--text-gray); display: flex; align-items: center; gap: 5px;}
        
        .role-tag { font-size: 9px; font-weight: 800; padding: 3px 6px; border-radius: 4px; margin-top: 4px; display: inline-flex; align-items: center; gap: 3px; text-transform: uppercase;}
        .tag-superadmin { background: rgba(251, 191, 36, 0.2); color: #D97706; }
        .tag-pengurus { background: var(--emerald-light); color: var(--emerald-main); }
        .tag-approver { background: #E0F2FE; color: #0284C7; margin-left: 4px; }
        
        .btn-manage { width: 35px; height: 35px; border-radius: 10px; background: #F4F6F5; border: none; color: var(--text-dark); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;}
        .btn-manage:active { background: #E5E5EA; transform: scale(0.9); }

        .empty-state { text-align: center; padding: 30px 20px; }
        .empty-state i { font-size: 30px; color: var(--text-gray); opacity: 0.5; margin-bottom: 10px; }
        .empty-state p { font-size: 12px; font-weight: 600; color: var(--text-gray); }

        /* MODAL KELOLA */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 100; display: flex; justify-content: center; align-items: flex-end; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .bottom-sheet { width: 100%; background: #FFF; border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 30px 24px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); }
        .modal-overlay.show .bottom-sheet { transform: translateY(0); }
        
        .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .sheet-header h3 { font-size: 16px; font-weight: 900; color: var(--text-dark); }
        .sheet-header p { font-size: 11px; font-weight: 600; color: var(--text-gray); margin-top: 3px; }
        .btn-close { width: 30px; height: 30px; border-radius: 50%; background: #F4F6F5; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        .form-label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--text-gray); }
        .form-select { width: 100%; padding: 15px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.06); font-size: 14px; font-weight: 700; color: var(--text-dark); outline: none; background: #F9F9F9; margin-bottom: 15px; appearance: none;}
        .form-select:focus { border-color: var(--emerald-main); }

        .checkbox-container { display: flex; align-items: center; gap: 10px; padding: 15px; background: rgba(5, 150, 105, 0.05); border: 1px solid rgba(5, 150, 105, 0.2); border-radius: 14px; margin-bottom: 20px; }
        .checkbox-container input { width: 20px; height: 20px; accent-color: var(--emerald-main); cursor: pointer; }
        .checkbox-container label { font-size: 12px; font-weight: 800; color: var(--emerald-dark); cursor: pointer; flex-grow: 1; }
        .checkbox-desc { font-size: 10px; color: var(--emerald-main); font-weight: 600; opacity: 0.8; margin-top: 3px; }

        .btn-action-group { display: flex; gap: 10px; }
        .btn-save { flex: 2; padding: 16px; border-radius: 14px; font-size: 13px; font-weight: 800; background: var(--emerald-main); color: #FFF; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(5, 150, 105, 0.2);}
        .btn-save:active { transform: scale(0.96); }
        
        .btn-delete { flex: 1; padding: 16px; border-radius: 14px; font-size: 13px; font-weight: 800; background: #FEE2E2; color: var(--danger-red); border: none; cursor: pointer; transition: 0.2s; }
        .btn-delete:active { background: var(--danger-red); color: #FFF; }
    </style>
</head>
<body>

    <main class="app-container">
        <div class="header-top">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <div class="header-title">
                <h1>Kelola Anggota</h1>
                <p><i class="fa-solid fa-user-gear"></i> Panel Admin (HRD)</p>
            </div>
        </div>

        <div class="content-area">
            <div class="info-panel">
                <h3>Sistem Manajemen Keanggotaan</h3>
                <p>Di panel ini, Anda dapat merubah jabatan dan mencabut akses member.</p>
            </div>

            <div class="section-title">
                Daftar Seluruh Anggota
                <span class="badge-count" id="totalCount">0</span>
            </div>

            <div id="usersListContainer">
                <div class="empty-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Memuat data dari server...</p>
                </div>
            </div>
        </div>

        <!-- MODAL BOTTOM SHEET KELOLA ANGGOTA -->
        <div class="modal-overlay" id="modalManage">
            <div class="bottom-sheet">
                <div class="sheet-header">
                    <div>
                        <h3 id="modalName">Nama Member</h3>
                        <p id="modalEmail">email@member.com</p>
                    </div>
                    <button class="btn-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div id="superAdminControls" style="display: none;">
                    <label class="form-label">Ubah Jabatan (Role)</label>
                    <select id="selectRole" class="form-select" onchange="toggleApprovalCheckbox()">
                        <option value="member">Anggota Biasa (Member)</option>
                        <option value="admin">Admin (HRD / Operasional)</option>
                        <option value="bendahara">Bendahara (Keuangan)</option>
                        <option value="superadmin">Super Admin (Dewa)</option>
                    </select>

                    <div class="checkbox-container" id="approvalBox" style="display: none;">
                        <input type="checkbox" id="checkApprove">
                        <div>
                            <label for="checkApprove">Berikan Hak "Persetujuan Dana"</label>
                            <div class="checkbox-desc">Centang agar admin ini bisa klik "Setujui" di menu Pengajuan Dana.</div>
                        </div>
                    </div>
                </div>

                <div class="btn-action-group">
                    <button class="btn-save" id="btnSaveData" style="display: none;" onclick="saveChanges()"><i class="fa-solid fa-floppy-disk"></i> Simpan Data</button>
                    <button class="btn-delete" onclick="hapusAnggota()"><i class="fa-solid fa-trash-can"></i> Hapus</button>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, onSnapshot, doc, getDoc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const usersRef = collection(db, "users");
        let currentUserRole = "member";
        let targetEmail = ""; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.email));
                if (docSnap.exists()) {
                    currentUserRole = (docSnap.data().role || "member").toLowerCase();
                    
                    if (currentUserRole !== "superadmin" && currentUserRole !== "admin") {
                        alert("Akses Ditolak. Anda bukan bagian dari kepengurusan HRD.");
                        window.location.href = "index.html";
                    } else {
                        loadUsers(); 
                    }
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        function loadUsers() {
            const listContainer = document.getElementById('usersListContainer');
            const countBadge = document.getElementById('totalCount');
            const q = query(usersRef, orderBy("created_at", "desc"));

            onSnapshot(q, (snapshot) => {
                listContainer.innerHTML = "";
                countBadge.innerText = snapshot.size;

                if (snapshot.size === 0) {
                    listContainer.innerHTML = `<div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>Belum ada data anggota di server.</p></div>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const email = data.email;
                    const nama = data.nama_lengkap || "Tanpa Nama";
                    const noWa = data.no_wa || "Belum ada WA";
                    const role = (data.role || "member").toLowerCase();
                    const canApprove = data.can_approve || false;
                    const inisial = nama.charAt(0).toUpperCase();

                    let roleTagHTML = '';
                    if (role === "superadmin") { 
                        roleTagHTML = `<span class="role-tag tag-superadmin"><i class="fa-solid fa-crown"></i> Superadmin</span>`;
                    } else if (role === "admin" || role === "bendahara") {
                        roleTagHTML = `<span class="role-tag tag-pengurus"><i class="fa-solid fa-shield"></i> ${role}</span>`;
                        if (canApprove) roleTagHTML += `<span class="role-tag tag-approver"><i class="fa-solid fa-check-double"></i> Approver</span>`;
                    }

                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div class="user-info">
                            <div class="user-avatar">${inisial}</div>
                            <div class="user-details">
                                <h4>${nama}</h4>
                                <p><i class="fa-brands fa-whatsapp" style="color: #25D366;"></i> ${noWa}</p>
                                <div>${roleTagHTML}</div>
                            </div>
                        </div>
                        <button class="btn-manage" onclick="openModal('${email}', '${nama}', '${role}', ${canApprove})">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                    `;
                    listContainer.appendChild(card);
                });
            });
        }

        window.openModal = function(email, nama, role, canApprove) {
            targetEmail = email;
            document.getElementById('modalName').innerText = nama;
            document.getElementById('modalEmail').innerText = email;
            
            if (currentUserRole === "superadmin") {
                document.getElementById('superAdminControls').style.display = 'block';
                document.getElementById('btnSaveData').style.display = 'block';
                
                document.getElementById('selectRole').value = role;
                document.getElementById('checkApprove').checked = canApprove;
                
                toggleApprovalCheckbox(); 
            }

            document.getElementById('modalManage').classList.add('show');
        }

        window.closeModal = function() {
            document.getElementById('modalManage').classList.remove('show');
        }

        window.toggleApprovalCheckbox = function() {
            const selectedRole = document.getElementById('selectRole').value;
            const box = document.getElementById('approvalBox');
            if (selectedRole === "admin") {
                box.style.display = 'flex';
            } else {
                box.style.display = 'none';
                document.getElementById('checkApprove').checked = false; 
            }
        }

        window.saveChanges = async function() {
            const btn = document.getElementById('btnSaveData');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Proses...';
            btn.disabled = true;

            const newRole = document.getElementById('selectRole').value;
            const newCanApprove = document.getElementById('checkApprove').checked;

            try {
                await updateDoc(doc(db, "users", targetEmail), {
                    role: newRole,
                    can_approve: newCanApprove
                });
                alert("Data jabatan berhasil diperbarui!");
                closeModal();
            } catch (error) {
                alert("Gagal menyimpan data.");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan Data';
                btn.disabled = false;
            }
        }

        window.hapusAnggota = async function() {
            const selectedRole = document.getElementById('selectRole').value;
            if (selectedRole === "superadmin") {
                alert("Peringatan: Akun Super Admin tidak dapat dihapus!");
                return;
            }

            if (confirm(`PERINGATAN!\n\nApakah Anda yakin ingin menghapus data anggota:\n${targetEmail}\n\nAnggota ini tidak akan bisa login lagi ke aplikasi KGR.`)) {
                try {
                    await deleteDoc(doc(db, "users", targetEmail));
                    closeModal();
                } catch (error) {
                    alert("Gagal menghapus anggota. Pastikan Anda memiliki hak akses.");
                }
            }
        }
    </script>
</body>
</html>
