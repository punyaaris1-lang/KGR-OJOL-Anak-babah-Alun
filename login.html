<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F1F5F9">
    <title>Keamanan Maksimal - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* TEMA FLAT PREMIUM (LOGIN) */
        :root {
            --bg-base: #F1F5F9; 
            --text-dark: #0F172A; 
            --text-gray: #64748B; 
            --emerald-dark: #064E3B; 
            --emerald-main: #059669; 
            --emerald-light: #10B981;
            --gold-accent: #F59E0B; 
            --danger-red: #EF4444; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-base); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden; position: relative;
            color: var(--text-dark);
        }

        .app-container { 
            width: 100%; max-width: 414px; height: 100vh; background: transparent;
            position: relative; z-index: 10; display: flex; flex-direction: column; justify-content: center; padding: 30px; 
        }

        @media (min-width: 600px) { 
            .app-container { max-width: 400px; height: 85vh; max-height: 800px; border-radius: 40px; border: 8px solid #E2E8F0; margin: auto; background: #FFFFFF; } 
        }

        .auth-card { 
            background: #FFFFFF;
            border: 1px solid #E2E8F0; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); 
            border-radius: 30px; padding: 40px 24px; z-index: 2; position: relative; text-align: center; 
        }

        .branding h1 { font-size: 20px; font-weight: 900; color: var(--text-dark); margin-bottom: 5px;}
        .branding p { font-size: 11px; font-weight: 800; color: var(--emerald-main); letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase;}
        
        .logo-img { width: 90px; height: auto; margin: 0 auto 15px; display: block; filter: drop-shadow(0 10px 15px rgba(5,150,105,0.2)); }

        .form-group { margin-bottom: 15px; text-align: left; position: relative; }
        .form-group i.input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 14px; opacity: 0.7;}
        
        .form-group i.eye-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 16px; cursor: pointer; transition: 0.2s; padding: 5px;}
        .form-group i.eye-icon:active { transform: translateY(-50%) scale(0.8); color: var(--emerald-main); }
        
        .form-input { 
            width: 100%; padding: 16px 45px 16px 45px; border-radius: 14px; border: 2px solid #E2E8F0; 
            font-size: 13px; font-weight: 700; color: var(--text-dark); outline: none; background: #F8FAFC; transition: 0.2s;
        }
        .form-input::placeholder { color: var(--text-gray); opacity: 0.6; }
        .form-input:focus { border-color: var(--emerald-main); background: #FFF; box-shadow: 0 5px 15px rgba(5,150,105,0.1);}

        .btn-auth { width: 100%; padding: 16px; border-radius: 14px; font-size: 14px; font-weight: 900; background: var(--emerald-main); color: #FFF; border: none; margin-top: 5px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.2s; box-shadow: 0 10px 20px rgba(5,150,105,0.25);}
        .btn-auth:active { transform: scale(0.95); }
        .btn-auth:disabled { background: #CBD5E1; cursor: not-allowed; transform: none; box-shadow: none; color: #64748B;}
        .btn-auth i { color: #FFF; opacity: 0.9;}

        .link-text { font-size: 12px; font-weight: 800; color: var(--text-gray); margin-top: 20px; display: inline-block; cursor: pointer; }
        .link-text span { color: var(--emerald-main); }

        .toggle-view { display: none; }
        .toggle-view.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CUSTOM POPUP */
        .cp-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); z-index: 99999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; padding: 20px; }
        .cp-overlay.show { opacity: 1; visibility: visible; }
        .cp-box { background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 30px; width: 100%; max-width: 320px; text-align: center; padding: 30px 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 25px 50px rgba(0,0,0,0.2); color: var(--text-dark); }
        .cp-overlay.show .cp-box { transform: scale(1); }
        
        .cp-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 0 auto 15px; }
        .cp-icon.success { background: rgba(16, 185, 129, 0.15); color: var(--emerald-main); }
        .cp-icon.error { background: rgba(239, 68, 68, 0.15); color: var(--danger-red); }
        .cp-icon.warning { background: rgba(245, 158, 11, 0.15); color: var(--gold-accent); }
        
        .cp-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
        .cp-desc { font-size: 12px; font-weight: 600; color: var(--text-gray); margin-bottom: 25px; line-height: 1.5; }
        .cp-btn-wrap { display: flex; gap: 10px; }
        .cp-btn { flex: 1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .cp-btn:active { transform: scale(0.95); }
        .cp-btn-primary { background: var(--emerald-main); color: #FFF; box-shadow: 0 8px 20px rgba(5,150,105,0.3);}
        .cp-btn-cancel { background: #F1F5F9; color: var(--text-dark); border: 2px solid #E2E8F0;}
        .cp-btn-danger { background: var(--danger-red); color: #FFF; box-shadow: 0 8px 20px rgba(239,68,68,0.3);}

        /* ANIMASI TYPEWRITER */
        .intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0F172A; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .intro-overlay.active { display: flex; }
        
        @keyframes pulseGlow {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }

        .typewriter-box { text-align: center; padding: 20px; }
        .type-line-1 { font-size: clamp(20px, 6vw, 24px); font-weight: 900; color: var(--emerald-main); margin-bottom: 5px; min-height: 32px; letter-spacing: 1.5px; text-transform: uppercase;}
        .type-line-2 { font-size: clamp(20px, 6vw, 24px); font-weight: 900; color: var(--emerald-main); min-height: 32px; letter-spacing: 1.5px; text-transform: uppercase;}
        .cursor { display: inline-block; width: 3px; height: 1em; background: #FFFFFF; vertical-align: middle; margin-left: 4px; animation: blink 0.7s infinite; }
        .cursor.hidden { display: none; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* Layar Loading Deteksi Sesi */
        #sessionCheckOverlay { position: fixed; inset: 0; background: var(--bg-base); z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
        .spinner-login { border: 4px solid rgba(5, 150, 105, 0.2); border-left-color: var(--emerald-main); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="sessionCheckOverlay">
        <div class="spinner-login"></div>
        <p style="font-size: 12px; font-weight: 800; color: var(--text-gray); letter-spacing: 1px;">MEMERIKSA SESI...</p>
    </div>

    <div class="cp-overlay" id="customAlert">
        <div class="cp-box">
            <div class="cp-icon success" id="caIcon"><i class="fa-solid fa-check"></i></div>
            <h3 class="cp-title" id="caTitle">Pemberitahuan</h3>
            <p class="cp-desc" id="caDesc">Pesan di sini.</p>
            <button class="cp-btn cp-btn-primary" onclick="closeCustomAlert()" style="width: 100%;">Tutup</button>
        </div>
    </div>

    <div id="introAnimation" class="intro-overlay">
        <img src="logo1.png" alt="Logo KGR" style="width: 150px; animation: pulseGlow 1.5s infinite alternate ease-in-out; margin-bottom: 25px;">
        <div class="typewriter-box">
            <div class="type-line-1"><span id="text1"></span><span id="cursor1" class="cursor"></span></div>
            <div class="type-line-2"><span id="text2"></span><span id="cursor2" class="cursor hidden"></span></div>
        </div>
    </div>

    <div class="app-container">
        <div class="auth-card">
            
            <img src="logo1.png" class="logo-img" alt="Logo KGR">
            
            <div class="branding">
                <h1>KOTAK GOTONG ROYONG</h1>
                <p>Akses Member Terverifikasi</p>
            </div>

            <div id="stepLogin" class="toggle-view active">
                <form id="formLogin">
                    <div class="form-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="logEmail" class="form-input" placeholder="Email Terdaftar" required>
                    </div>
                    <div class="form-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="logPass" class="form-input" placeholder="Password" required>
                        <i class="fa-solid fa-eye eye-icon" onclick="togglePassword('logPass', this)"></i>
                    </div>
                    <button type="submit" class="btn-auth" id="btnLoginSubmit">Masuk Aplikasi <i class="fa-solid fa-right-to-bracket"></i></button>
                </form>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <span class="link-text" style="margin-top: 0;" onclick="switchView('stepForgot')">Lupa Password? <span>Reset</span></span>
                    <span class="link-text" style="margin-top: 0;" onclick="switchView('stepRegister')">Belum punya akun? <span>Daftar</span></span>
                </div>
            </div>

            <div id="stepRegister" class="toggle-view">
                <form id="formRegister">
                    <div class="form-group"><i class="fa-solid fa-user input-icon"></i><input type="text" id="regName" class="form-input" placeholder="Nama Lengkap (KTP)" required></div>
                    <div class="form-group"><i class="fa-solid fa-id-card input-icon"></i><input type="tel" id="regNik" class="form-input" placeholder="16 Digit NIK" required maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '');"></div>
                    <div class="form-group"><i class="fa-brands fa-whatsapp input-icon"></i><input type="tel" id="regWa" class="form-input" placeholder="Nomor WhatsApp" required oninput="this.value = this.value.replace(/[^0-9]/g, '');"></div>
                    <div class="form-group"><i class="fa-solid fa-envelope input-icon"></i><input type="email" id="regEmail" class="form-input" placeholder="Email Aktif (Gmail/Yahoo)" required></div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="regPass" class="form-input" placeholder="Password (Min. 6 huruf)" required minlength="6">
                        <i class="fa-solid fa-eye eye-icon" onclick="togglePassword('regPass', this)"></i>
                    </div>
                    <button type="submit" class="btn-auth" id="btnRegisterSubmit">Daftar Akun Baru <i class="fa-solid fa-user-plus"></i></button>
                </form>
                <span class="link-text" onclick="switchView('stepLogin')">Sudah punya akun? <span>Masuk</span></span>
            </div>

            <div id="stepForgot" class="toggle-view">
                <h3 style="font-size: 16px; font-weight: 900; margin-bottom: 5px; color: var(--text-dark);">Reset Password</h3>
                <p style="font-size: 11px; color: var(--text-gray); font-weight: 600; margin-bottom: 15px;">Link pemulihan akan dikirimkan ke kotak masuk email Anda.</p>
                <form id="formForgot">
                    <div class="form-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="resetEmail" class="form-input" placeholder="Ketik Email Anda" required>
                    </div>
                    <button type="submit" class="btn-auth" id="btnForgotSubmit">Kirim Link Reset <i class="fa-solid fa-paper-plane"></i></button>
                </form>
                <span class="link-text" onclick="switchView('stepLogin')">Batal dan <span>Kembali Login</span></span>
            </div>

        </div>
    </div>

    <script>
        window.togglePassword = function(inputId, icon) {
            const inputField = document.getElementById(inputId);
            if (inputField.type === "password") {
                inputField.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                inputField.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>

    <script type="module">
        import { auth, db } from './db-config.js'; 
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { doc, getDoc, setDoc, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById('sessionCheckOverlay');
            if (user && user.emailVerified) {
                window.location.replace('index.html');
            } else {
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 500);
                }, 800);
            }
        });

        window.customAlert = function(title, desc, type = 'success') {
            const el = document.getElementById('customAlert'); document.getElementById('caTitle').innerText = title; document.getElementById('caDesc').innerText = desc;
            const iconEl = document.getElementById('caIcon');
            if(type === 'success') { iconEl.className = 'cp-icon success'; iconEl.innerHTML = '<i class="fa-solid fa-check"></i>'; }
            else if(type === 'error') { iconEl.className = 'cp-icon error'; iconEl.innerHTML = '<i class="fa-solid fa-xmark"></i>'; }
            else { iconEl.className = 'cp-icon warning'; iconEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; }
            el.classList.add('show');
        }
        window.closeCustomAlert = function() { document.getElementById('customAlert').classList.remove('show'); }

        function getDeviceID() {
            const nav = window.navigator; const screen = window.screen;
            let ghostPrint = [ nav.userAgent, nav.language, screen.colorDepth, screen.width + "x" + screen.height, new Date().getTimezoneOffset(), nav.hardwareConcurrency || 2 ].join("||");
            let hash = 0; for (let i = 0; i < ghostPrint.length; i++) { hash = ((hash << 5) - hash) + ghostPrint.charCodeAt(i); hash |= 0; }
            return "KGR-FINGER-" + Math.abs(hash);
        }

        const CRYPTO_OFFSET = 7;
        function encryptData(plainText) {
            if (!plainText) return ""; let shifted = plainText.split("").map(char => String.fromCharCode(char.charCodeAt(0) + CRYPTO_OFFSET)).join(""); return btoa(unescape(encodeURIComponent(shifted)));
        }

        function isValidNIK(nik) {
            if (!/^\d{16}$/.test(nik)) return false;
            let hari = parseInt(nik.substring(6, 8)); let bulan = parseInt(nik.substring(8, 10));
            if (hari > 40) hari -= 40; if (hari < 1 || hari > 31 || bulan < 1 || bulan > 12) return false;
            if (/^(.)\1{15}$/.test(nik)) return false; return true;
        }

        window.switchView = function(viewId) { document.querySelectorAll('.toggle-view').forEach(el => el.classList.remove('active')); document.getElementById(viewId).classList.add('active'); }

        document.getElementById('formForgot').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnForgotSubmit');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...'; btn.disabled = true;
            try {
                await sendPasswordResetEmail(auth, document.getElementById('resetEmail').value);
                customAlert('Email Terkirim', 'Link reset password telah dikirim. Silahkan cek kotak masuk atau folder spam di email Anda.', 'success');
                setTimeout(() => { switchView('stepLogin'); }, 3000);
            } catch (error) { customAlert('Gagal', error.message.replace('Firebase: ', ''), 'error'); } 
            finally { btn.innerHTML = 'Kirim Link Reset <i class="fa-solid fa-paper-plane"></i>'; btn.disabled = false; }
        });

        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnRegisterSubmit'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memvalidasi Data...'; btn.disabled = true;

            const name = document.getElementById('regName').value; const nikInput = document.getElementById('regNik').value;
            const waInput = document.getElementById('regWa').value; const email = document.getElementById('regEmail').value.toLowerCase();
            const pass = document.getElementById('regPass').value;

            const nameParts = name.trim().split(/\s+/);
            if (nameParts.length < 2) { customAlert('Nama Tidak Lengkap', 'Harap masukkan Nama Lengkap sesuai KTP (Minimal 2 kata).', 'warning'); btn.innerHTML = 'Daftar Akun Baru <i class="fa-solid fa-user-plus"></i>'; btn.disabled = false; return; }

            const allowedDomains = ["gmail.com", "yahoo.com", "yahoo.co.id"]; const userDomain = email.split('@')[1];
            if (!allowedDomains.includes(userDomain)) { customAlert('Domain Ditolak', 'Gunakan alamat email @gmail.com, @yahoo.com, atau @yahoo.co.id.', 'error'); btn.innerHTML = 'Daftar Akun Baru <i class="fa-solid fa-user-plus"></i>'; btn.disabled = false; return; }
            if (!isValidNIK(nikInput)) { customAlert('NIK Ditolak', 'Sistem mendeteksi format NIK tidak valid. Pastikan 16 digit benar.', 'error'); btn.innerHTML = 'Daftar Akun Baru <i class="fa-solid fa-user-plus"></i>'; btn.disabled = false; return; }

            try {
                const encryptedInputNik = encryptData(nikInput);
                const qNik = query(collection(db, "users"), where("nik", "==", encryptedInputNik)); const snapNik = await getDocs(qNik);
                if (!snapNik.empty) { throw new Error("NIK ini sudah terdaftar dengan akun lain! Hubungi pengurus."); }

                const qWa = query(collection(db, "users"), where("no_wa", "==", waInput)); const snapWa = await getDocs(qWa);
                if (!snapWa.empty) { throw new Error("Nomor WhatsApp ini sudah digunakan oleh akun lain!"); }

                let userRecord;
                try {
                    const uc = await createUserWithEmailAndPassword(auth, email, pass); userRecord = uc.user; await sendEmailVerification(userRecord);
                } catch (authErr) {
                    if (authErr.code === 'auth/email-already-in-use') { const uc = await signInWithEmailAndPassword(auth, email, pass); userRecord = uc.user; } else { throw authErr; }
                }

                await setDoc(doc(db, "users", userRecord.email), { nama_lengkap: name, nik: encryptedInputNik, no_wa: waInput, email: email, role: "member", status: "Pending Admin", device_id: getDeviceID(), created_at: serverTimestamp(), hak_absen: "otomatis" });

                customAlert('Registrasi Berhasil', 'Silahkan cek kotak masuk email Anda untuk melakukan verifikasi akun.', 'success'); 
                setTimeout(() => { switchView('stepLogin'); document.getElementById('formRegister').reset(); }, 3500);

            } catch (error) { customAlert('Pendaftaran Ditolak', error.message.replace('Firebase: ', ''), 'error'); } 
            finally { btn.innerHTML = 'Daftar Akun Baru <i class="fa-solid fa-user-plus"></i>'; btn.disabled = false; }
        });

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('btnLoginSubmit'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memverifikasi...'; btn.disabled = true;
            try {
                const uc = await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
                if (!uc.user.emailVerified) throw new Error("Email Anda belum diverifikasi. Silahkan cek kotak masuk atau folder spam di email Anda.");
                
                const userDoc = await getDoc(doc(db, "users", uc.user.email));
                if (userDoc.exists()) {
                    const dbDeviceId = userDoc.data().device_id;
                    if (dbDeviceId && dbDeviceId !== getDeviceID()) { auth.signOut(); throw new Error("Akses Ditolak! Akun ini sedang terkunci untuk perangkat (HP) lain. Hubungi Admin KGR."); }
                }
                window.playTypewriterAndRedirect();
            } catch (error) { 
                let errorMsg = error.message.replace('Firebase: ', '');
                if (error.code === 'auth/invalid-email') errorMsg = "Format penulisan email tidak valid.";
                else if (error.code === 'auth/user-not-found') errorMsg = "Email ini belum terdaftar di sistem KGR.";
                else if (error.code === 'auth/wrong-password') errorMsg = "Password yang Anda masukkan salah.";
                else if (error.code === 'auth/invalid-credential') errorMsg = "Kombinasi Email dan Password salah. Silahkan cek kembali.";
                else if (error.code === 'auth/too-many-requests') errorMsg = "Terlalu banyak percobaan gagal. Akun Anda diblokir sementara, coba lagi nanti.";
                else if (error.code === 'auth/network-request-failed') errorMsg = "Koneksi internet Anda terputus. Silahkan cari sinyal.";
                
                customAlert('Gagal Masuk', errorMsg, 'error'); btn.innerHTML = 'Masuk Aplikasi <i class="fa-solid fa-right-to-bracket"></i>'; btn.disabled = false; 
            }
        });

        window.playTypewriterAndRedirect = async function() {
            document.getElementById('introAnimation').classList.add('active');
            sessionStorage.setItem('kgr_app_started', 'true'); // SINKRONISASI KUNCI BIAR GAK MUNCUL DI INDEX
            
            const typeText = async (text, element) => { for (let i = 0; i < text.length; i++) { element.innerHTML += text.charAt(i); await new Promise(r => setTimeout(r, 50)); } };
            
            await typeText("MENCARI BERKAH", document.getElementById('text1'));
            document.getElementById('cursor1').classList.add('hidden'); document.getElementById('cursor2').classList.remove('hidden'); 
            await new Promise(r => setTimeout(r, 200)); 
            await typeText("DENGAN SEDEKAH", document.getElementById('text2'));
            
            setTimeout(() => { window.location.href = 'index.html'; }, 600);
        }
    </script>
    <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => { console.log('PWA SW Failed:', err); }); }); }</script>
</body>
</html>
