<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F5F5F7">
    <title>Keamanan Maksimal - KGR</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>

    <style>
        :root {
            --bg-base: #F5F5F7; --text-dark: #1C1C1E; --text-gray: #8E8E93;
            --gold-primary: #D4AF37; --gold-deep: linear-gradient(135deg, #A67C00, #D4AF37, #8B6914, #B38728);
            --danger-red: #DC3545; --success-green: #28A745;
            --glass-bg: rgba(255, 255, 255, 0.75); --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #E5E5E5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-base); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding: 30px; }
        @media (min-width: 600px) { .app-container { max-width: 400px; height: 85vh; max-height: 800px; border-radius: 40px; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15); border: 1px solid rgba(0,0,0,0.05); } }

        .auth-card { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); border-radius: 30px; padding: 40px 24px; z-index: 2; position: relative; text-align: center; }

        .branding h1 { font-size: 20px; font-weight: 900; color: var(--text-dark); margin-bottom: 5px; }
        .branding p { font-size: 11px; font-weight: 900; background: var(--gold-deep); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; margin-bottom: 25px; }
        .logo-icon { width: 70px; height: 70px; border-radius: 20px; background: var(--gold-deep); color: #FFF; display: flex; justify-content: center; align-items: center; font-size: 32px; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4); border: 3px solid #FFF; }

        .form-group { margin-bottom: 15px; text-align: left; position: relative; }
        .form-group i.input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 14px; }
        .form-input { width: 100%; padding: 15px 15px 15px 45px; border-radius: 14px; border: 1.5px solid rgba(0,0,0,0.06); font-size: 13px; font-weight: 600; color: var(--text-dark); outline: none; background: #FFF; }
        .form-input:focus { border-color: var(--gold-primary); }

        .btn-auth { width: 100%; padding: 16px; border-radius: 14px; font-size: 14px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; margin-top: 5px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-auth:disabled { background: var(--text-gray); cursor: not-allowed; }
        .btn-auth i { color: var(--gold-primary); }

        .link-text { font-size: 12px; font-weight: 700; color: var(--text-dark); margin-top: 20px; display: inline-block; cursor: pointer; }
        .link-text span { color: var(--gold-primary); }

        .toggle-view { display: none; }
        .toggle-view.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .video-container { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; margin-bottom: 15px; border: 3px solid var(--gold-primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: #000; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .custom-alert-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 99999; opacity: 0; visibility: hidden; transition: 0.3s; padding: 24px; }
        .custom-alert-overlay.show { opacity: 1; visibility: visible; }
        .custom-alert-box { background: #FFF; border-radius: 24px; padding: 30px 24px; width: 100%; max-width: 320px; text-align: center; }
        .alert-icon { font-size: 50px; margin-bottom: 15px; }
        .alert-icon.error { color: var(--danger-red); }
        .alert-icon.success { color: var(--success-green); }
        .alert-title { font-size: 18px; font-weight: 900; color: var(--text-dark); margin-bottom: 8px; }
        .alert-msg { font-size: 13px; font-weight: 600; color: var(--text-gray); margin-bottom: 25px; }
        .btn-alert { width: 100%; padding: 16px; border-radius: 14px; font-size: 14px; font-weight: 800; border: none; cursor: pointer; color: #FFF; background: var(--text-dark); }

        /* ANIMASI TYPEWRITER */
        .intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-base); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .intro-overlay.active { display: flex; }
        .typewriter-box { text-align: center; padding: 20px; }
        .type-line-1 { font-size: 24px; font-weight: 900; color: var(--text-dark); margin-bottom: 5px; min-height: 29px; letter-spacing: 1px; }
        .type-line-2 { font-size: 14px; font-weight: 900; background: var(--gold-deep); -webkit-background-clip: text; -webkit-text-fill-color: transparent; min-height: 18px; letter-spacing: 2px; }
        .cursor { display: inline-block; width: 3px; height: 1em; background: var(--gold-primary); vertical-align: middle; margin-left: 2px; animation: blink 0.7s infinite; }
        .cursor.hidden { display: none; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="customAlert" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div id="alertIcon" class="alert-icon"><i class="fa-solid fa-circle-info"></i></div>
            <h3 id="alertTitle" class="alert-title">Info</h3>
            <p id="alertMessage" class="alert-msg">Pesan</p>
            <button class="btn-alert" onclick="document.getElementById('customAlert').classList.remove('show')">Mengerti</button>
        </div>
    </div>

    <!-- OVERLAY ANIMASI TYPEWRITER -->
    <div id="introAnimation" class="intro-overlay">
        <div class="logo-icon" style="margin-bottom: 30px; transform: scale(1.2);"><i class="fa-solid fa-hands-holding-child"></i></div>
        <div class="typewriter-box">
            <div class="type-line-1"><span id="text1"></span><span id="cursor1" class="cursor"></span></div>
            <div class="type-line-2"><span id="text2"></span><span id="cursor2" class="cursor hidden"></span></div>
        </div>
    </div>

    <div class="app-container">
        <div class="auth-card">
            <div class="logo-icon"><i class="fa-solid fa-hands-holding-child"></i></div>
            <div class="branding">
                <h1>KOTAK GOTONG ROYONG</h1>
                <p>Akses Member Terverifikasi</p>
            </div>

            <div id="stepLogin" class="toggle-view active">
                <form id="formLogin">
                    <div class="form-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="logEmail" class="form-input" placeholder="Email Terdaftar" required>
                    </div>
                    <div class="form-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="logPass" class="form-input" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-auth" id="btnLoginSubmit">Masuk Aplikasi <i class="fa-solid fa-right-to-bracket"></i></button>
                </form>
                <span class="link-text" onclick="switchView('stepRegister')">Belum punya akun? <span>Daftar disini</span></span>
            </div>

            <div id="stepRegister" class="toggle-view">
                <p style="font-size: 11px; font-weight: 700; color: var(--danger-red); margin-bottom: 15px;"></p>
                <form id="formRegister">
                    <div class="form-group">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="regName" class="form-input" placeholder="Nama Sesuai KTP" required>
                    </div>
                    <div class="form-group">
                        <i class="fa-solid fa-id-card input-icon"></i>
                        <input type="tel" id="regNik" class="form-input" placeholder="16 Digit NIK" required maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                    </div>
                    <div class="form-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" class="form-input" placeholder="Email Aktif (Gmail/Yahoo)" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="regPass" class="form-input" placeholder="Password (Min. 6 huruf)" required minlength="6">
                    </div>
                    <button type="submit" class="btn-auth" id="btnNextStep">Lanjut Pindai Wajah <i class="fa-solid fa-camera"></i></button>
                </form>
                <span class="link-text" onclick="switchView('stepLogin')">Sudah punya akun? <span>Masuk</span></span>
            </div>

            <div id="stepSelfie" class="toggle-view">
                <h3 style="font-size: 15px; font-weight: 900; margin-bottom: 5px;">Pindai Wajah (Liveness)</h3>
                <p style="font-size: 11px; color: var(--text-gray); margin-bottom: 15px;">Pastikan wajah Anda berada di tengah dan terang.</p>
                
                <div class="video-container">
                    <video id="webcam" autoplay muted playsinline></video>
                    <canvas id="overlayCanvas"></canvas>
                </div>

                <button class="btn-auth" id="btnCaptureFace" disabled>Tunggu AI Memindai... <i class="fa-solid fa-spinner fa-spin"></i></button>
                <span class="link-text" onclick="stopCamera(); switchView('stepRegister')">Batal dan Kembali</span>
            </div>

        </div>
    </div>

    <!-- MODULE FIREBASE & LOGIKA APLIKASI -->
    <script type="module">
        import { auth, db } from './db-config.js'; 
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let tempData = {};
        let videoStream = null;

        function getDeviceID() {
            let deviceId = localStorage.getItem('kgr_device_id');
            if (!deviceId) {
                deviceId = crypto.randomUUID(); 
                localStorage.setItem('kgr_device_id', deviceId);
            }
            return deviceId;
        }

        function isValidNIK(nik) {
            if (!/^\d{16}$/.test(nik)) return false;
            let hari = parseInt(nik.substring(6, 8));
            let bulan = parseInt(nik.substring(8, 10));
            if (hari > 40) hari -= 40;
            if (hari < 1 || hari > 31 || bulan < 1 || bulan > 12) return false;
            if (/^(.)\1{15}$/.test(nik)) return false; 
            return true;
        }

        window.showAlert = function(type, title, message) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerText = message;
            document.getElementById('alertIcon').className = 'alert-icon ' + type;
            document.getElementById('customAlert').classList.add('show');
        }
        window.switchView = function(viewId) {
            document.querySelectorAll('.toggle-view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        document.getElementById('formRegister').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value.toLowerCase();
            const nik = document.getElementById('regNik').value;

            const allowedDomains = ["gmail.com", "yahoo.com"];
            const domain = email.split('@')[1];
            if (!allowedDomains.includes(domain)) {
                showAlert('error', 'Domain Ditolak', 'Gunakan alamat email @gmail.com atau @yahoo.com untuk mendaftar.'); return;
            }
            if (!isValidNIK(nik)) {
                showAlert('error', 'NIK Palsu', 'Sistem mendeteksi format NIK tidak valid sesuai standar Dukcapil.'); return;
            }

            tempData = {
                name: document.getElementById('regName').value,
                nik: nik, email: email, pass: document.getElementById('regPass').value
            };
            
            switchView('stepSelfie');
            startFaceAPI();
        });

        async function startFaceAPI() {
            const btnCapture = document.getElementById('btnCaptureFace');
            const video = document.getElementById('webcam');
            
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://vladmandic.github.io/face-api/model/');
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = videoStream;

                video.addEventListener('play', () => {
                    const canvas = document.getElementById('overlayCanvas');
                    faceapi.matchDimensions(canvas, { width: video.videoWidth, height: video.videoHeight });

                    const interval = setInterval(async () => {
                        if(video.paused || video.ended) return clearInterval(interval);
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                        
                        if (detections.length === 1) {
                            btnCapture.disabled = false;
                            btnCapture.innerHTML = 'Rekam & Selesaikan <i class="fa-solid fa-check-double"></i>';
                            btnCapture.style.background = '#28A745';
                        } else {
                            btnCapture.disabled = true;
                            btnCapture.innerHTML = detections.length === 0 ? 'Wajah tidak terdeteksi...' : 'Terdeteksi > 1 Orang!';
                            btnCapture.style.background = 'var(--text-dark)';
                        }
                    }, 500);
                });
            } catch (err) {
                showAlert('error', 'Kamera Gagal', 'Berikan izin akses kamera untuk memverifikasi wajah.');
            }
        }

        window.stopCamera = function() {
            if(videoStream) { videoStream.getTracks().forEach(track => track.stop()); }
        }

        // ==========================================
        // 6. SUBMIT AKHIR (VERSI ANTI-NYANGKUT)
        // ==========================================
        document.getElementById('btnCaptureFace').addEventListener('click', async () => {
            const btn = document.getElementById('btnCaptureFace');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';
            btn.disabled = true;

            try {
                let currentUserEmail = tempData.email;
                let userRecord;

                try {
                    // Tahap 1: Coba bikin akun Auth baru
                    const uc = await createUserWithEmailAndPassword(auth, currentUserEmail, tempData.pass);
                    userRecord = uc.user;
                    // Kirim verifikasi cuma kalau ini beneran pendaftaran pertama
                    await sendEmailVerification(userRecord);
                    
                } catch (authErr) {
                    // JIKA NYANGKUT: Auth udah ada tapi user ngetes daftar lagi
                    if (authErr.code === 'auth/email-already-in-use') {
                        // Paksa login di latar belakang biar bisa nerusin simpan data!
                        const uc = await signInWithEmailAndPassword(auth, currentUserEmail, tempData.pass);
                        userRecord = uc.user;
                    } else {
                        throw authErr; 
                    }
                }

                // Tahap 2: Tembak data Profil ke Firestore Database (pake email sebagai ID Dokumen)
                await setDoc(doc(db, "users", userRecord.email), {
                    nama_lengkap: tempData.name,
                    nik: tempData.nik,
                    email: currentUserEmail,
                    role: "Member",
                    status: "Pending Admin",
                    device_id: getDeviceID(), // Gembok HP
                    created_at: serverTimestamp()
                });

                stopCamera();
                showAlert('success', 'Pendaftaran Selesai', 'Wajah terekam dan akun terkunci di perangkat ini. Silakan masuk.');
                setTimeout(() => { switchView('stepLogin'); }, 3000);
                
            } catch (error) {
                // Tampilkan error aslinya ke layar biar ketahuan penyakitnya apa
                showAlert('error', 'Gagal Sistem', error.message.replace('Firebase: ', ''));
                btn.innerHTML = 'Rekam & Selesaikan <i class="fa-solid fa-check-double"></i>';
                btn.disabled = false;
            }
        });

        // ==========================================
        // 7. LOGIN & CEK DEVICE BINDING
        // ==========================================
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLoginSubmit');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memverifikasi...';
            btn.disabled = true;

            try {
                const uc = await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
                
                // Mencegah login jika email belum diklik link verifikasinya
                if (!uc.user.emailVerified) {
                    throw new Error("Email belum diverifikasi. Cek kotak masuk Anda.");
                }

                // Cek Device Binding dari Firestore (pakai ID email)
                const userDoc = await getDoc(doc(db, "users", uc.user.email));
                if (userDoc.exists()) {
                    const dbDeviceId = userDoc.data().device_id;
                    const currentDeviceId = getDeviceID();

                    if (dbDeviceId && dbDeviceId !== currentDeviceId) {
                        auth.signOut();
                        throw new Error("AKSES DITOLAK: Akun ini terkunci untuk perangkat (HP) lain.");
                    }
                }
                
                // MEMAINKAN ANIMASI SEBELUM PINDAH KE HALAMAN DEPAN
                window.playTypewriterAndRedirect();
            } catch (error) {
                showAlert('error', 'Gagal Masuk', error.message.replace('Firebase: ', ''));
                btn.innerHTML = 'Masuk Aplikasi <i class="fa-solid fa-right-to-bracket"></i>';
                btn.disabled = false;
            }
        });

        // FUNGSI ANIMASI TYPEWRITER
        window.playTypewriterAndRedirect = async function() {
            document.getElementById('introAnimation').classList.add('active');
            
            const text1 = "KOTAK GOTONG ROYONG";
            const text2 = "ANAK OJOL BABAH ALUN";
            const el1 = document.getElementById('text1');
            const el2 = document.getElementById('text2');
            const cur1 = document.getElementById('cursor1');
            const cur2 = document.getElementById('cursor2');

            const typeText = async (text, element) => {
                for (let i = 0; i < text.length; i++) {
                    element.innerHTML += text.charAt(i);
                    await new Promise(r => setTimeout(r, 40)); 
                }
            };

            await typeText(text1, el1);
            cur1.classList.add('hidden'); cur2.classList.remove('hidden'); 
            await new Promise(r => setTimeout(r, 200)); 
            await typeText(text2, el2);
            
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        }
    </script>
</body>
</html>
